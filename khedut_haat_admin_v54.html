<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>એડમિન — સૃષ્ટિ ખેડૂત હાટ · V7.3</title>
<link rel="manifest" href="manifest-admin.json">
<meta name="theme-color" content="#1b4332">
<link rel="apple-touch-icon" href="icons/icon-customer-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="એડમિન">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Hind+Vadodara:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1b4332; --green2:#2d6a4f; --green3:#52b788; --green-pale:#d8f3dc;
  --orange:#e36414; --orange-pale:#fff0e0; --red:#c1121f; --red-pale:#ffe0e0;
  --bg:#fffbf4; --card:#fff; --text:#1a1a1a; --muted:#6b7280; --border:#e8e0d0;
  --code:#1f2937; --code-bg:#111827;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* V14 (2026-06-23): Inter for English/Latin + Hind Vadodara for Gujarati — global override (replaces Noto/Fraunces/DM Sans/JetBrains Mono). Also: dashboard date sized to match the status text. */
*,*::before,*::after{font-family:"Inter","Hind Vadodara",sans-serif !important}
body{font-family:"Inter","Hind Vadodara",sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;min-height:100vh}
img.emoji{height:1em;width:1em;margin:0 .05em 0 .1em;vertical-align:-.15em;display:inline-block}
.wrap{max-width:1280px;margin:0 auto;padding-bottom:60px}

/* LOGIN */
.login{padding:40px 22px;max-width:380px;margin:0 auto}
.login-hero{text-align:center;padding:30px 10px 24px}
.login-title{font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:26px;font-weight:900;color:var(--green);line-height:1.1;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted)}
.login-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px 20px;box-shadow:0 6px 24px rgba(27,67,50,.08)}
/* Admin login screen — SCOPED to renderLogin() only, does not touch
   .login/.login-hero/.login-title/.login-sub/.login-card (shared with the password-change
   screen). Background is blank by default; optionally set from Design tab → adminLoginBg. */
.admin-login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.admin-login-bg-img{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:none;z-index:0}
.admin-login-bg-overlay{position:fixed;inset:0;display:none;z-index:0}
.admin-login-box{position:relative;z-index:1;width:100%;max-width:360px;background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px 20px;box-shadow:0 6px 24px rgba(27,67,50,.08)}
.admin-login-title{text-align:center;font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:19px;font-weight:900;color:var(--green);line-height:1.2;white-space:nowrap;margin-bottom:18px}
.frm{display:flex;flex-direction:column;gap:12px}
.frm-label{font-size:12px;font-weight:600;color:var(--muted)}
.frm-in{border:1.5px solid var(--border);border-radius:9px;padding:12px 13px;font-size:15px;font-family:inherit;outline:none;background:#fff;width:100%}
.frm-in:focus{border-color:var(--green2)}
.btn-primary{background:var(--green2);color:#fff;border:none;border-radius:9px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.btn-primary:hover{background:var(--green)}
.btn-primary:disabled{background:#aaa;cursor:not-allowed}
.btn-primary:active:not(:disabled){transform:scale(.99)}
.login-err{background:var(--red-pale);color:var(--red);border-radius:7px;padding:10px 12px;font-size:13px;text-align:center;margin-top:8px;font-weight:500}

/* TOP BAR */
.topbar{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.topbar-l{display:flex;align-items:center;gap:10px}
.topbar-emoji{font-size:24px}
.topbar-title{font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:18px;font-weight:900}
.topbar-sub{font-size:11px;opacity:.7;letter-spacing:1px;text-transform:uppercase}
.topbar-r{display:flex;align-items:center;gap:8px}
.topbar-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.topbar-btn:hover{background:rgba(255,255,255,.25)}

/* WEEK BAR */
.week-bar{background:#fff;padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.week-bar-info{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.week-num{font-family:"Fraunces",serif;font-size:24px;font-weight:900;color:var(--green)}
.week-date{font-size:13px;color:var(--muted)}
.week-stat{font-size:12.5px;color:var(--text);font-weight:600}
.week-stat b{color:var(--green2);font-weight:700;font-size:14.5px}
.week-bar-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-sm{padding:7px 12px;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;font-family:inherit;border:1.5px solid var(--border);background:#fff;color:var(--text)}
.btn-sm:hover{background:var(--bg)}
.btn-sm.primary{background:var(--green2);color:#fff;border-color:var(--green2)}
.btn-sm.primary:hover{background:var(--green)}
.btn-sm.warn{background:var(--orange);color:#fff;border-color:var(--orange)}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none;align-items:stretch;padding:0 4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:16px 20px;text-align:center;font-size:15px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;transition:color .15s ease, background .15s ease}
.tab:hover{background:#faf6ec;color:var(--green)}
.tab.active{color:var(--green2);border-bottom-color:var(--green2);font-weight:700}
.tab .badge{background:var(--red);color:#fff;border-radius:11px;padding:2px 9px;font-size:11.5px;margin-left:6px;font-weight:700}
.tab.active .badge{background:var(--green2)}
.tab-more-wrap{position:relative}
.tab-more-menu{position:absolute;top:100%;right:6px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.12);min-width:200px;z-index:200;overflow:hidden;display:none}
.tab-more-wrap.open .tab-more-menu{display:block}
.tab-more-menu button{display:block;width:100%;text-align:left;background:none;border:none;font-family:inherit;font-size:15px;font-weight:600;padding:13px 16px;cursor:pointer;color:var(--text);transition:background .12s}
.tab-more-menu button:hover{background:var(--bg);color:var(--green2)}
.tab-more-menu button.active{background:var(--green-pale);color:var(--green2);font-weight:700}
.tab-loading{position:fixed;top:0;left:0;right:0;height:3px;background:var(--green2);z-index:500;transform:scaleX(0);transform-origin:left center;transition:transform .3s ease}
.tab-loading.active{transform:scaleX(1);animation:tabLoadPulse 1s ease-in-out infinite}
@keyframes tabLoadPulse{50%{opacity:.55}}
.tab-fade{animation:tabFadeIn .18s ease}
@keyframes tabFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.order-ghost{opacity:.4;background:var(--green-pale)!important;border:1px dashed var(--green2)!important}
.order-item{transition:background .12s ease}
.order-item:hover{background:var(--bg)!important}

/* CONTENT */
.body{padding:20px 22px 44px;font-size:16px}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
.card h3{font-family:"Fraunces",serif;font-size:18.5px;font-weight:700;color:var(--green);margin-bottom:8px}
.card-sub{font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.6}
.card-sub code{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-family:"JetBrains Mono",monospace;font-size:13px}

/* DASHBOARD GRID */
.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.dash-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px}
.dash-card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.dash-card-val{font-family:"Fraunces",serif;font-size:30px;font-weight:900;color:var(--green);line-height:1}
.dash-card-val.warn{color:var(--orange)}
.dash-card-val.ok{color:var(--green2)}
.dash-card-sub{font-size:11.5px;color:var(--muted);margin-top:4px}

/* FARMER ROWS */
.frm-search{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;font-family:inherit;outline:none;width:100%;margin-bottom:10px}
.frm-search:focus{border-color:var(--green2)}
.farmer-row{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:6px;display:flex;align-items:center;flex-wrap:wrap;row-gap:8px;gap:12px;font-size:15px}
.farmer-row .num{font-size:12.5px;color:var(--muted);font-weight:600;width:34px;flex-shrink:0;font-family:"JetBrains Mono",monospace}
.farmer-row .nm{flex:1;min-width:0}
.farmer-row .nm b{font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px}
.farmer-row .nm small{font-size:12.5px;color:var(--muted)}
/* V54 (mobile smoothness): a farmer row can hold up to 7 flex children (num, name,
   status badge, WA/edit/reset/delete buttons) — too many to fit on one 375px line.
   Below 480px, give the name its own full-width line so it isn't squeezed to 3 chars,
   pushing the badge + action buttons to wrap onto their own line(s) beneath it. */
@media (max-width:480px){
  .farmer-row .nm{flex-basis:100%}
}
.farmer-row .badge-yes{background:var(--green-pale);color:var(--green2);font-size:12.5px;padding:4px 11px;border-radius:14px;font-weight:700;white-space:nowrap}
.farmer-row .badge-no{background:#fef0f0;color:var(--red);font-size:12.5px;padding:4px 11px;border-radius:14px;font-weight:600;white-space:nowrap}
.farmer-row .badge-parsed{background:#dbeafe;color:#1e40af;font-size:12.5px;padding:4px 11px;border-radius:14px;font-weight:600;white-space:nowrap}
.farmer-row .preview-btn{font-size:13px;color:var(--green2);background:none;border:1px solid var(--border);border-radius:7px;padding:5px 11px;cursor:pointer;font-family:inherit;font-weight:600}

/* TEXT BLOCKS */
.code-box{background:var(--code-bg);color:#e5e7eb;border-radius:10px;padding:14px;font-family:"JetBrains Mono","Noto Sans Gujarati",monospace;font-size:12px;line-height:1.6;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-word}
.code-box.gj{font-family:"Noto Sans Gujarati","JetBrains Mono",monospace}
.btn-copy{background:var(--green2);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-sm{background:#fff;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s, border-color .12s}
.btn-sm:hover{background:var(--bg);border-color:var(--green3)}
.btn-sm.primary{background:var(--green2);color:#fff;border-color:var(--green2)}
.btn-sm.primary:hover{background:var(--green)}
.btn-sm.warn{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-copy:hover{background:var(--green)}
.btn-copy:active{transform:scale(.98)}

.step{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
.step-num{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--green2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:"Fraunces",serif}
.step-body{flex:1;min-width:0}
.step-title{font-size:14.5px;font-weight:700;margin-bottom:4px;color:var(--text)}
.step-desc{font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.55}
.step-desc a{color:var(--green2);font-weight:600;text-decoration:none}
.step-desc a:hover{text-decoration:underline}

/* TEXTAREA INPUT */
.json-ta{width:100%;min-height:240px;border:1.5px solid var(--border);border-radius:10px;padding:13px 15px;font-size:13px;font-family:"JetBrains Mono",monospace;outline:none;line-height:1.55;background:#fff;resize:vertical}
.json-ta:focus{border-color:var(--green2)}
.json-ta.err{border-color:var(--red);background:#fff7f7}

/* PREVIEW */
.preview-list{margin-top:14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;max-height:380px;overflow-y:auto}
.preview-farmer{margin-bottom:11px;padding-bottom:11px;border-bottom:1px dashed var(--border)}
.preview-farmer:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.preview-fnm{font-weight:700;font-size:13.5px;color:var(--green);margin-bottom:5px}
.preview-fnm small{font-weight:400;color:var(--muted);font-size:11.5px;margin-left:4px}
.preview-items{display:grid;grid-template-columns:1fr 1fr;gap:3px 14px;font-size:12.5px}
.preview-items .pi-row{display:flex;justify-content:space-between;gap:8px}
.preview-items .pi-row .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-items .pi-row .pr{font-weight:700;color:var(--orange);white-space:nowrap}
/* Compact review (Sameeksha) rows — one product per line, uniform 13.5px; per-haat detail expands at 12px */
.rv-row{display:flex;align-items:center;gap:8px;padding:10px 14px;white-space:nowrap;font-size:13.5px;overflow:hidden}
.rv-nm{font-weight:600;color:var(--text)}
.rv-cat{color:var(--muted)}
.rv-chip{padding:2px 9px;border-radius:10px;font-size:13.5px;white-space:nowrap;flex-shrink:0}
.rv-amt{min-width:64px;text-align:right;color:var(--orange);font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0;white-space:nowrap}
.rv-unt{width:58px;text-align:left;color:var(--muted);margin-left:2px;flex-shrink:0;font-size:13.5px}
.rv-d>summary{list-style:none;cursor:pointer}
.rv-d>summary::-webkit-details-marker{display:none}
.rv-d[open] .rv-chev{transform:rotate(90deg)}
.rv-chev{transition:transform .15s;color:#aaa;font-size:13px;width:14px;text-align:center;flex-shrink:0;display:inline-block}
.rv-det{padding:0 14px 11px 38px;display:flex;flex-direction:column;gap:5px;font-size:12px}
.rv-det .dr{display:flex;align-items:center;color:var(--text)}
.preview-empty{color:var(--muted);font-size:12px;font-style:italic;margin-top:3px}

/* STATES & TOAST */
.state{padding:50px 20px;text-align:center;color:var(--muted)}
.state-icon{font-size:48px;margin-bottom:12px}
.state-title{font-size:16px;color:var(--text);font-weight:700;margin-bottom:6px}
.state-body{font-size:13px;line-height:1.6}
.toast-wrap{position:fixed;top:16px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:200;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:10px 18px;border-radius:24px;font-size:13.5px;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:80%;text-align:center;animation:toastIn .25s ease-out}
.toast.ok{background:var(--green2)}.toast.err{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
/* a11y: respect motion preferences (vestibular safety) */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
}
/* a11y: visible keyboard focus ring */
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[role="button"]:focus-visible{outline:2px solid var(--green2);outline-offset:2px;border-radius:6px}

.alert{background:var(--orange-pale);border-left:4px solid var(--orange);padding:11px 14px;border-radius:6px;font-size:12.5px;color:#7a3010;margin-bottom:14px;line-height:1.55}
.alert b{font-weight:700}
.notice{background:#eef6ff;border-left:4px solid #2563eb;padding:11px 14px;border-radius:6px;font-size:12.5px;color:#1e3a8a;margin-bottom:14px;line-height:1.55}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;width:100%;max-width:680px;border-radius:14px;overflow:hidden;max-height:88vh;display:flex;flex-direction:column}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:"Fraunces",serif;font-size:18px;font-weight:700;color:var(--green)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);width:34px;height:34px;border-radius:50%;font-family:inherit}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1}

/* V53: tab-bar group segments — "આ અઠવાડિયું" vs "માસ્ટર" vs "અન્ય", distinguishable at a glance.
   Tabs themselves (onclick/classes/badges) are untouched — only wrapped in tinted segments.
   Uniform spacing: every group margin 6px 4px · padding 3px · gap 3px; labels sized like tabs. */
.tab-group{display:flex;align-items:center;gap:3px;border-radius:11px;margin:6px 4px;padding:3px;flex-shrink:0}
.tg-week{background:#eef8f0;border:1px solid #d5ecdb}
.tg-master{background:#fdf4e7;border:1px solid #f3e2c8}
.tg-more{background:#eef4fb;border:1px solid #d7e4f4}
.tab-group-label{font-size:14px;font-weight:700;padding:6px 13px;border-radius:9px;margin:0 2px;flex-shrink:0;white-space:nowrap}
.tgl-week{background:var(--green2);color:#fff}
.tgl-master{background:var(--orange);color:#fff}
.tgl-more{background:#2563eb;color:#fff}
.tab-group .tab{margin-bottom:0;border-bottom:none;border-radius:8px;padding:9px 14px;font-size:14px}
.tab-group .tab:hover{background:rgba(255,255,255,.75);color:var(--green)}
.tab-group .tab.active{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.10);color:var(--green2)}
.tg-master .tab.active{color:#b25510}
.tg-master .tab:hover{color:#b25510}
.tg-more .tab.active{color:#1d4ed8}
.tg-more .tab:hover{color:#1d4ed8}

/* V54: mobile-only sidebar drawer nav. Desktop keeps the .tabs bar above completely
   unchanged — this whole block is invisible until the max-width:900px media query flips
   .tabs off and .mob-nav-bar/.side-drawer on. */
.mob-nav-bar{display:none;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border);background:#fff}
.mob-nav-bar .hamburger-btn{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-family:inherit}
.mob-nav-bar .hamburger-btn:hover{background:var(--bg)}
.mob-nav-current{font-size:14.5px;font-weight:700;color:var(--green2)}
.side-drawer-scrim{display:none;position:fixed;inset:0;background:rgba(20,20,20,.45);z-index:390}
.side-drawer-scrim.show{display:block}
.side-drawer{display:none;position:fixed;top:0;left:0;bottom:0;width:250px;max-width:82vw;background:#fff;z-index:400;flex-direction:column;transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 12px 36px rgba(0,0,0,.25)}
.side-drawer.open{transform:none}
.side-drawer-brand{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-shrink:0}
.side-drawer-brand .em{font-size:22px}
.side-drawer-brand .nm{font-family:"Fraunces",serif;font-weight:900;font-size:15px;color:var(--green)}
.side-drawer-nav{flex:1;overflow-y:auto;padding:8px 0}
.side-drawer-sec{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#999;padding:12px 16px 6px}
.side-drawer-item{display:flex;align-items:center;gap:10px;width:calc(100% - 16px);margin:0 8px 2px;padding:10px 12px;border-radius:9px;border:none;background:none;font-size:14px;font-weight:600;color:var(--text);text-align:left;cursor:pointer;font-family:inherit}
.side-drawer-item:hover{background:var(--bg)}
.side-drawer-item.active{background:var(--green2);color:#fff}

    const close = ok => { overlay.remove(); document.body.style.overflow=''; resolve(ok); };

    document.body.appendChild(overlay);
  });

CONSTRAINTS:

function photoKey(name){
  try{ return 'p_'+btoa(unescape(encodeURIComponent(String(name||'')))).replace(/[^a-zA-Z0-9]/g,'').slice(0,100); }
  catch(e){ return 'p_'+String(name||'').replace(/[^a-zA-Z0-9]/g,'').slice(0,100); }
}
function photoForName(name){
  if(!name) return '';

  return PRODUCT_PHOTOS[k] || '';

const LOGIN_BG_CACHE = {};
async function applyLoginBg(cfgKey, imgId, overlayId){
  if(!(cfgKey in LOGIN_BG_CACHE)){
    try{ LOGIN_BG_CACHE[cfgKey] = (await fbRef('settings/siteConfig/'+cfgKey).get()).val() || null; }
    catch(e){ LOGIN_BG_CACHE[cfgKey] = null; }
  }
  const cfg = LOGIN_BG_CACHE[cfgKey];
  const img = document.getElementById(imgId), overlay = document.getElementById(overlayId);
  if(!cfg || !img || !overlay) return;   // not configured, or screen no longer showing
  const isMobile = window.innerWidth < 768;
  const url = (isMobile && cfg.mobileUrl) ? cfg.mobileUrl : cfg.desktopUrl;
  if(!url) return;
  img.src = url; img.style.objectFit = cfg.fit||'cover'; img.style.filter = cfg.blur?`blur(${cfg.blur}px)`:''; img.style.display = 'block';
  overlay.style.background = `rgba(0,0,0,${(cfg.overlay!=null?cfg.overlay:0)/100})`; overlay.style.display = 'block';
}

  // V7.1 security: the admin record's `pwd` (legacy plaintext) must never be world-readable, but

  let exists = false, adminName = username;
  try{
    const s = await fbRef('admins/'+username+'/name').get();
    if(s.exists()){ exists = true; adminName = s.val() || username; }

  let forceChange = false;
  try{ forceChange = (await fbRef('admins/'+username+'/forceChange').get()).val() || false; }catch{}
  try{
    sessionStorage.setItem(AUTH_KEY, JSON.stringify({

async function loadAllProductsAcrossWeeks(){
  // Replicates the customer catalog's consolidation: groups variants by productPhotoMap cellKey,
  // picks the CANONICAL (shortest) name per group → matches what demo customer view shows.
  // V59: run ONCE per session. This downloads the ENTIRE weekly history node (~675KB and
  // growing every week) yet only feeds a historical name-dedup map for the Photos/Order tabs.
  // Farmers are select-only (current-week names always come from the master catalogue, which
  // both consumers merge in anyway), so re-aggregating on every reload click bought nothing —
  // it was the single biggest RTDB download bleed in the whole system during market mornings.
  if(_allWeeksAggDone && ALL_PRODUCTS_MAP.size) return;
  ALL_PRODUCTS_MAP = new Map();
  try{
    const photoMapSnap = await fbRef('productPhotoMap').get();
    const photoMap = photoMapSnap.val() || {};

    const snap = await fbRef('weekly').get();
    const weeks = snap.val() || {};

    const aggMap = new Map(); // groupId -> {nameOptions:Set, emoji, cat, unit, count}
    Object.values(weeks).forEach(wkData => {
      if(!wkData || typeof wkData !== 'object' || !wkData.submissions) return;
      Object.values(wkData.submissions).forEach(sub => {
        if(!sub || sub.status === 'rejected') return;
        (sub.items||[]).forEach(it => {
          if(!it || !it.name) return;
          const trimmed = String(it.name).trim();
          const sk = photoKey(trimmed);
          const cellKey = photoMap[sk];
          const groupId = cellKey || `${trimmed}|${it.unit||''}`;
          const ex = aggMap.get(groupId) || {nameOptions:new Set(), emoji:it.emoji||'🌿', cat:it.cat||'', unit:it.unit||'kg', count:0};
          ex.nameOptions.add(trimmed);
          if(it.emoji) ex.emoji = it.emoji;
          if(it.cat) ex.cat = it.cat;
          if(it.unit) ex.unit = it.unit;
          ex.count++;
          aggMap.set(groupId, ex);
        });
      });
    });
    // For each group: canonical = shortest name
    aggMap.forEach(ex => {
      const canonical = [...ex.nameOptions].sort((a,b) => a.length - b.length || a.localeCompare(b,'gu'))[0];
      if(!ALL_PRODUCTS_MAP.has(canonical)){
        ALL_PRODUCTS_MAP.set(canonical, {emoji:ex.emoji, cat:ex.cat, unit:ex.unit, count:ex.count});
      }
    });
    _allWeeksAggDone = true;   // V59: success → skip on all later loadAll() calls this session
  }catch(e){ console.error('all-weeks aggregation failed', e); }
}

async function loadProductsDB(){
  await loadAllProductsAcrossWeeks();
  const [snap, delSnap] = await Promise.all([
    fbRef('products').get(),
    fbRef('productsDeleted').get(),
  ]);
  const masterDB = snap.val() || {};
  DELETED_PRODUCT_IDS = new Set(Object.keys(delSnap.val() || {}));

  // PART A (simplified — farmers SELECT-only, never add): `products` is the admin-curated
  // source of truth. No history rebuild, no auto-discovery, no overwrite → admin edits always
  // persist (this is what makes rename/edit stick). Exclude any tombstoned id defensively.
  // NOTE: loadAllProductsAcrossWeeks() above is kept only because other admin features use
  // ALL_PRODUCTS_MAP (~line 2248/2574); loadProductsDB itself no longer uses it.
  Object.keys(masterDB).forEach(id => { if(DELETED_PRODUCT_IDS.has(id)) delete masterDB[id]; });
  PRODUCTS_DB = masterDB;
  // Stamp each product with its Firebase key — old records were saved without an id field.
  Object.entries(PRODUCTS_DB).forEach(([id, p]) => { if(p && !p.id) p.id = id; });
}

/* ════════ V60: catalogSnapshot — one compact node the customer app reads instead of the raw
   tables (~200KB vs ~380KB, and its updatedAt stamp lets customers revalidate a cached copy
   for ~100 bytes). Regenerated from in-memory state, debounced, and only written when content
   actually changed. Coverage: called at the end of loadAll() AND from setTabBodyHtml() (every
   mutating handler re-renders through it after updating in-memory state, so approvals, price
   fixes, haat toggles, product/design edits all land here without per-handler hooks).
   Write failures are silently ignored — the customer app has a full-fetch fallback, so a
   blocked/failed snapshot write can never take the catalogue down. ════════ */
let SNAP_RAW = {cats:{}, catLabels:{}, catOrder:[]};   // raw settings copies for the generator
let _snapTimer=null, _lastSnapStr='';
const SNAP_ITEM_FIELDS = ['name','unit','price','priceByHaat','qty','available','productId','emoji','cat'];
const SNAP_SUB_FIELDS  = ['status','farmerName','farmerHaat','farmerHaatCodes'];
const SNAP_FARMER_FIELDS = ['id','name','farm','village','district','phone','photoUrl','haat','haatCodes'];
const SNAP_PRODUCT_FIELDS = ['id','name','cat','unit','emoji','photo','order','aliases'];
function _pick(src, fields){ const o={}; fields.forEach(k => { if(src[k] !== undefined) o[k]=src[k]; }); return o; }
function buildCatalogSnapshot(){
  if(!WK || !SUBS || !FARMERS) return null;
  const subs = {};
  Object.entries(SUBS).forEach(([fid, s]) => {
    if(!s || s.status === 'pending' || s.status === 'rejected') return;
    const t = _pick(s, SNAP_SUB_FIELDS);
    // V65: strip pendingReview items — new products a farmer added after approval stay out of
    // the customer-facing snapshot until admin approves them (clearing the flag).
    t.items = (s.items||[]).filter(Boolean).filter(it => !it.pendingReview).map(it => _pick(it, SNAP_ITEM_FIELDS));
    subs[fid] = t;
  });
  const farmers = {};
  Object.keys(subs).forEach(fid => {
    const f = FARMERS.find(x => x && x.id === fid);
    if(f) farmers[f.id] = _pick(f, SNAP_FARMER_FIELDS);
  });
  const products = {};
  Object.values(PRODUCTS_DB||{}).forEach(p => {
    if(!p || !p.id || p.active === false) return;
    products[p.id] = _pick(p, SNAP_PRODUCT_FIELDS);
  });
  return {
    wk: WK, meta: WK_META || {weekNum:WK}, subs, farmers, products,
    siteCfg: SITE_CFG || null, haats: HAATS || {},
    cats: SNAP_RAW.cats || {}, catOrder: SNAP_RAW.catOrder || [], catLabels: SNAP_RAW.catLabels || {},
  };
}
function scheduleSnapshotWrite(){
  if(_snapTimer) clearTimeout(_snapTimer);
  _snapTimer = setTimeout(async () => {
    _snapTimer = null;
    try{
      const snap = buildCatalogSnapshot();
      if(!snap) return;
      const str = JSON.stringify(snap);
      if(str === _lastSnapStr) return;              // nothing changed → no write (no wasted upload either)
      snap.updatedAt = Date.now();
      // RTDB write FIRST and on its own — this is the proven, already-live path. Only mark
      // _lastSnapStr done once THIS succeeds, so a failure here retries next debounce tick
      // exactly like today (V60 behavior, byte-for-byte unchanged).
      await fbRef('catalogSnapshot').set(snap);
      _lastSnapStr = str;
      // V68: Storage upload SECOND, own try/catch, cannot affect the RTDB write above in
      // either direction (already committed by the time this runs, and its failure doesn't
      // roll anything back). Gated on the SAME change-check — an unchanged catalogue never
      // re-uploads. This is additive only: it does not replace or reduce the RTDB write.
      uploadSnapshotToStorage(snap).catch(e => console.warn('storage snapshot upload skipped:', e && e.message));
    }catch(e){ console.warn('catalogSnapshot write skipped:', e && e.message); }
  }, 2000);
}

// V7.1: gzip the snapshot before upload — measured live, the 292KB raw JSON was taking ~3.7s
// to download+parse on the customer page (the dominant share of first-load time). Gujarati-
// heavy JSON compresses well; browsers decompress Content-Encoding:gzip transparently on
// fetch(), so the customer side needs zero changes. Falls back to today's uncompressed upload
// if CompressionStream isn't available (older browser) — never blocks the snapshot from going up.
async function gzipJsonBlob(str){
  if(typeof CompressionStream === 'undefined') return null;
  const stream = new Blob([str]).stream().pipeThrough(new CompressionStream('gzip'));
  return await new Response(stream).blob();
}

async function uploadSnapshotToStorage(snap){
  if(!firebase.storage) return;   // SDK failed to load — no-op, RTDB path already covers customers
  const str = JSON.stringify(snap);
  const ref = firebase.storage().ref('catalog/snapshot.json');
  const gz = await gzipJsonBlob(str).catch(()=>null);
  if(gz){
    await ref.put(gz, {contentType:'application/json', contentEncoding:'gzip', cacheControl:'public, max-age=3600'});
  }else{
    const blob = new Blob([str], {type:'application/json'});
    await ref.put(blob, {contentType:'application/json', cacheControl:'public, max-age=3600'});
  }
}

window.toggleDrawer = (force) => {

};

// V54 (mobile smoothness): the grouped tab bar hides ~780px of tabs off-screen on a
// phone with zero visual hint. Fade the scrollable edges — solid where you've reached
// the end, faded where there's more — so hidden groups (માસ્ટર, અન્ય) are discoverable.
function updateTabsScrollFade(){
  const t = document.querySelector('.tabs');
  if(!t) return;
  const FADE = 22;
  const update = () => {
    const max = t.scrollWidth - t.clientWidth;
    if(max <= 2){ t.style.webkitMaskImage=''; t.style.maskImage=''; return; }
    const atStart = t.scrollLeft <= 2, atEnd = t.scrollLeft >= max - 2;
    const l = atStart ? '0%' : FADE+'px';
    const r = atEnd ? '100%' : `calc(100% - ${FADE}px)`;
    const grad = `linear-gradient(to right, transparent 0, black ${l}, black ${r}, transparent 100%)`;
    t.style.webkitMaskImage = grad; t.style.maskImage = grad;
  };
  update();
  t.addEventListener('scroll', update, {passive:true});
}

window.setTab = t => {
  const loader = document.getElementById('tabLoading');
  if(loader) loader.classList.add('active');
  TAB = t;
  // Defer render one frame so the loading bar paints, then fade body in
  requestAnimationFrame(() => {
    const el = document.getElementById('tabBody');
    if(el){
      el.classList.remove('tab-fade'); // restart animation
      el.innerHTML = renderTab();
      // force reflow then re-add to retrigger
      void el.offsetWidth;
      el.classList.add('tab-fade');
      twe();
    } else {
      render();
    }
    // Update tab bar active states (re-render shell only if tab buttons need refresh)
    document.querySelectorAll('.tab').forEach(btn => {
      const onclick = btn.getAttribute('onclick') || '';
      const m = onclick.match(/setTab\('([^']+)'\)/);
      if(m){ btn.classList.toggle('active', m[1] === t); }
      else if(onclick.includes('toggleMoreMenu')){
        btn.classList.toggle('active', ['photos','order','guide'].includes(t));
      }
    });
    document.querySelectorAll('.tab-more-menu button').forEach(btn => {
      const onclick = btn.getAttribute('onclick') || '';
      const m = onclick.match(/setTab\('([^']+)'\)/);
      if(m) btn.classList.toggle('active', m[1] === t);
    });
    // V54: keep the mobile drawer's active state / badges / current-tab label in sync,
    // and auto-close it after navigating (matches Sahkar's drawer behavior). No-op on
    // desktop since the drawer is never open there.
    const drawerNav = document.getElementById('drawerNav');
    if(drawerNav){
      drawerNav.innerHTML = renderDrawerNav(dashStats().totalFarmers);
    }
    const curLabel = document.getElementById('mobNavCurrent');
    if(curLabel) curLabel.textContent = TAB_LABELS[t] || '';
    toggleDrawer(false);
    setTimeout(() => { if(loader) loader.classList.remove('active'); }, 220);
  });
};

function pendingReviewCount(){
  // V65: also count approved submissions carrying new (pendingReview-flagged) items,
  // so the સમીક્ષા badge lights up when a farmer adds a product after approval.
  return Object.keys(SUBS).filter(fid => {
    const s = SUBS[fid];
    if(!s) return false;
    if(s.status === 'pending') return true;
    return s.status === 'approved' && Array.isArray(s.items) && s.items.some(it => it && it.pendingReview);
  }).length;
}

// V60: single source of truth for "કુલ ખેડૂત / મોકલાઈ / બાકી / પ્રકાશિત" — scoped to farmers
// assigned to a currently-OPEN haat (same eligibility rule as renderHaatProgress's funnel).
// Was previously recomputed independently in 4 places (topbar strip, dashboard cards, and two
// tab-badge refreshers), 3 of which counted ALL farmers regardless of haat status and 2 of
// which also still had the pre-V40 rawText-only submitted check — every fix to one copy left
// the others stale. Route every one of those call sites through here instead.
function dashStats(){
  const openCodes = new Set(Object.entries(HAATS).filter(([c,h])=>h&&h.open).map(([c])=>c));
  const eligible = FARMERS.filter(f => Array.isArray(f.haatCodes) && f.haatCodes.some(c=>openCodes.has(c)));
  const eligibleIds = new Set(eligible.map(f=>f.id));
  const totalFarmers = eligible.length;
  const submittedCount = eligible.filter(f=>{ const s=SUBS[f.id]; return s && (s.rawText || (Array.isArray(s.items) && s.items.length>0)); }).length;
  const publishedCount = eligible.filter(f=>Array.isArray(SUBS[f.id]?.items) && SUBS[f.id].items.length>0).length;
  const pendingCount = Math.max(0, totalFarmers - submittedCount);
  const pendingPub = Math.max(0, submittedCount - publishedCount);
  return {totalFarmers, submittedCount, publishedCount, pendingCount, pendingPub, eligibleIds};
}

// V40: 3-stage haat progress funnel — ભાવ → લાવેલો જથ્થો → બાકી જથ્થો. A farmer counts as
// "done" for a stage when ANY of their items carries that data (quantity is often filled on
// only some items — that still means they've engaged with the stage). Tap a row to see WHO is
// done / pending by name, so the admin knows exactly whom to chase.
// V41: true funnel semantics — stage 1's pool is only farmers assigned to a currently-OPEN
// haat (the rest can't submit this week, counting them just deflates the number); stage 2
// counts among stage-1 completers; stage 3 among stage-2 completers. All numbers derive live
// from SUBS, so "start fresh" (which archives+clears submissions) resets this automatically.
function itemHasQty(it){
  if(!it) return false;
  if(it.qtyByHaat && typeof it.qtyByHaat === 'object'){ let t=0; Object.values(it.qtyByHaat).forEach(v=>t+=+v||0); return t>0; }
  return (+it.qty||0) > 0;
}
function renderHaatProgress(){
  const openCodes = new Set(Object.entries(HAATS).filter(([c,h])=>h&&h.open).map(([c])=>c));
  const cardShell = inner => `
    <div class="card" style="padding:14px 18px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px">
        <h3 style="margin:0 0 4px">હાટ પ્રગતિ — 3 તબક્કા</h3>
        ${openCodes.size?`<span style="font-size:11.5px;color:var(--green2);font-weight:600">${openCodes.size} હાટ ઓપન</span>`:''}
      </div>
      ${inner}
    </div>`;
  if(!openCodes.size) return cardShell(`<div style="color:var(--muted);font-size:13px">હાલ કોઈ હાટ ઓપન નથી — હાટ ઓપન થાય પછી પ્રગતિ અહીં દેખાશે.</div>`);
  const eligible = FARMERS.filter(f => Array.isArray(f.haatCodes) && f.haatCodes.some(c=>openCodes.has(c)));
  const s1t = s => !!(s && (s.rawText || (Array.isArray(s.items)&&s.items.length>0)));
  const s2t = s => !!(s && Array.isArray(s.items) && s.items.some(itemHasQty));
  const s3t = s => !!(s && Array.isArray(s.items) && s.items.some(it=>it && it.qtyRemaining!=null && it.qtyRemaining!==''));
  const split = (pool, test) => { const done=[], pending=[]; pool.forEach(f => (test(SUBS[f.id]) ? done : pending).push(f)); return {done, pending}; };
  const st1 = split(eligible, s1t);
  const st2 = split(st1.done, s2t);
  const st3 = split(st2.done, s3t);
  const stages = [
    {key:'price', icon:'💰', label:'1. ભાવ મોકલ્યા',        r:st1, ofLabel:'ઓપન હાટના ખેડૂતમાંથી',  hint:'submission આવી ગઈ (ભાવ સાથે)', width:100},
    {key:'qty',   icon:'🧺', label:'2. લાવેલો જથ્થો ભર્યો', r:st2, ofLabel:'ભાવ મોકલનારામાંથી',      hint:'હાટ પહેલા ભરવાનો',            width:88},
    {key:'baaki', icon:'📦', label:'3. બાકી જથ્થો ભર્યો',   r:st3, ofLabel:'જથ્થો ભરનારામાંથી',      hint:'હાટ પછી ભરવાનો',              width:76},
  ];
  const nameList = arr => arr.length ? arr.map(f=>`<div style="padding:2px 0">${esc(f.name || f.id)}</div>`).join('') : '<div style="color:var(--muted);padding:2px 0">—</div>';
  const rows = stages.map(st => {
    const done = st.r.done, pending = st.r.pending;
    const of = done.length + pending.length;
    const pct = of ? Math.round(done.length / of * 100) : 0;
    return `
      <div style="border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;width:${st.width}%">
        <div onclick="toggleDashStage('${st.key}')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer">
          <span style="font-size:17px">${st.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <span style="font-size:13.5px;font-weight:600">${st.label}</span>
              <span style="font-size:13px"><b>${done.length}</b><span style="color:var(--muted)">/${of}</span></span>
            </div>
            <div style="height:6px;background:var(--bg);border:1px solid var(--border);border-radius:3px;margin-top:5px"><div style="height:100%;width:${pct}%;background:var(--green3);border-radius:3px"></div></div>
            <div style="font-size:10.5px;color:var(--muted);margin-top:3px">${of} ${st.ofLabel}</div>
          </div>
          <span id="dsg_${st.key}_arr" style="font-size:10px;color:#999">▶</span>
        </div>
        <div id="dsg_${st.key}" style="display:none;border-top:1px solid var(--border);padding:10px 12px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px;max-height:220px;overflow-y:auto">
            <div><div style="color:var(--green2);font-weight:700;margin-bottom:5px">✓ પૂરું (${done.length})</div>${nameList(done)}</div>
            <div><div style="color:var(--orange);font-weight:700;margin-bottom:5px">⏳ બાકી (${pending.length})</div>${nameList(pending)}</div>
          </div>
          <div style="margin-top:6px;color:var(--muted);font-size:11px">${st.hint}</div>
        </div>
      </div>`;

function auditSummary(e){
  const bits=[];
  if(e.renamedFrom) bits.push(esc(e.renamedFrom)+' → '+esc(e.product||''));
  else if(e.product) bits.push(esc(e.product)+(e.isNew?' (નવું)':''));
  if(e.farmer) bits.push(esc(e.farmer));
  if(e.count!=null) bits.push(e.count+' ખેડૂત');
  if(e.items!=null) bits.push(e.items+' વસ્તુ');
  if(e.note) bits.push('"'+esc(String(e.note).slice(0,40))+'"');
  if(e.reason) bits.push('"'+esc(String(e.reason).slice(0,40))+'"');
  return bits.join(' • ');
}

// IST (UTC+5:30) calendar date for a timestamp — customer views are bucketed by IST day.
function istDate(ms){ return new Date((ms==null?Date.now():ms) + 330*60000).toISOString().slice(0,10); }
// Weekday index (0=Sun) for a plain YYYY-MM-DD, independent of the admin's own timezone.
function dowUTC(d){ return new Date(d+'T00:00:00Z').getUTCDay(); }

// V49: Customer Views → Excel (Daily + Weekly + Summary). Reuses the shared SheetJS loader.
window.exportCustomerViewsExcel = async () => {
  toast("📊 Excel તૈયાર થાય છે…","ok");
  try{
    if(!_xlsxLib) _xlsxLib = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
    const XLSX = _xlsxLib;
    const cs = (await fbRef('catalogViews').get()).val() || {};
    const byDate = cs.byDate || {}, byWeek = cs.byWeek || {}, devs = cs.uniqueDevices || {}, dd = cs.dailyDevices || {};
    const totalViews = +cs.totalViews || 0;
    const uniqueDevices = Object.keys(devs).length;
    // Devices grouped by their LAST-seen date (the data only keeps last visit per device,
    // so this approximates daily-unique; the per-date sum equals total unique devices).
    const devByDate = {};
    Object.values(devs).forEach(ts=>{ if(typeof ts==='number' && ts>0){ const k=istDate(ts); devByDate[k]=(devByDate[k]||0)+1; } });
    const WD=['રવિ','સોમ','મંગળ','બુધ','ગુરુ','શુક્ર','શનિ'];
    const dates=[...new Set([...Object.keys(byDate),...Object.keys(devByDate),...Object.keys(dd)])].sort();
    // Daily-unique + running cumulative from the accurate per-day device sets (dailyDevices).
    // Blank on days before that tracking existed; the last-visit approximation stays for those.
    const seen = new Set();
    const daily = dates.map(d=>{
      const set = dd[d] ? Object.keys(dd[d]) : null;
      let dU='', cU='';
      if(set){ set.forEach(k=>seen.add(k)); dU=set.length; cU=seen.size; }
      return {
        'તારીખ': d,
        'વાર': (WD[dowUTC(d)]||''),
        'Daily clicks': +(byDate[d]||0),
        'Daily unique visitors': dU,
        'Cumulative unique': cU,
        'Unique devices (approx · last visit)': +(devByDate[d]||0)
      };
    });
    const weekly = Object.keys(byWeek).sort((a,b)=>(+a||0)-(+b||0)).map(w=>({'અઠવાડિયું':w,'Clicks':+(byWeek[w]||0)}));
    const peak = dates.reduce((b,d)=>(+(byDate[d]||0)>+(byDate[b]||0)?d:b), dates[0]||'');
    const daysTracked = Object.keys(byDate).length;
    const ddStart = Object.keys(dd).sort()[0] || '—';
    const summary = [
      {'Metric':'કુલ clicks (views)','Value':totalViews},
      {'Metric':'All-time unique devices (till today)','Value':uniqueDevices},
      {'Metric':'પહેલી તારીખ','Value':dates[0]||'—'},
      {'Metric':'છેલ્લી તારીખ','Value':dates[dates.length-1]||'—'},
      {'Metric':'Days with clicks','Value':daysTracked},
      {'Metric':'સરેરાશ clicks/day','Value':daysTracked?Math.round(totalViews/daysTracked*10)/10:0},
      {'Metric':'સૌથી વધુ clicks (દિવસ)','Value':peak?(peak+' — '+(byDate[peak]||0)):'—'},
      {'Metric':'Daily-unique tracking from','Value':ddStart},
      {'Metric':'Export','Value':new Date(Date.now()+330*60000).toISOString().slice(0,19).replace('T',' ')+' IST'}
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), 'Summary');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(daily), 'Daily');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(weekly), 'Weekly');
    XLSX.writeFile(wb, 'khedut-haat-customer-views-'+istDate()+'.xlsx');
    toast(`✅ Excel downloaded — ${daily.length} days · ${totalViews} views`,"ok");
  }catch(e){ console.error(e); toast("Excel નિષ્ફળ: "+(e.message||e),"err"); }
};

// ── V46/V47/V48: price anomaly detection ──
// vs the farmer's OWN last week: flag at ±25% (unambiguous — comparing a farmer to themselves).
// vs OTHER farmers: flag ONLY at an order-of-magnitude gap (~7×+ / ~⅐, a dropped/added zero) AND
// only when ≥3 other farmers sell the product (a real "typical" to compare against). With just
// 1-2 sellers there's no consensus — it's a coin toss and the median can't say who's right.
const PRICE_FLAG_PCT = 25;
const ORDER_OF_MAG = 6.5;
const MIN_PEER_SELLERS = 3;
function itemEffPrice(it){
  const base = +it.price||0;
  if(base>0) return base;
  const pbh = it.priceByHaat||{};
  const ps = Object.values(pbh).map(x=>+x||0).filter(x=>x>0);
  return ps.length ? Math.min(...ps) : 0;
}
function medianPriceForName(subsMap, name, excludeFid){
  const ps=[];
  Object.entries(subsMap||{}).forEach(([id,s])=>{
    if(id===excludeFid) return;
    if(!s || s.status==='rejected' || !Array.isArray(s.items)) return;
    s.items.forEach(it=>{ if(it && it.name===name){ const p=itemEffPrice(it); if(p>0) ps.push(p); } });
  });
  if(!ps.length) return {price:0, n:0};
  ps.sort((a,b)=>a-b);
  const m=Math.floor(ps.length/2);
  return {price: ps.length%2 ? ps[m] : Math.round((ps[m-1]+ps[m])/2), n: ps.length};
}
function priceBaseline(name, fid){
  // 1. same farmer's last-week price (only if that submission was approved/pending)
  const pw = PREV_SUBS[fid];
  const okPw = pw && (pw.status==='approved' || pw.status==='pending' || !pw.status);
  const lw = (okPw && Array.isArray(pw.items)) ? pw.items.find(x=>x && x.name===name) : null;
  const lwp = lw ? itemEffPrice(lw) : 0;
  if(lwp>0) return {price:lwp, src:'farmer', n:1};
  // 2. typical (median) price for this product across ALL farmers last week (n = sellers)
  const m2 = medianPriceForName(PREV_SUBS, name, null);
  if(m2.price>0) return {price:m2.price, src:'week', n:m2.n};
  // 3. typical price across OTHER farmers this week (first-week / new-farmer safety net)
  const m3 = medianPriceForName(SUBS, name, fid);
  if(m3.price>0) return {price:m3.price, src:'peers', n:m3.n};
  return null;
}
function priceFlagFor(it, fid){
  if(!it) return {level:'none'};
  const price = itemEffPrice(it);
  if(price<=0) return {level:'none'};
  const b = priceBaseline(it.name, fid);
  if(!b) return {level:'none'};
  const pct = Math.round((price - b.price)/b.price*100);
  const ratio = price / b.price;
  const orderOfMag = (ratio <= 1/ORDER_OF_MAG || ratio >= ORDER_OF_MAG);   // ~10× — a dropped/added zero
  const hit = (b.src === 'farmer')
    ? (Math.abs(pct) >= PRICE_FLAG_PCT)               // own last week: ±25%
    : (orderOfMag && b.n >= MIN_PEER_SELLERS);        // other farmers: order-of-magnitude AND ≥3 sellers agree
  if(!hit) return {level:'none'};
  return {level: orderOfMag?'severe':'warn', baseline:b.price, price, pct, ratio, missingZero:orderOfMag, src:b.src, n:b.n, unit:it.unit||''};
}
function priceFlagMsg(pf){
  const ref = pf.src==='farmer' ? `ગયા હાટે ₹${pf.baseline}` : `બીજા ${pf.n} ખેડૂત ~₹${pf.baseline}`;
  const dir = pf.pct<0 ? `${Math.abs(pf.pct)}% ઓછું` : `${pf.pct}% વધુ`;
  const zero = pf.missingZero ? (pf.pct<0 ? ' · શું છેલ્લો 0 છૂટી ગયો?' : ' · એક 0 વધારે તો નથી?') : '';
  return `${ref} → અત્યારે ₹${pf.price} · ${dir}${zero}. તપાસો.`;
}
function subFlagCount(fid){
  const items = (SUBS[fid] && Array.isArray(SUBS[fid].items)) ? SUBS[fid].items : [];
  return items.reduce((n,it)=> n + (priceFlagFor(it, fid).level!=='none'?1:0), 0);
}
function collectFlaggedItems(){
  const out=[];
  Object.keys(SUBS).forEach(fid=>{
    const s=SUBS[fid]; if(!s || s.status==='rejected' || !Array.isArray(s.items)) return;
    s.items.forEach((it,idx)=>{ const pf=priceFlagFor(it,fid); if(pf.level!=='none') out.push({fid,idx,it,pf,name:s.farmerName||fid,status:s.status||'approved'}); });
  });
  return out;
}

}

    const live = (await ref.get()).val();
    if(!live || !Array.isArray(live.items)){ toast("Submission મળી નથી","err"); return; }
    const items = live.items.map(it => { if(it && it.pendingReview){ const c = {...it}; delete c.pendingReview; return c; } return it; });
    await ref.update({ items });
    if(SUBS[fid]) SUBS[fid].items = items;
    logAudit && logAudit('approve-new-items', 'weekly/'+WK+'/submissions/'+fid, {});
    toast("✓ નવી વસ્તુ મંજૂર — કેટલોગમાં દેખાશે","ok");

let REVIEW_FILTER = 'pending';
function renderReview(){

      ${tile('notyet','⊘','Not yet', notYetIds.length, '#fff', 'var(--border)', 'var(--text)', 'હજી મોકલી નથી')}

function renderReviewCard(fid){
  const sub = SUBS[fid];
  const f = FARMERS.find(x => x.id === fid) || {};
  const initial = (sub.farmerName || f.name || '?').trim().charAt(0);
  const ago = formatAgo(sub.updatedAt || sub.submittedAt);
  const items = sub.items || [];
  const reEdited = !!sub._reEdited;
  const prevItems = sub.previousItems || [];
  let changedCount = 0;
  if(reEdited && prevItems.length){
    const prevByName = new Map(prevItems.map(it => [it.name, it.price]));
    items.forEach(it => { if(prevByName.get(it.name) !== it.price) changedCount++; });
  }

  // Haat chips — prefer haatCodes (new), fall back to legacy haat text
  const haatCodes = Array.isArray(sub.farmerHaatCodes) && sub.farmerHaatCodes.length
    ? sub.farmerHaatCodes
    : (Array.isArray(f.haatCodes) ? f.haatCodes : []);
  const haatChips = (() => {
    if(haatCodes.length){
      return haatCodes.map(c => {
        const name = HAATS[c]?.nameGu || HAATS[c]?.name || c;
        return `<span style="background:var(--green-pale);color:var(--green);font-size:12px;font-weight:600;padding:4px 10px;border-radius:14px;display:inline-flex;align-items:center;gap:4px">📍 ${esc(name)}</span>`;
      }).join(' ');
    }
    const haatStr = sub.farmerHaat || f.haat || '';
    return haatStr.split(/[,;|\/]/).map(s=>s.trim()).filter(Boolean).map(name =>
      `<span style="background:var(--green-pale);color:var(--green);font-size:12px;font-weight:600;padding:4px 10px;border-radius:14px;display:inline-flex;align-items:center;gap:4px">📍 ${esc(name)}</span>`
    ).join(' ');
  })();

  // For "vs last week" comparison — same farmer's last submission, indexed by item name
  const lastWkSub = PREV_SUBS[fid] || {};
  const lastWkItems = (lastWkSub.status === 'approved' || lastWkSub.status === 'pending')
    ? (lastWkSub.items || [])
    : [];
  const lastWkByName = new Map(lastWkItems.map(it => [it.name, {price: +it.price||0, qty: +it.qty||0}]));

  // Per-item rows — compact one-line; multi-haat products collapse, expanding to per-haat detail.
  let flagCount = 0;
  const itemRows = items.map((it, idx) => {
    const lw = lastWkByName.get(it.name);
    const unit = esc(it.unit || '');
    const qtyUnit = esc(it.qtyUnit || it.unit || '');
    const pbh = it.priceByHaat || {};
    const qbh = it.qtyByHaat || {};
    const codes = [...new Set([...Object.keys(qbh), ...Object.keys(pbh)])].filter(c => (+qbh[c] > 0) || (+pbh[c] > 0));
    const isMulti = codes.length > 1;
    const totalQty = Object.keys(qbh).length ? Object.values(qbh).reduce((s,v) => s + (+v||0), 0) : (+it.qty||0);

    const pf = priceFlagFor(it, fid);           // V46: price sanity vs baseline
    const flagged = pf.level !== 'none';
    if(flagged) flagCount++;

    // Price: single, or a min–max range when per-haat prices differ
    let priceStr;
    if(isMulti){
      const ps = codes.map(c => +pbh[c] || +it.price || 0).filter(x => x > 0);
      const mn = ps.length ? Math.min(...ps) : (+it.price||0), mx = ps.length ? Math.max(...ps) : (+it.price||0);
      priceStr = (mn !== mx) ? `₹${mn}–${mx}` : `₹${mn}`;
    } else {
      priceStr = `₹${esc(it.price)}`;
    }

    // Status badge (vs last week): NEW, or ↑/↓ % — suppressed when the anomaly box takes over
    let badge = '';
    if(flagged){
      badge = '';
    } else if(!lw){
      badge = `<span class="rv-chip" style="color:var(--green2);background:var(--green-pale);font-weight:600">NEW</span>`;
    } else if(lw.price > 0 && +it.price > 0 && +it.price !== lw.price){
      const diff = +it.price - lw.price, pct = Math.round(diff / lw.price * 100), big = Math.abs(pct) >= 30;
      badge = `<span class="rv-chip" title="ગયા હાટે ₹${lw.price}" style="color:${big?'var(--red)':'var(--muted)'};background:${big?'#fdeaea':'#f0efe9'}">${diff>0?'↑':'↓'}${Math.abs(pct)}%</span>`;
    }
    // Qty anomaly flag (⚠️) — far above/below last week
    let flag = '';
    if(it.qty && lw && lw.qty > 0){
      const r = +it.qty / lw.qty;
      if(r >= 5 || r <= 0.2) flag = ` <span title="ગયા હાટે ${lw.qty}" style="color:var(--red);font-weight:700">⚠️</span>`;
    }

    const priceCell = `<span class="rv-amt">${priceStr}</span><span class="rv-unt">/${unit}</span>`;
    const head = `<span style="font-size:15px">${esc(it.emoji||'🌿')}</span><span class="rv-nm">${esc(it.name)}${flag}</span><span class="rv-cat">${esc(it.cat||'')}</span>`;

    let rowInner;
    if(!isMulti){
      const qtyChip = totalQty > 0
        ? `<span class="rv-chip" style="color:var(--green2);background:var(--green-pale)">${totalQty} ${qtyUnit}</span>`
        : `<span class="rv-chip" style="color:var(--orange);background:#fbe9dd">જથ્થો નથી</span>`;
      rowInner = `<div class="rv-row"${flagged?'':' style="border-bottom:1px solid var(--border)"'}>${head}${qtyChip}${badge}<span style="flex:1"></span>${priceCell}<span style="width:14px;flex-shrink:0"></span></div>`;
    } else {
      // Multi-haat → collapsible: summary one-liner, expand for per-haat price + qty
      const totalChip = `<span class="rv-chip" style="color:var(--muted);background:#f2f0ea">${codes.length} હાટ · ${totalQty>0?`${totalQty} ${qtyUnit}`:'જથ્થો નથી'}</span>`;
      const det = codes.map(c => {
        const nm = HAATS[c]?.nameGu || HAATS[c]?.name || c;
        const q = +qbh[c] || 0, p = +pbh[c] || +it.price || 0;
        return `<div class="dr"><span style="width:108px;color:var(--muted)">📍 ${esc(nm)}</span><span style="width:100px;color:var(--orange);font-weight:600">₹${p}/${unit}</span><span style="color:var(--green2)">${q?`${q} ${qtyUnit}`:'—'}</span></div>`;
      }).join('');
      rowInner = `<details class="rv-d"${flagged?'':' style="border-bottom:1px solid var(--border)"'}><summary class="rv-row">${head}${totalChip}${badge}<span style="flex:1"></span>${priceCell}<span class="rv-chev">▸</span></summary><div class="rv-det">${det}</div></details>`;
    }

    if(!flagged) return rowInner;
    const sev = pf.level === 'severe';
    const bd = sev ? 'var(--red)' : '#e0a83c';
    const bgc = sev ? '#fdeaea' : '#fbf3e2';
    const tc = sev ? 'var(--red)' : '#9a6a00';
    return `<div style="border:1.5px solid ${bd};background:${bgc};border-radius:8px;padding:2px 8px 8px;margin:7px 0">
      ${rowInner}
      <div style="display:flex;align-items:flex-start;gap:6px;font-size:12px;color:${tc};padding:3px 4px 0;line-height:1.5">
        <span style="flex-shrink:0">⚠️</span>
        <span style="flex:1">${esc(priceFlagMsg(pf))}</span>
        <button class="btn-sm" style="padding:3px 9px;font-size:11px;flex-shrink:0" onclick="fixItemPrice('${esc(fid)}',${idx})">ભાવ સુધારો</button>
      </div>
    </div>`;
  }).join('');

  // Per-haat totals (sum of qtyByHaat across items)
  const haatTotals = {};
  items.forEach(it => {
    if(it.qtyByHaat){
      Object.entries(it.qtyByHaat).forEach(([code, q]) => {
        if(+q > 0) haatTotals[code] = (haatTotals[code]||0) + (+q);
      });
    }
  });
  const haatTotalsHtml = Object.keys(haatTotals).length
    ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;padding-top:8px;border-top:1px solid var(--border)">
        ${Object.entries(haatTotals).map(([code, qty]) => {
          const name = HAATS[code]?.nameGu || HAATS[code]?.name || code;
          return `<span style="background:var(--green-pale);color:var(--green);font-size:12px;padding:4px 10px;border-radius:8px;font-weight:600">📍 ${esc(name)}: ${qty} kg</span>`;
        }).join('')}
      </div>` : '';

  return `
    <div class="card" style="margin-bottom:12px;padding:0;overflow:hidden" data-fid="${esc(fid)}">
      <div style="padding:14px 16px;background:linear-gradient(180deg,var(--orange-pale),#fff)">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="width:42px;height:42px;border-radius:50%;background:#fff;color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0;border:2px solid var(--orange-pale)">${esc(initial)}</div>
          <div style="min-width:0;flex:1">
            <div style="font-size:16px;font-weight:700;line-height:1.2">
              ${esc(sub.farmerName || f.name || fid)}
              ${reEdited ? '<span style="font-size:10px;color:var(--red);font-weight:600;background:#fff;border:1px solid var(--red);padding:2px 8px;border-radius:8px;margin-left:6px">⚠ Re-edited</span>' : ''}
            </div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">📞 ${esc(sub.farmerPhone||f.phone||'')} • ⏱ ${esc(ago)}${reEdited?' • પહેલા approved હતું':''}</div>
            <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px">${haatChips}</div>
          </div>
          <span style="background:var(--orange);color:#fff;font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:14px;flex-shrink:0;align-self:flex-start">⏳ PENDING</span>
        </div>
      </div>

      ${flagCount>0 ? `<div style="display:flex;align-items:center;gap:8px;padding:9px 16px;background:#fdeaea;color:var(--red);font-size:12.5px;border-bottom:1px solid #f5c4c4"><span>⚠️</span><span><b>${flagCount}</b> ભાવ શંકાસ્પદ છે — approve કરતાં પહેલાં તપાસો</span></div>` : ''}

      <div style="padding:0 16px">${itemRows}</div>

      <div style="padding:12px 16px;background:var(--bg);border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <div style="font-size:13px;color:var(--text)">
            <b>${items.length}</b> વસ્તુ${reEdited && changedCount?` <span style="color:var(--red);font-size:11.5px">(${changedCount} ભાવ બદલાયા)</span>`:''}
          </div>
          ${haatTotalsHtml}
        </div>
      </div>

      ${sub.noteToFarmer ? `
        <div style="background:#fff8d6;border-top:1px solid #f7c800;padding:10px 16px;font-size:12.5px;color:#5a4400;display:flex;align-items:center;gap:10px">
          <span style="font-size:16px">📝</span>
          <span style="flex:1"><b>Note to farmer:</b> ${esc(sub.noteToFarmer)}</span>
          <button onclick="clearNote('${esc(fid)}')" style="background:none;border:none;color:#7a3010;cursor:pointer;font-size:16px;padding:2px 7px;font-family:inherit" title="Remove">✕</button>
        </div>
      ` : ''}

      <div style="display:flex;gap:8px;padding:11px 16px;border-top:1px solid var(--border);flex-wrap:wrap;justify-content:flex-end">
        <button class="btn-sm" onclick="openNote('${esc(fid)}')">📝 ${sub.noteToFarmer?'Edit note':'Note'}</button>
        <button class="btn-sm" onclick="editSubmission('${esc(fid)}')">✏️ Edit</button>
        <button class="btn-sm" style="background:#fdeaea;color:#b91c1c;border-color:#f0b4b4" onclick="deleteSubmission('${esc(fid)}')" title="આ entry કાયમ delete કરો">🗑️ Delete</button>
        <button class="btn-sm" style="background:var(--red-pale);color:var(--red);border-color:#f5c4c4" onclick="rejectSubmission('${esc(fid)}')">✗ Reject</button>
        <button class="btn-sm primary" onclick="approveSubmission('${esc(fid)}')">✓ Approve</button>
      </div>
    </div>
  `;
}

function setTabBodyHtml(){
  const el = document.getElementById('tabBody'); if(el) el.innerHTML = renderTab();
  // V60: every mutating handler (approve/reject/price-fix/haat-toggle/product-edit/design-save)
  // re-renders through here after updating in-memory state — one hook keeps the customer-facing

  scheduleSnapshotWrite();
}
// Display week number — uses the editable meta.weekNum (e.g. 497) instead of the raw RTDB key
// (which can be a test name like "test_probe"). Falls back to the key only if no number set.
function wkDisp(){ return (WK_META && WK_META.weekNum) || WK; }
// V12: live Mon→Sun date range of the current week, formatted DD-MM-YYYY to DD-MM-YYYY
function weekRange(d){
  d = d || new Date();
  const day = (d.getDay()+6)%7;            // 0=Mon … 6=Sun
  const mon = new Date(d); mon.setDate(d.getDate()-day);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const f = x => String(x.getDate()).padStart(2,'0')+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+x.getFullYear();
  return f(mon)+' to '+f(sun);
}
// Single-date label (dd-mm-yyyy) — default for the "નવા સબમિશન" haat-date field.
function todayLabel(d){
  d = d || new Date();
  return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear();
}
function formatAgo(ts){
  if(!ts) return "";
  const m = Math.round((Date.now()-ts)/60000);
  if(m<1)  return "હમણાં જ";
  if(m<60) return m+" મિનિટ પહેલા";
  const h = Math.round(m/60);
  if(h<24) return h+" કલાક પહેલા";
  return Math.round(h/24)+" દિવસ પહેલા";
}

window.approveSubmission = async (fid) => {
  if(_busy) return;
  const flags = subFlagCount(fid);   // V46: block on suspicious prices until acknowledged
  if(flags>0 && !(await asyncConfirm(`${flags} ભાવ શંકાસ્પદ છે (ગયા હાટ કરતાં ±25% કે બીજા ખેડૂત કરતાં ~10 ગણો ફરક). છતાં approve કરવું છે?`, 'હા, approve કરો', 'ના, તપાસું'))) return;
  if(_busy) return; _busy = true;
  try{
    await fbRef('weekly/'+WK+'/submissions/'+fid).update({
      status: 'approved',
      approvedAt: firebase.database.ServerValue.TIMESTAMP,
      qtyUpdatedAt: null,   // Part B: reset qty-update marker on (re)approval
      _reEdited: null,
      previousItems: null,
      previousApprovedAt: null,
    });
    if(SUBS[fid]){
      SUBS[fid].status = 'approved';
      delete SUBS[fid]._reEdited;
      delete SUBS[fid].previousItems;
      delete SUBS[fid].qtyUpdatedAt;
    }
    logAudit('approve', 'submissions/'+fid, { farmer: (SUBS[fid]&&SUBS[fid].farmerName)||fid });
    toast("✓ Approved — catalog માં લાઈવ","ok");
    render();
  }catch(e){ console.error(e); toast("Approve નિષ્ફળ: "+(e.message||e),"err"); }
  finally{ _busy = false; }
};

window.approveAllPending = async () => {
  let pending = Object.keys(SUBS).filter(fid => SUBS[fid]?.status === 'pending');
  if(REVIEW_HAATS.size) pending = pending.filter(fid => fidHaatCodes(fid).some(c=>REVIEW_HAATS.has(c)));  // V13: respect active haat filter
  if(!pending.length) return toast("કંઈ pending નથી","err");
  if(!(await asyncConfirm(`બધી ${pending.length} pending submissions approve કરવી છે?`, 'હા, બધી approve કરો', 'રદ'))) return;
  if(_busy) return; _busy = true;
  const updates = {};
  pending.forEach(fid => {
    updates[`weekly/${WK}/submissions/${fid}/status`] = 'approved';
    updates[`weekly/${WK}/submissions/${fid}/approvedAt`] = firebase.database.ServerValue.TIMESTAMP;
    updates[`weekly/${WK}/submissions/${fid}/qtyUpdatedAt`] = null;   // Part B
    updates[`weekly/${WK}/submissions/${fid}/_reEdited`] = null;
    updates[`weekly/${WK}/submissions/${fid}/previousItems`] = null;
  });
  try{
    await fbRef('').update(updates);
    pending.forEach(fid => { SUBS[fid].status = 'approved'; });
    logAudit('approve-all', 'submissions', { count: pending.length });
    toast(`✓ ${pending.length} submissions approved`,"ok");
    render();
  }catch(e){ console.error(e); toast("Bulk approve નિષ્ફળ","err"); }
  finally{ _busy = false; }
};

/* ════════ TAB 2c: SUMMARY (NEW — haat-wise analytics) ════════ */
let SUMMARY_VENUE_FILTER = 'all';
let SUMMARY_EXPANDED = new Set();   // category keys with sub-table open
let SUMMARY_ITEM_OPEN = null;       // (legacy — kept for safety)

let CATEGORY_DISPLAY = [
  {key:'શાકભાજી',        label:'શાકભાજી',      emoji:'🥬', includes:['શાકભાજી']},
  {key:'ભાજી',           label:'ભાજી',         emoji:'🌿', includes:['ભાજી']},
  {key:'ફળ',             label:'ફળ',           emoji:'🥭', includes:['ફળ']},

  {key:'અનાજ/લોટ',       label:'અનાજ',         emoji:'🌾', includes:['અનાજ/લોટ']},
  {key:'તેલ',            label:'તેલ',          emoji:'🛢️', includes:['તેલ']},

  {key:'તૈયાર ભોજન',     label:'તૈયાર ભોજન',   emoji:'🍽️', includes:['તૈયાર ભોજન','ફરસાણ','પ્રવાહી']},
  {key:'અન્ય',           label:'અન્ય',          emoji:'🌿', includes:['અન્ય','']},
];

const EXPECTED_STAPLES = [
  {name:'ઘઉં',         catKey:'અનાજ/લોટ'},
  {name:'ચોખા',        catKey:'અનાજ/લોટ'},
  {name:'બાજરી',       catKey:'અનાજ/લોટ'},
  {name:'જુવાર',       catKey:'અનાજ/લોટ'},
  {name:'મગફળી તેલ',   catKey:'તેલ'},
  {name:'મધ',          catKey:'ગોળ/ખાંડ/મધ'},
  {name:'ગોળ',         catKey:'ગોળ/ખાંડ/મધ'},
  {name:'કેળાં',       catKey:'ફળ'},
  {name:'લીંબુ',        catKey:'શાકભાજી'},
  {name:'દૂધ',         catKey:'ડેરી'},
];

const KG_UNITS = new Set(['kg','કિલો','કિ.ગ્રા.','કિગ્રા','કિ.ગ્રા']);

function aggregateByVenue(){
  // for each approved (or legacy) sub: build {venueName, code} pairs and apply qty (per-haat if available, else flat)
  const venueMap = {}; // venue name -> { farmers: Set, items: {...} }
  Object.keys(SUBS).forEach(fid => {
    const sub = SUBS[fid];
    if(sub.status === 'pending' || sub.status === 'rejected' || sub.status === 'sent_back') return;

    // Prefer new farmerHaatCodes (per-haat qty possible) — fall back to legacy farmerHaat string
    let venueList; // [{name, code|null}]
    if(Array.isArray(sub.farmerHaatCodes) && sub.farmerHaatCodes.length){
      venueList = sub.farmerHaatCodes.map(code => ({
        name: HAATS[code]?.nameGu || HAATS[code]?.name || code,
        code,
      }));
    } else {
      const haat = sub.farmerHaat || '';
      if(!haat) return;
      venueList = haat.split(/[,;|\/]/).map(s=>s.trim()).filter(Boolean).map(name => ({name, code:null}));
    }
    if(!venueList.length) return;

    (sub.items||[]).forEach(it => {
      if(!it || !it.name || it.available === false) return;
      // The farmer's TOTAL brought for this product (sum of per-haat qty, or the flat qty).
      // Used for grand totals so multi-haat quantities sum correctly (and flat qty counts once).
      const farmerTotal = it.qtyByHaat
        ? Object.values(it.qtyByHaat).reduce((s,v)=>s+(+v||0),0)
        : (+it.qty||0);
      venueList.forEach(({name:v, code}) => {
        if(!venueMap[v]) venueMap[v] = {farmers: new Set(), items: {}};
        venueMap[v].farmers.add(fid);
        const k = it.name+'|'+it.unit;
        if(!venueMap[v].items[k]) venueMap[v].items[k] = {name:it.name, unit:it.unit, cat:it.cat, totalQty:0, withQty:0, withoutQty:0, contributors:[]};
        const ent = venueMap[v].items[k];

        // Per-haat qty if farmer split it; else flat qty applies to every venue (legacy)
        let qty = 0;
        if(it.qtyByHaat && code && it.qtyByHaat[code] != null){
          qty = +it.qtyByHaat[code] || 0;
        } else if(it.qty != null){
          qty = +it.qty || 0;
        }
        if(qty > 0){ ent.totalQty += qty; ent.withQty++; }
        else { ent.withoutQty++; }
        // qtyRemaining is cumulative across the farmer's haats (one number) — carried on every
        // venue contributor; the pivot dedupes by farmer so it's counted once per product.
        ent.contributors.push({fid, name:sub.farmerName||fid, qty: qty || null, farmerTotal, price:it.price, remaining: (it.qtyRemaining != null ? +it.qtyRemaining : null)});
      });
    });
  });
  return venueMap;
}

function mergeAllVenues(venueMap){
  // produce a single synthetic venue with deduped farmers + items combined
  const out = {farmers: new Set(), items: {}};
  Object.values(venueMap).forEach(v => {
    v.farmers.forEach(f => out.farmers.add(f));
    Object.entries(v.items).forEach(([k, ent]) => {
      if(!out.items[k]) out.items[k] = {name:ent.name, unit:ent.unit, cat:ent.cat, totalQty:0, withQty:0, withoutQty:0, contributors:[], _seen:new Set()};
      const tgt = out.items[k];
      ent.contributors.forEach(c => {
        if(tgt._seen.has(c.fid)) return; // same farmer counted only once across venues
        tgt._seen.add(c.fid);
        const ft = c.farmerTotal != null ? +c.farmerTotal : (+c.qty||0);  // full per-farmer qty (sum of haats)
        if(ft > 0){ tgt.totalQty += ft; tgt.withQty++; }
        else { tgt.withoutQty++; }
        tgt.contributors.push(c);
      });
    });
  });
  Object.values(out.items).forEach(it => { delete it._seen; });
  return out;
}

function categoryKeyOf(it){
  const c = (it.cat||'').trim();
  for(const d of CATEGORY_DISPLAY){
    if(d.includes.includes(c)) return d.key;
  }
  return 'અન્ય';
}

function aggregateByCategory(venueData){
  const byCat = {};
  CATEGORY_DISPLAY.forEach(d => {
    byCat[d.key] = {key:d.key, label:d.label, emoji:d.emoji, products: new Map(), farmers: new Set(), kgTotal:0, otherUnits:{}};
  });
  Object.values(venueData.items).forEach(it => {
    const ck = categoryKeyOf(it);
    const slot = byCat[ck];
    if(!slot.products.has(it.name)){
      slot.products.set(it.name, {name:it.name, items:[], farmers: new Set(), kgTotal:0, otherUnits:{}});
    }
    const p = slot.products.get(it.name);
    p.items.push(it);
    it.contributors.forEach(c => { p.farmers.add(c.fid); slot.farmers.add(c.fid); });
    const u = (it.unit||'').trim();
    const isKg = KG_UNITS.has(u.toLowerCase()) || KG_UNITS.has(u);
    if(isKg){
      p.kgTotal += it.totalQty;
      slot.kgTotal += it.totalQty;
    } else if(it.totalQty > 0){
      p.otherUnits[u] = (p.otherUnits[u]||0) + it.totalQty;
      slot.otherUnits[u] = (slot.otherUnits[u]||0) + it.totalQty;
    }
  });
  return byCat;
}

function computeLogistics(venueData, byCat){
  const totalFarmers = venueData.farmers.size;
  const totalProducts = Object.values(byCat).reduce((n, c) => n + c.products.size, 0);
  const trackedCats = CATEGORY_DISPLAY.filter(d => d.key !== 'અન્ય');
  const presentCats = trackedCats.filter(d => byCat[d.key].products.size > 0).length;

  // staple gaps — staples not present in any product name
  const allNames = new Set();
  Object.values(byCat).forEach(c => c.products.forEach((_,n) => allNames.add(n)));
  const gaps = EXPECTED_STAPLES.filter(s => !allNames.has(s.name));

  // empty + low categories
  const emptyCategories = trackedCats.filter(d => byCat[d.key].products.size === 0);
  const lowCategories = trackedCats.filter(d => {
    const n = byCat[d.key].products.size;
    return n > 0 && n <= 2;
  });

  // concentration risk per category: top product has >= 50% of category's total farmer-instances
  const concentrationCats = [];
  Object.values(byCat).forEach(c => {
    if(c.products.size < 2 || c.key === 'અન્ય') return;
    const counts = [...c.products.values()].map(p => p.farmers.size);
    const total = counts.reduce((n,x)=>n+x,0);
    const top = Math.max(...counts);
    if(total > 0 && top / total >= 0.5){
      concentrationCats.push(c.key);
    }
  });
  let concentrationLevel = 'ઓછું', concentrationColor = 'var(--green2)';
  if(concentrationCats.length >= 3){ concentrationLevel = 'ઊંચું'; concentrationColor = 'var(--red)'; }
  else if(concentrationCats.length >= 1){ concentrationLevel = 'મધ્યમ'; concentrationColor = 'var(--orange)'; }

  return {
    totalFarmers, totalProducts,
    diversityPresent: presentCats, diversityTotal: trackedCats.length,
    gaps, emptyCategories, lowCategories,
    concentrationLevel, concentrationColor, concentrationCats,
  };
}

function fmtOtherUnits(o){
  const ents = Object.entries(o).filter(([_,v]) => v > 0);
  if(!ents.length) return '';
  return ents.map(([u,v]) => `${(+v.toFixed(2))} ${esc(u)}`).join(' · ');
}

function renderSummary(){
  const venueMap = aggregateByVenue();
  const venueKeys = Object.keys(venueMap).sort((a,b)=> venueMap[b].farmers.size - venueMap[a].farmers.size);
  if(!venueKeys.length){
    return `<div class="card"><div class="state" style="padding:40px"><div class="state-icon">📊</div><div class="state-title">હજી કોઈ approved submission નથી</div><div class="state-body">ખેડૂત submit કરે અને admin approve કરે પછી અહીં totals દેખાશે.</div></div></div>`;
  }
  if(SUMMARY_VENUE_FILTER !== 'all' && !venueMap[SUMMARY_VENUE_FILTER]) SUMMARY_VENUE_FILTER = 'all';
  const pivotCols = SUMMARY_VENUE_FILTER === 'all' ? venueKeys : [SUMMARY_VENUE_FILTER];
  const activeData = SUMMARY_VENUE_FILTER === 'all' ? mergeAllVenues(venueMap) : venueMap[SUMMARY_VENUE_FILTER];
  const byCat = aggregateByCategory(activeData);
  const L = computeLogistics(activeData, byCat);

  return `
    ${renderHaatTabs(venueKeys, venueMap)}
    ${renderStatStrip(activeData, L, byCat)}
    ${renderAlertStrip(L)}
    ${renderCategoryTable(byCat, venueMap, pivotCols)}
  `;
}

function renderCategoryTable(byCat, venueMap, pivotCols){
  return `
    <div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">
