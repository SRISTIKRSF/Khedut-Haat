function renderCategoryPivot(catKey, venueMap, cols){
  // collect product rows × col cells
  const products = new Map(); // name -> {byVenue:{v: {kg, otherUnits, farmers:Set}}, allFarmers:Set, mergedKg, mergedOther:{}}
  const ensureP = (name) => {
    if(!products.has(name)) products.set(name, {name, byVenue:{}, allFarmers:new Set(), _seenForGrand:new Set(), mergedKg:0, mergedOther:{}, mergedRemKg:0, mergedRemOther:{}, hasRem:false});
    return products.get(name);
  };
  // 1) per-venue cells from venueMap[v].items (these have totalQty pre-summed)
  cols.forEach(v => {
    const venue = venueMap[v]; if(!venue) return;
    Object.values(venue.items).forEach(it => {
      if(categoryKeyOf(it) !== catKey) return;
      const p = ensureP(it.name);
      const u = (it.unit||'').trim();
      const isKg = KG_UNITS.has(u.toLowerCase()) || KG_UNITS.has(u);
      if(!p.byVenue[v]) p.byVenue[v] = {kg:0, otherUnits:{}, farmers:new Set()};
      const cell = p.byVenue[v];
      it.contributors.forEach(c => { cell.farmers.add(c.fid); p.allFarmers.add(c.fid); });
      if(isKg) cell.kg += it.totalQty;
      else if(it.totalQty > 0) cell.otherUnits[u] = (cell.otherUnits[u]||0) + it.totalQty;
    });
  });
  // 2) grand total: dedupe contributors by fid across venues (a farmer at 3 haats brings same stock — count once)
  cols.forEach(v => {
    const venue = venueMap[v]; if(!venue) return;
    Object.values(venue.items).forEach(it => {
      if(categoryKeyOf(it) !== catKey) return;
      const p = products.get(it.name); if(!p) return;
      const u = (it.unit||'').trim();
      const isKg = KG_UNITS.has(u.toLowerCase()) || KG_UNITS.has(u);
      const key = it.name+'|'+u;
      it.contributors.forEach(c => {
        const sk = key+'|'+c.fid;
        if(p._seenForGrand.has(sk)) return;
        p._seenForGrand.add(sk);
        // grand total = the farmer's FULL item qty (sum across their haats), counted once.
        const ft = c.farmerTotal != null ? +c.farmerTotal : (+c.qty||0);
        if(ft > 0){
          if(isKg) p.mergedKg += ft;
          else p.mergedOther[u] = (p.mergedOther[u]||0) + ft;
        }
        // Remaining (બાકી જથ્થો) — cumulative per farmer-product, counted once via the dedup above.
        if(c.remaining != null){
          p.hasRem = true;
          const rem = +c.remaining || 0;
          if(rem > 0){ if(isKg) p.mergedRemKg += rem; else p.mergedRemOther[u] = (p.mergedRemOther[u]||0) + rem; }
        }
      });
    });
  });

  const prodList = [...products.values()].sort((a,b) => b.allFarmers.size - a.allFarmers.size || b.mergedKg - a.mergedKg);
  if(!prodList.length){
    return `<div style="padding:14px 16px;color:var(--muted);font-size:12px">આ કેટેગરી માં કોઈ પ્રોડક્ટ નથી</div>`;
  }
  // Format a {kg, otherUnits} quantity pair for the Total / Remaining / Sold columns.
  const fmtQtyPair = (kg, other) => {
    const parts = [];
    if(kg > 0) parts.push(`<b>${+kg.toFixed(0)}</b>`);
    const o = Object.entries(other||{}).filter(([,v]) => v>0);
    if(o.length) parts.push(`<span style="font-size:9.5px;color:var(--muted)">${o.map(([u,v])=>`${+v.toFixed(0)}${esc(u)}`).join(' ')}</span>`);
    return parts.length ? parts.join(' ') : '<span style="color:var(--muted)">—</span>';
  };

  const HAAT_SHORT = {
    'નવજીવન':'નવ', 'સોલા':'સોલા', 'વસ્ત્રાપુર':'વસ્ત્રા', 'છારોડી':'છા',
    'ગાંધીનગર':'ગાં', 'પલોડિયા':'પલ', 'સૃષ્ટિ':'સૃષ્ટિ',
    'Aaryans Corporate Park':'આર્યન્સ',
    'BAOU':'BAOU', 'છારોડી (BAOU)':'BAOU',
  };
  const shortName = v => HAAT_SHORT[v] || (v.length > 5 ? v.slice(0,4)+'…' : v);
  const fmtCell = (cell) => {
    if(!cell || (cell.farmers.size === 0 && cell.kg === 0 && !Object.keys(cell.otherUnits).length)){
      return '<span style="color:var(--red);font-size:10px;font-weight:600">નથી</span>';
    }
    if(cell.kg > 0){
      const o = Object.entries(cell.otherUnits).filter(([,v])=>v>0);
      const ou = o.length ? `<span style="font-size:9.5px;color:var(--muted)"> +${o.map(([u,v])=>`${+v.toFixed(0)}${esc(u)}`).join(',')}</span>` : '';
      return `<b>${+cell.kg.toFixed(0)}</b>${ou}`;
    }
    const o = Object.entries(cell.otherUnits).filter(([,v])=>v>0);
    if(o.length){
      return `<span style="font-size:10px">${o.map(([u,v])=>`${+v.toFixed(0)}${esc(u)}`).join(' ')}</span>`;
    }
    return `<span style="color:var(--muted);font-size:10px">${cell.farmers.size}</span>`;
  };

  return `
    <div style="padding:8px 10px 12px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table style="width:100%;font-size:12px;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden">
        <thead>
          <tr style="background:#fff;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)">
            <th style="text-align:left;padding:7px 12px;font-weight:600;min-width:160px">પ્રોડક્ટ</th>
            ${cols.map(v => `<th style="text-align:right;padding:7px 8px;font-weight:600;white-space:nowrap;min-width:64px" title="${esc(v)}">${esc(shortName(v))}</th>`).join('')}
            <th style="text-align:right;padding:7px 12px;font-weight:600;background:var(--green-pale);color:var(--green2);white-space:nowrap;min-width:64px" title="કુલ લાવેલ જથ્થો (બધા હાટ)">કુલ આવ્યું</th>
            <th style="text-align:right;padding:7px 10px;font-weight:600;background:#fff3e0;color:#92400e;white-space:nowrap;min-width:56px" title="બાકી / વેચાયા વગર (બધા હાટ ભેગા)">બાકી</th>
            <th style="text-align:right;padding:7px 12px;font-weight:600;background:#e6f4ea;color:var(--green2);white-space:nowrap;min-width:60px" title="વેચાયું = કુલ આવ્યું − બાકી">વેચાયું</th>
          </tr>
        </thead>
        <tbody>
          ${prodList.map(p => {
            const broughtCell = fmtQtyPair(p.mergedKg, p.mergedOther);
            let remCell, soldCell;
            if(!p.hasRem){
              // No farmer has entered remaining yet → unknown, don't imply "all sold".
              remCell = '<span style="color:var(--muted)">—</span>';
              soldCell = '<span style="color:var(--muted)">—</span>';
            } else {
              remCell = fmtQtyPair(p.mergedRemKg, p.mergedRemOther);
              const soldKg = Math.max(0, p.mergedKg - p.mergedRemKg);
              const soldOther = {};
              Object.keys(p.mergedOther).forEach(u => { soldOther[u] = Math.max(0, (p.mergedOther[u]||0) - (p.mergedRemOther[u]||0)); });
              soldCell = fmtQtyPair(soldKg, soldOther);
            }
            return `
              <tr style="border-top:1px solid var(--border)">
                <td style="padding:7px 12px;font-weight:600;white-space:nowrap">${esc(p.name)} <span style="color:var(--muted);font-size:10.5px;font-weight:400">(${p.allFarmers.size})</span></td>
                ${cols.map(v => `<td style="padding:7px 8px;text-align:right;white-space:nowrap">${fmtCell(p.byVenue[v])}</td>`).join('')}
                <td style="padding:7px 12px;text-align:right;background:var(--green-pale);white-space:nowrap">${broughtCell}</td>
                <td style="padding:7px 10px;text-align:right;background:#fff8ef;white-space:nowrap">${remCell}</td>
                <td style="padding:7px 12px;text-align:right;background:#f1f9f3;white-space:nowrap;font-weight:600">${soldCell}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
      <div style="font-size:10px;color:var(--muted);margin-top:6px;line-height:1.5">
        💡 <b>(N)</b> = ખેડૂત. <b>નંબર</b> = kg. <b style="color:var(--muted)">મ્યુટ નંબર</b> = qty વગર ખેડૂત. <span style="color:var(--red)">નથી</span> = તે હાટ માં નથી. <b>કુલ આવ્યું</b> = બધા હાટ ભેગા (ખેડૂત દીઠ એક વાર). <b style="color:#92400e">બાકી</b> = વેચાયા વગર. <b style="color:var(--green2)">વેચાયું</b> = કુલ આવ્યું − બાકી. (બાકી ન ભર્યું હોય તો <b>—</b>.)
      </div>
    </div>
  `;
}

function uniqueItemNames(){
  const m = new Map(); // name -> {emoji, cat, count, photo, isMaster, masterId}
  // Source: every product ever submitted across all weeks
  ALL_PRODUCTS_MAP.forEach((v, name) => {
    m.set(name, {emoji:v.emoji, cat:v.cat, count:v.count});
  });
  // Add master products
  Object.values(MASTER_PRODUCTS).forEach(mp => {
    if(!mp || !mp.name || mp.active === false) return;
    const existing = m.get(mp.name);
    const photo = mp.photo || (existing && existing.photo) || PRODUCT_PHOTOS[photoKey(mp.name)] || '';
    m.set(mp.name, {
      emoji: mp.emoji || (existing?existing.emoji:CAT_EMOJI_MAP[mp.cat]) || '🌿',
      cat: mp.cat || (existing?existing.cat:''),
      count: existing?existing.count:0,
      photo,
      isMaster: true,
      masterId: mp.id,
      masterPrice: mp.price,
      masterUnit: mp.unit,
    });
  });
  // aliases live on the products/ node (PRODUCTS_DB); look up by name for search
  const aliasByName = {};
  Object.values(PRODUCTS_DB).forEach(p => { if(p && p.name && p.aliases) aliasByName[p.name] = p.aliases; });
  return [...m.entries()].map(([name,v])=>({
    name,
    emoji: v.emoji,
    cat: v.cat,
    count: v.count,
    photo: v.photo || photoForNameUrlOnly(name) || '',
    isMaster: !!v.isMaster,
    masterId: v.masterId,
    masterPrice: v.masterPrice,
    masterUnit: v.masterUnit,
    aliases: aliasByName[name] || '',
  }));
}

let CAT_EMOJI_MAP = {"શાકભાજી":"🥬","ભાજી":"🌿","ફળ":"🥭","ડેરી":"🥛","દાળ/કઠોળ":"🫘","અનાજ/લોટ":"🌾","મસાલા":"🌶️","તેલ":"🛢️","ગોળ/ખાંડ/મધ":"🍯","ફરસાણ":"🍪","પ્રવાહી":"🥤","તૈયાર ભોજન":"🍽️","અન્ય":"🌿"};
let CUSTOM_CATS = {};   // name -> emoji, loaded from settings/categories (admin-added)
// Merge admin-added categories into the built-in lists so all existing code picks them up.
function mergeCustomCats(custom){
  Object.entries(custom||{}).forEach(([name, emoji]) => {
    name = (name||'').trim(); if(!name) return;
    if(!(name in CAT_EMOJI_MAP)) CAT_EMOJI_MAP[name] = emoji || '🌿';
    if(!CATEGORY_DISPLAY.some(d => d.key === name)){
      const entry = {key:name, label:name, emoji:emoji||'🌿', includes:[name]};
      const idx = CATEGORY_DISPLAY.findIndex(d => d.key === 'અન્ય');   // keep 'અન્ય' last
      if(idx >= 0) CATEGORY_DISPLAY.splice(idx, 0, entry); else CATEGORY_DISPLAY.push(entry);
    }
  });
}
let CAT_LABELS = {};   // categoryKey -> custom display label (settings/categoryLabels). Display-only rename.
function catLabel(name){ return (CAT_LABELS && CAT_LABELS[name]) || name; }
// Apply custom display labels to CATEGORY_DISPLAY (keeps each entry's key/grouping; only label changes).
function applyCategoryLabels(){
  CATEGORY_DISPLAY.forEach(d => {
    if(d._origLabel == null) d._origLabel = d.label;
    d.label = (CAT_LABELS && CAT_LABELS[d.key]) || d._origLabel;
  });
}
// Reorder CATEGORY_DISPLAY by a saved order of category keys (settings/categoryOrder).
// Categories not in the saved order keep their current relative position, at the end.
function applyCategoryOrder(order){
  if(!Array.isArray(order) || !order.length) return;
  const rank = {}; order.forEach((n,i) => { rank[n] = i; });
  const tagged = CATEGORY_DISPLAY.map((d,i) => ({d, ord: (rank[d.key] != null ? rank[d.key] : 1000 + i)}));
  tagged.sort((a,b) => a.ord - b.ord);
  CATEGORY_DISPLAY.length = 0;
  tagged.forEach(t => CATEGORY_DISPLAY.push(t.d));
}

window.uploadMasterPhoto = async () => {
  if(!CLOUDINARY_CFG || !CLOUDINARY_CFG.cloudName) return toast("પહેલા Cloudinary સેટ કરો","err");
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = async () => {
    const f = inp.files[0]; if(!f) return;
    toast("Uploading…","ok");
    try{
      const dataUrl = await resizePhoto(f, 1200, 0.82);
      const fd = new FormData();
      fd.append('file', dataUrl);
      fd.append('upload_preset', CLOUDINARY_CFG.uploadPreset);
      fd.append('folder', 'sristi/masterProducts');
      const r = await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CFG.cloudName+'/image/upload', {method:'POST', body:fd});
      const j = await r.json();
      if(j.secure_url){
        const inp2 = document.getElementById('mpPh');
        if(inp2) inp2.value = j.secure_url;
        const prev = document.getElementById('mpPreview');
        if(prev){ prev.src = cloudinaryThumb(j.secure_url,160); prev.style.display='block'; }
        toast("✓ Upload થયું","ok");
      } else { toast("Upload નિષ્ફળ","err"); }
    }catch(e){ console.error(e); toast("Upload error","err"); }
  };
  inp.click();
};

function resizePhoto(file, maxDim, q){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const c = document.createElement('canvas');
        c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg', q));
      };
      img.onerror = rej;
      img.src = r.result;
    };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Cached module handle so the import only happens once per session
let _bgRemoveLib = null;

// Remove background from a File, data URI or https URL, composite on white, auto-trim + centre
// on a 512×512 square. Returns a Blob (WebP).
async function bgRemoveAndProcess(source) {
  if (!_bgRemoveLib) {
    // jsDelivr's "+esm" bundle: rewrites the lib's bare `import('onnxruntime-web')` to a
    // real CDN URL so it resolves in a plain browser (no bundler/import-map needed).
    // ONNX model + wasm files are fetched from the lib's own host (staticimgly.com, CORS-ok).
    _bgRemoveLib = await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/+esm');
  }
  const { removeBackground } = _bgRemoveLib;

  let inputBlob;
  if (source instanceof File || source instanceof Blob) {
    inputBlob = source;
  } else {
    const r = await fetch(source); inputBlob = await r.blob();
  }

  // BG removal → PNG with transparency
  const noBgBlob = await removeBackground(inputBlob);

  // Composite on white + auto-trim + pad + square 512×512
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const tmp = document.createElement('canvas');
      tmp.width = img.width; tmp.height = img.height;
      const tCtx = tmp.getContext('2d');
      tCtx.drawImage(img, 0, 0);
      const px = tCtx.getImageData(0, 0, img.width, img.height).data;
      let x0 = img.width, y0 = img.height, x1 = 0, y1 = 0;
      for (let y = 0; y < img.height; y++) {
        for (let x = 0; x < img.width; x++) {
          if (px[(y * img.width + x) * 4 + 3] > 10) {
            if (x < x0) x0 = x; if (x > x1) x1 = x;
            if (y < y0) y0 = y; if (y > y1) y1 = y;
          }
        }
      }
      if (x0 > x1 || y0 > y1) { x0 = 0; y0 = 0; x1 = img.width - 1; y1 = img.height - 1; }
      const sw = x1 - x0 + 1, sh = y1 - y0 + 1;
      const pad = Math.round(Math.max(sw, sh) * 0.10);
      const side = Math.max(sw, sh) + pad * 2;
      const SIZE = 512;
      const out = document.createElement('canvas');
      out.width = SIZE; out.height = SIZE;
      const ctx = out.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, SIZE, SIZE);
      const sc = SIZE / side;
      ctx.drawImage(tmp, (SIZE - sw * sc) / 2 - (x0 - pad) * sc, (SIZE - sh * sc) / 2 - (y0 - pad) * sc, img.width * sc, img.height * sc);
      out.toBlob(blob => resolve(blob), 'image/webp', 0.88);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(noBgBlob);
  });
}

let ORDER_OPEN = new Set();  // category keys with section expanded

function uniqueProductsByCategory(){
  // Group all unique product names (across all weeks + master) by display category
  const groups = {};
  CATEGORY_DISPLAY.forEach(d => { groups[d.key] = {def:d, names:new Set()}; });
  ALL_PRODUCTS_MAP.forEach((v, name) => {
    const ck = categoryKeyOf({cat:v.cat});
    groups[ck].names.add(name);
  });
  Object.values(MASTER_PRODUCTS).forEach(mp => {
    if(!mp || !mp.name || mp.active === false) return;
    const ck = categoryKeyOf({cat:mp.cat});
    groups[ck].names.add(mp.name);
  });
  return groups;
}

function orderedProductsForCategory(catKey, currentNames){
  const saved = Array.isArray(PRODUCT_ORDER[catKey]) ? PRODUCT_ORDER[catKey].slice() : [];
  const present = new Set(currentNames);
  const seen = new Set();
  const ordered = [];
  // 1) saved order, keeping only ones still present
  saved.forEach(n => { if(present.has(n) && !seen.has(n)){ ordered.push({name:n, isNew:false}); seen.add(n); } });
  // 2) new products at end, sorted alphabetically for stability
  const newOnes = [...currentNames].filter(n => !seen.has(n)).sort((a,b) => a.localeCompare(b,'gu'));
  newOnes.forEach(n => ordered.push({name:n, isNew:true}));
  return ordered;
}

function renderOrder(){
  const groups = uniqueProductsByCategory();
  const totalProducts = Object.values(groups).reduce((n, g) => n + g.names.size, 0);
  let totalNew = 0;
  Object.entries(groups).forEach(([k, g]) => {
    const o = orderedProductsForCategory(k, [...g.names]);
    totalNew += o.filter(x => x.isNew).length;

    ${CATEGORY_DISPLAY.map(d => {
      const g = groups[d.key];
      const ordered = orderedProductsForCategory(d.key, [...g.names]);

          </div>

              ${ordered.length === 0 ? `<div style="color:var(--muted);font-size:12px;padding:10px;text-align:center">આ કેટેગરી માં હજી કોઈ પ્રોડક્ટ નથી</div>` : ordered.map((p, i) => `

function destroyOrderSortables(){
  _orderSortableInstances.forEach(s => { try{ s.destroy(); }catch(e){} });
  _orderSortableInstances = [];
}

function initOrderSortables(){
  destroyOrderSortables();
  if(typeof Sortable === 'undefined') return;
  document.querySelectorAll('.order-list').forEach(list => {
    const inst = Sortable.create(list, {
      animation: 150,
      ghostClass: 'order-ghost',
      onEnd: async (evt) => {
        const cat = list.getAttribute('data-cat');
        const names = Array.from(list.querySelectorAll('.order-item')).map(el => el.getAttribute('data-name'));
        PRODUCT_ORDER[cat] = names;
        try{
          await fbRef('productOrder/'+cat).set(names);
          // refresh numeric labels in place to avoid full re-render
          Array.from(list.querySelectorAll('.order-item')).forEach((el, i) => {
            const num = el.querySelector('span:nth-child(2)');
            if(num) num.textContent = (i+1)+'.';
          });
          toast("✓ ક્રમ સાચવાયો","ok");
        }catch(e){
          console.error(e);
          toast("Save નિષ્ફળ — refresh કરી ફરી પ્રયત્ન","err");
        }
      }
    });
    _orderSortableInstances.push(inst);
  });
}

function productsByCategory(){
  const groups = {};
  CATEGORY_DISPLAY.forEach(d => { groups[d.key] = {def:d, items:[]}; });
  Object.entries(PRODUCTS_DB).forEach(([fbKey, p]) => {
    if(!p || p.active === false) return;
    p._fbKey = fbKey;
    const ck = categoryKeyOf({cat:p.cat});
    groups[ck].items.push(p);
  });
  Object.values(groups).forEach(g => g.items.sort((a,b) => (+a.order||0) - (+b.order||0)));
  return groups;
}

function destroyProductSortables(){
  _prodSortables.forEach(s => { try{ s.destroy(); }catch(e){} });
  _prodSortables = [];
}
function initProductSortables(){
  destroyProductSortables();
  if(typeof Sortable === 'undefined') return;
  document.querySelectorAll('.product-list').forEach(list => {
    const inst = Sortable.create(list, {
      animation: 150,
      ghostClass: 'order-ghost',
      onEnd: async () => {
        const ids = Array.from(list.querySelectorAll('.product-row')).map(el => el.getAttribute('data-id'));
        const updates = {};
        ids.forEach((id, idx) => {
          updates['products/'+id+'/order'] = idx;
          if(PRODUCTS_DB[id]) PRODUCTS_DB[id].order = idx;
        });
        try{
          await fbRef('').update(updates);
          // update displayed numbers in-place
          Array.from(list.querySelectorAll('.product-row')).forEach((el, i) => {
            const num = el.querySelector('span:nth-child(2)');
            if(num) num.textContent = (i+1)+'.';
          });
          toast("✓ ક્રમ સાચવાયો","ok");
        }catch(e){ toast("Save નિષ્ફળ","err"); }
      }
    });
    _prodSortables.push(inst);
  });
}

window.uploadProductPhoto = async () => {
  if(!CLOUDINARY_CFG || !CLOUDINARY_CFG.cloudName) return toast("Cloudinary સેટ નથી","err");
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = async () => {
    const f = inp.files[0]; if(!f) return;
    toast("✨ BG remove + process… (પ્રથમ વખત ~30s model download)","ok");
    let uploadBlob;
    try {
      uploadBlob = await bgRemoveAndProcess(f);
    } catch(e) {
      console.warn('BG removal failed, falling back to resize:', e);
      toast("⚠️ BG remove ન થઈ — original upload…","ok");
      const dataUrl = await resizePhoto(f, 800, 0.85);
      uploadBlob = await (await fetch(dataUrl)).blob();
    }
    try{
      toast("☁️ Cloudinary upload…","ok");
      const fd = new FormData();
      fd.append('file', uploadBlob, 'product.webp');
      fd.append('upload_preset', CLOUDINARY_CFG.uploadPreset);
      fd.append('folder', 'sristi/products');
      const r = await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CFG.cloudName+'/image/upload', {method:'POST', body:fd});
      const j = await r.json();
      if(j.secure_url){
        const inp2 = document.getElementById('pdPh');
        if(inp2) inp2.value = j.secure_url;
        const prev = document.getElementById('pdPreview');

window.standardiseAllPhotos = async () => {
  if(!CLOUDINARY_CFG?.cloudName) return toast("Cloudinary સેટ નથી","err");
  // Include products with photo in product record OR in productPhotos (slicer uploads)
  const withPhotos = Object.values(PRODUCTS_DB).filter(p => {
    const url = p.photo || photoForName(p.name);
    return !!(url && (url.startsWith('https://') || url.startsWith('data:')));
  });
  if(!withPhotos.length) return toast("Photos ન મળ્યા","err");
  const ok = await asyncConfirm(
    `${withPhotos.length} products ના photos standardise કરવા છે?\n\nBG remove + white background + 512×512 square.\n\nPrthom vaar ~30s model download thay. Pachhi fast.\n\nOriginal Cloudinary URLs replace thashe.`,
    'હા, standardise કરો', 'રદ'
  );
  if(!ok) return;
  // Backup all current photo URLs to a LOCAL JSON file before touching anything.
  // (RTDB backups/ path is blocked by security rules, so we download instead — free, bulletproof.)
  const backupKey = 'backup_' + Date.now();
  const backup = {};
  withPhotos.forEach(p => { backup[p.id] = { name: p.name, photo: p.photo || photoForNameUrlOnly(p.name) || '(slicer-datauri)' }; });
  try {
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'khedut-haat-photoUrls-' + backupKey + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
    toast("✅ Backup downloaded — " + a.download, "ok");
    await new Promise(r => setTimeout(r, 1500));
  } catch(e) {
    console.warn('Backup failed', e);
    toast("⚠️ Backup download ન થઈ", "err");
    await new Promise(r => setTimeout(r, 2000));
  }
  let done=0, failed=0;
  for(const p of withPhotos){
    toast(`${done+failed+1}/${withPhotos.length} — ${p.name}…`,"ok");
    try{
      const srcUrl = p.photo || photoForName(p.name);
      const processed = await bgRemoveAndProcess(srcUrl);
      const fd = new FormData();
      fd.append('file', processed, 'product.webp');
      fd.append('upload_preset', CLOUDINARY_CFG.uploadPreset);
      fd.append('folder', 'sristi/products');
      const r = await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CFG.cloudName+'/image/upload',{method:'POST',body:fd});
      const j = await r.json();
      if(j.secure_url){
        await fbRef('products/'+p.id).update({photo:j.secure_url});
        PRODUCTS_DB[p.id].photo = j.secure_url;
        done++;
      } else { console.warn(p.name, j); failed++; }
    }catch(e){ console.warn(p.name, e); failed++; }
  }
  toast(`✓ ${done} standardised${failed?' • '+failed+' failed':''}`, done?'ok':'err');
  setTabBodyHtml();
};

// Reads a .xlsx/.csv with columns: A=Category, B=Product, C=Unit(optional, default kg).
// Categories must match CAT_EMOJI_MAP. Emoji defaults from the category. Shows a preview
// (new / already-exist / problem) before any write. Dedupe is by makeProductId(name).
let PRODUCT_IMPORT = null;   // {toCreate:[{id,name,cat,unit}], dupes:[], invalid:[{row,reason}]}
let _xlsxLib = null;

window.importProductsExcel = async () => {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.xlsx,.xls,.csv';
  inp.onchange = async () => {
    const f = inp.files[0]; if(!f) return;
    toast("📥 Excel વાંચાય છે…","ok");
    try{
      if(!_xlsxLib) _xlsxLib = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
      const XLSX = _xlsxLib;
      const buf = await f.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      // Prefer the "New products" sheet; else the first sheet.
      const sheetName = wb.SheetNames.find(n => /new\s*product/i.test(n)) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, blankrows:false, defval:''});
      const validCats = new Set(Object.keys(CAT_EMOJI_MAP));
      const toCreate = [], dupes = [], invalid = [], seenInFile = new Set();
      rows.forEach((r, i) => {
        const cat  = String(r[0]==null?'':r[0]).trim();
        const name = String(r[1]==null?'':r[1]).trim();
        const unit = String(r[2]==null?'':r[2]).trim() || 'kg';
        // skip header row and fully blank rows
        if(!cat && !name) return;
        if(/^category$/i.test(cat) && /^product$/i.test(name)) return;
        if(!name){ invalid.push({rowNo:i+1, cat, name, reason:'નામ ખાલી'}); return; }
        if(!cat){ invalid.push({rowNo:i+1, cat, name, reason:'કેટેગરી ખાલી'}); return; }
        if(!validCats.has(cat)){ invalid.push({rowNo:i+1, cat, name, reason:'અમાન્ય કેટેગરી'}); return; }
        const id = makeProductId(name);
        if(seenInFile.has(id)){ return; }   // duplicate within the file itself — keep first
        seenInFile.add(id);
        if(PRODUCTS_DB[id]){ dupes.push({id, name, cat}); return; }
        toCreate.push({id, name, cat, unit});
      });
      PRODUCT_IMPORT = {toCreate, dupes, invalid, sheetName};
      showImportPreview();
    }catch(e){ console.error(e); toast("Excel વાંચવામાં ભૂલ: "+(e.message||e),"err"); }
  };
  inp.click();
};

window.commitProductImport = async () => {
  if(!PRODUCT_IMPORT || !PRODUCT_IMPORT.toCreate.length) return;
  // only the ticked rows (read checkbox state before we close the modal)
  const checkedIdx = new Set([...document.querySelectorAll('.imp-chk:checked')].map(c => +c.dataset.idx));
  const toCreate = PRODUCT_IMPORT.toCreate.filter((_, i) => checkedIdx.has(i));
  if(!toCreate.length) return toast("એકપણ પ્રોડક્ટ select નથી","err");
  if(_busy) return; _busy = true;
  // append each new product to the end of its category
  const catNext = {};
  const orderFor = (cat) => {
    if(catNext[cat] == null){
      const same = Object.values(PRODUCTS_DB).filter(p => p.cat === cat);
      catNext[cat] = same.length ? Math.max(...same.map(p => +p.order||0)) + 1 : 0;
    }
    return catNext[cat]++;
  };
  const updates = {};
  const created = [];
  toCreate.forEach(r => {
    const data = {id:r.id, name:r.name, cat:r.cat, unit:r.unit, emoji:CAT_EMOJI_MAP[r.cat]||'🌿', photo:'', order:orderFor(r.cat), active:true, manual:true, addedAt:Date.now()};
    updates['products/'+r.id] = data;
    if(DELETED_PRODUCT_IDS.has(r.id)) updates['productsDeleted/'+r.id] = null;
    created.push(data);
  });
  try{
    await fbRef('').update(updates);
    created.forEach(d => { PRODUCTS_DB[d.id] = d; DELETED_PRODUCT_IDS.delete(d.id); PRODUCTS_OPEN_CATS.add(categoryKeyOf({cat:d.cat})); });
    logAudit('product-import', 'products', { count: created.length });
    closeModal();
    toast(`✓ ${created.length} પ્રોડક્ટ ઉમેરાયા`,"ok");
    PRODUCT_IMPORT = null;
    setTabBodyHtml();
  }catch(e){ console.error(e); toast("Import save નિષ્ફળ: "+(e.message||e),"err"); }
  finally{ _busy = false; }
};

let REPORTS_DATA = null;       // { weeks:[{key,wk,label,createdAt,subs}] }
let REPORTS_LOADING = false;

function monthKeyOf(createdAt){
  if(!createdAt) return '0000-00';
  const d = new Date(+createdAt);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function monthLabel(key){
  if(key === '0000-00') return 'અજ્ઞાત તારીખ';
  const [y,m] = key.split('-');
  const names = ['','જાન્યુ','ફેબ્રુ','માર્ચ','એપ્રિલ','મે','જૂન','જુલાઈ','ઓગસ્ટ','સપ્ટે','ઓક્ટો','નવે','ડિસે'];
  return (names[+m] || m) + ' ' + y;
}

async function loadReportsData(){
  if(REPORTS_LOADING) return;
  REPORTS_LOADING = true;
  try{
    const all = (await fbRef('weekly').get()).val() || {};
    const weeks = [];
    Object.entries(all).forEach(([key, w]) => {
      if(key === 'current' || !w || typeof w !== 'object') return;
      // Show the CURRENT (live) round for a week. "Start fresh" archives a round to
      // _archive/{k}/submissions and clears the live list so farmers can re-submit — so
      // combining live+archive would DOUBLE-COUNT everyone who re-submitted (inflating
      // farmer counts, kg and ₹). Use the live round; fall back to the most recent archive
      // ONLY when a week was reset but never re-collected (no live round), so its data still shows.
      let subs = w.submissions || {};
      if(!Object.keys(subs).length){
        const arch = w._archive || {};
        const lastKey = w._lastArchive || Object.keys(arch).sort().pop();
        subs = (lastKey && arch[lastKey] && arch[lastKey].submissions) || {};
      }
      if(!Object.keys(subs).length) return;
      const meta = w.meta || {};
      weeks.push({ key, wk: meta.weekNum || key, label: (meta.dateLabel || ('Week ' + (meta.weekNum || key))), createdAt: +meta.createdAt || 0, subs });
    });
    weeks.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
    REPORTS_DATA = { weeks };
  }catch(e){ console.error(e); toast("Reports load નિષ્ફળ","err"); REPORTS_DATA = { weeks: [] }; }
  finally{ REPORTS_LOADING = false; setTabBodyHtml(); }
}

// V37: factor to convert V36 qty (entered in qtyUnit, e.g. kg) → pricing units (e.g. 250gm).
// Legacy items have no qtyUnit field → factor = 1 (no change).
function qtyConvFactor(it){
  if(!it.qtyUnit || it.qtyUnit === it.unit) return 1;
  const u = String(it.unit || '').trim();
  const gm = u.match(/^(\d+)\s*gm$/i);
  if(gm) return 1000 / +gm[1];
  const ml = u.match(/^(\d+)\s*ml$/i);
  if(ml) return 1000 / +ml[1];
  return 1;
}

// Admin farmer DB (marketFarmers) is the source of truth for farmer identity.
// Resolve a submission's farmer to the canonical DB record by PHONE (stable across
// fid-scheme changes), then by fid. Returns the canonical name + a stable group key.
let _farmerDbCache = null;
function farmerDb(){
  if(_farmerDbCache && _farmerDbCache._n === FARMERS.length) return _farmerDbCache;
  const byPhone = {}, byId = {};
  FARMERS.forEach(f => { const ph = String(f.phone||'').replace(/\D/g,''); if(ph) byPhone[ph] = f; if(f.id) byId[f.id] = f; });
  _farmerDbCache = { byPhone, byId, _n: FARMERS.length };
  return _farmerDbCache;
}
function canonicalFarmer(phone, fid, fallbackName){
  const db = farmerDb();
  const ph = String(phone||'').replace(/\D/g,'');
  const rec = (ph && db.byPhone[ph]) || (fid && db.byId[fid]) || null;
  return { name: (rec && rec.name) || fallbackName || fid || '?', key: ph || (rec && rec.id) || fid || (fallbackName||'?') };
}

// Flatten approved submissions of a week into product rows.
function reportRowsFromSubs(subs){
  const rows = [];
  Object.entries(subs || {}).forEach(([fid, sub]) => {
    if(!sub) return;
    if(sub.status && sub.status !== 'approved') return;   // approved (or legacy no-status) only
    (sub.items || []).forEach(it => {
      if(!it) return;
      if(!it.productId || !PRODUCTS_DB[it.productId]) return; // catalogue-only: skip unrecognised products
      const cf = qtyConvFactor(it);
      let brought = 0;
      if(it.qtyByHaat && typeof it.qtyByHaat === 'object') Object.values(it.qtyByHaat).forEach(v => brought += +v || 0);
      else brought = +it.qty || 0;
      brought *= cf;
      const remaining = (it.qtyRemaining != null && it.qtyRemaining !== '') ? (+it.qtyRemaining || 0) * cf : null;
      // sold is KNOWN only once the farmer fills 'remaining' (post-haat). Before that it's unknown (null) — NOT brought.
      const sold = remaining != null ? Math.max(0, brought - remaining) : null;
      // price = qty-weighted average of per-haat prices (falling back to the base price for haats
      // without an override), so reports match what customers actually see. [[per-haat pricing]]
      const basePrice = +it.price || 0;
      const pbh = (it.priceByHaat && typeof it.priceByHaat === 'object') ? it.priceByHaat : {};
      let pNum = 0, pDen = 0;
      if(it.qtyByHaat && typeof it.qtyByHaat === 'object'){
        Object.entries(it.qtyByHaat).forEach(([code,q]) => { q = +q||0; if(q<=0) return; const hp = (pbh[code]!=null ? +pbh[code] : basePrice)||0; pNum += hp*q; pDen += q; });
      }
      const price = pDen>0 ? Math.round(pNum/pDen) : basePrice;   // weighted avg, for the price column
      // estimated sale = જથ્થો × that market's price, summed across markets (exact per-haat); when 'sold'
      // is known (remaining filled) scale proportionally, else use the brought-based estimate.
      const gross = (pDen>0 ? pNum*cf : brought*basePrice);
      const estSale = (sold != null && brought > 0) ? gross * (sold/brought) : gross;
      const cf2 = canonicalFarmer(sub.farmerPhone, fid, sub.farmerName);
      rows.push({ fid, farmerKey: cf2.key, farmerName: cf2.name, farmerPhone: sub.farmerPhone || '', product: it.name || '?', cat: it.cat || 'અન્ય', unit: it.unit || 'kg', brought, remaining, sold, price, estSale });
    });
  });
  return rows;
}

  // 3. Price spread per crop (>1 price seen)
  const pr = {}; allRows.forEach(r => { if(r.price>0){ const p=pr[r.product]=pr[r.product]||{min:Infinity,max:0,sum:0,n:0}; p.min=Math.min(p.min,r.price);p.max=Math.max(p.max,r.price);p.sum+=r.price;p.n++; } });
  const spread = Object.entries(pr).filter(([k,p])=>p.n>1).map(([k,p])=>[k,p.min,p.max,p.sum/p.n,p.max-p.min]).sort((a,b)=>b[4]-a[4]).slice(0,10)
    .map(([k,mn,mx,av,sp]) => [esc(k), '₹'+mn, '₹'+mx, '₹'+Math.round(av), '<b style="color:'+(sp>0?'#b45309':'#999')+'">₹'+Math.round(sp)+'</b>']);

  // 4. Wastage % per product (only items where 'remaining' was filled)
  const waste = {}; allRows.forEach(r => { if(r.remaining!=null && r.brought>0){ const w=waste[r.product]=waste[r.product]||{b:0,rem:0,unit:r.unit}; w.b+=r.brought; w.rem+=r.remaining; } });
  const topWaste = Object.entries(waste).filter(([k,w])=>w.b>0).map(([k,w])=>[k, w.rem/w.b*100, w.rem, w.b, w.unit]).sort((a,b)=>b[1]-a[1]).slice(0,10)
    .map(([k,pct,rem,b,u]) => [esc(k), '<b style="color:'+(pct>=30?'#b91c1c':pct>=15?'#b45309':'#2d6a4f')+'">'+Math.round(pct)+'%</b>', qfmt(rem)+' / '+qfmt(b,u)]);

  // 5. Haat performance (brought + estimated value) — uses qtyByHaat, or single-haat farmers' one haat
  const haat = {};
  REPORTS_DATA.weeks.forEach(w => Object.values(w.subs).forEach(sub => {
    if(sub.status && sub.status !== 'approved') return;
    const codes = Array.isArray(sub.farmerHaatCodes) ? sub.farmerHaatCodes : [];
    (sub.items||[]).forEach(it => {
      const pbh = it.priceByHaat || {};
      if(it.qtyByHaat && typeof it.qtyByHaat==='object'){
        Object.entries(it.qtyByHaat).forEach(([code,q]) => { q=+q||0; if(q<=0)return; const price=+(pbh[code]!=null?pbh[code]:it.price)||0; const h=haat[code]=haat[code]||{b:0,v:0}; h.b+=q; h.v+=q*price; });
      } else if((+it.qty||0)>0 && codes.length===1){
        const code=codes[0], q=+it.qty||0, price=+it.price||0; const h=haat[code]=haat[code]||{b:0,v:0}; h.b+=q; h.v+=q*price;
      }
    });
  }));
  const haatRows = Object.entries(haat).sort((a,b)=>b[1].v-a[1].v)
    .map(([code,h]) => [esc(HAATS[code]?.nameGu || HAATS[code]?.name || code), qfmt(h.b)+' kg', rupee(h.v)]);

  // 6. Farmer consistency (distinct weeks submitted) — grouped by stable farmerKey, canonical DB name
  const fw = {}; REPORTS_DATA.weeks.forEach(w => Object.entries(w.subs).forEach(([fid,sub]) => { if(sub.status&&sub.status!=='approved')return; const cf=canonicalFarmer(sub.farmerPhone,fid,sub.farmerName); const o=fw[cf.key]=fw[cf.key]||{name:cf.name,weeks:new Set()}; o.weeks.add(w.key); }));
  const totW = REPORTS_DATA.weeks.length;
  const consist = Object.values(fw).map(o=>[o.name,o.weeks.size]).sort((a,b)=>b[1]-a[1]).slice(0,12)
    .map(([n,c]) => [esc(n), c+' / '+totW, Math.round(c/totW*100)+'%']);

  // 7. Week-over-week trend (chronological)
  const trend = REPORTS_DATA.weeks.slice().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)).map(w => {
    const rows = reportRowsFromSubs(w.subs);
    return [esc(w.label), new Set(rows.map(r=>r.fid)).size, new Set(rows.map(r=>r.product)).size, qfmt(rows.reduce((n,r)=>n+r.brought,0))+'kg', rupee(rows.reduce((n,r)=>n+r.estSale,0))];
  });

  return `
    ${insSection('🏆 ટોપ ખેડૂત (અંદાજિત વેચાણ)', ['ખેડૂત','વેચાણ','હિસ્સો'], topFarmers)}
    ${insSection('📦 ટોપ પ્રોડક્ટ (જથ્થો + વેચાણ)', ['પ્રોડક્ટ','કુલ લાવ્યા','અંદાજિત વેચાણ'], topProd)}
    ${insSection('💸 ભાવ spread (પાક વાર)', ['પાક','ઓછામાં','વધારે','સરેરાશ','ફરક'], spread, 'એક જ ભાવ — spread નથી')}
    ${insSection('🗑️ સૌથી વધુ બાકી/બગાડ (% બાકી)', ['પાક','% બાકી','બાકી / લાવ્યા'], topWaste, "કોઈએ 'બાકી' ભર્યું નથી")}
    ${insSection('📍 હાટ પરફોર્મન્સ', ['હાટ','કુલ લાવ્યા','અંદાજિત મૂલ્ય'], haatRows)}
    ${insSection('🔁 ખેડૂત consistency (કેટલા અઠવાડિયા)', ['ખેડૂત','અઠવાડિયા','%'], consist)}
    ${insSection('📈 અઠવાડિયા વાર trend', ['અઠવાડિયું','ખેડૂત','પ્રોડક્ટ','જથ્થો','વેચાણ'], trend)}
    <div style="font-size:11px;color:#999;margin-top:4px;line-height:1.5">બધું approved data પર · read-only · % બાકી ફક્ત 'બાકી જથ્થો' ભરેલા entries માટે · હાટ મૂલ્ય = જથ્થો × ભાવ.</div>`;
}

/* ════════ V62: હાજરી (attendance/regularity) report ════════
   Operator question: which farmers are regular, which have gone quiet, whom to chase.
   "હાજર" for a haat = the farmer sent a submission for that round (ANY status — pending/
   rejected still means they engaged). A farmer's eligibility starts from their FIRST-ever
   submission (earlier weeks show blank, not absent — most were seeded mid-history, so
   counting pre-joining weeks as absences would slander every newer farmer).             */
let REPORT_ATT_HAAT = 'all';   // attendance view's haat filter
window.setReportAttHaat = v => { REPORT_ATT_HAAT = v; setTabBodyHtml(); };

function attendanceData(haatOverride){
  const haatFilter = haatOverride !== undefined ? haatOverride : REPORT_ATT_HAAT;
  const weeks = REPORTS_DATA.weeks.slice().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)); // oldest → newest
  const presentByWeek = weeks.map(w => {
    const set = new Set();
    Object.entries(w.subs || {}).forEach(([fid, sub]) => {
      if(!sub) return;
      set.add(canonicalFarmer(sub.farmerPhone, fid, sub.farmerName).key);
      set.add(fid);   // belt-and-braces: key by fid too, so a missing/changed phone can't fake an absence
    });
    return set;
  });
  let roster = FARMERS;
  if(haatFilter !== 'all') roster = roster.filter(f => Array.isArray(f.haatCodes) && f.haatCodes.includes(haatFilter));
  const rows = [], never = [];
  roster.forEach(f => {
    const phKey = String(f.phone||'').replace(/\D/g,'');
    const isIn = i => presentByWeek[i].has(phKey) || presentByWeek[i].has(f.id);
    const marks = weeks.map((w,i) => isIn(i));
    const firstIdx = marks.indexOf(true);
    if(firstIdx === -1){ never.push(f); return; }
    const span = marks.slice(firstIdx);
    const attended = span.filter(Boolean).length;
    const pct = Math.round(attended / span.length * 100);
    let missStreak = 0;
    for(let i = marks.length-1; i >= firstIdx && !marks[i]; i--) missStreak++;
    let lastIdx = -1;
    for(let i = marks.length-1; i >= 0; i--){ if(marks[i]){ lastIdx = i; break; } }
    rows.push({ f, marks, firstIdx, attended, eligible: span.length, pct, missStreak,
                lastLabel: lastIdx >= 0 ? weeks[lastIdx].label : '—',
                cls: pct >= 75 ? 'reg' : pct >= 40 ? 'mid' : 'irr' });
  });
  // Actionable order: farmers who USED to come but have stopped longest float to the top,
  // then lowest attendance. (A regular who missed the last 3 haats matters more than a
  // chronic 30%-er who happened to come yesterday.)
  rows.sort((a,b) => b.missStreak - a.missStreak || a.pct - b.pct || (a.f.name||'').localeCompare(b.f.name||'','gu'));
  return { weeks, rows, never };
}

    if(!mine.length && !myNever.length) return '';
    const buckets = {reg: mine.filter(r=>r.cls==='reg'), mid: mine.filter(r=>r.cls==='mid'), irr: mine.filter(r=>r.cls==='irr')};
    const denom = mine.length || 1;
    const seg = k => buckets[k].length ? `<span style="width:${Math.round(buckets[k].length/denom*100)}%;background:${ATT_CLS[k].bar}"></span>` : '';
    const bucketChip = k => {
      const key = h.code + '|' + k, open = ATT_OPEN.has(key);

    };
    const bucketList = k => {
      if(!ATT_OPEN.has(h.code + '|' + k) || !buckets[k].length) return '';
      const sorted = [...buckets[k]].sort((a,b)=>b.missStreak-a.missStreak||a.pct-b.pct);
      return `<div style="border-top:1px dashed var(--border);padding:8px 2px 2px;margin-top:8px">
        ${sorted.map(r=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;flex-wrap:wrap">
          <b>${esc(r.f.name||r.f.id)}</b> ${attWaBtn(r.f)}
          <span style="font-size:11px;color:var(--muted)">${r.attended}/${r.eligible} (${r.pct}%)${r.missStreak>0?` · <b style="color:${r.missStreak>=3?'#c1121f':'#b45309'}">${r.missStreak} થી ગેરહાજર</b>`:''} · છેલ્લે: ${esc(r.lastLabel)}</span>
        </div>`).join('')}
      </div>`;
    };
    const neverChipKey = h.code + '|never', neverOpen = ATT_OPEN.has(neverChipKey);
    return `
      <div class="card" style="padding:12px 15px;margin-bottom:10px">
        <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
          <b style="font-size:14px">${h.open?'🟢':'⚪'} ${esc(h.nameGu||h.name||h.code)}</b>
          <span style="font-size:11.5px;color:var(--muted)">${mine.length} ખેડૂત${myNever.length?` + ${myNever.length} ક્યારેય નહીં`:''}</span>
        </div>
        <div style="height:9px;border-radius:5px;background:#f0ece0;overflow:hidden;display:flex;margin:8px 0">${seg('reg')}${seg('mid')}${seg('irr')}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${bucketChip('reg')}${bucketChip('mid')}${bucketChip('irr')}
          ${myNever.length?`<button onclick="toggleAttBucket('${esc(h.code)}|never')" style="border:1.5px solid ${neverOpen?'#555':'transparent'};background:#e8e6e0;color:#555;border-radius:16px;padding:4px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">⚫ ક્યારેય નહીં ${myNever.length} ${neverOpen?'▲':'▼'}</button>`:''}
        </div>
        ${bucketList('reg')}${bucketList('mid')}${bucketList('irr')}
        ${neverOpen && myNever.length ? `<div style="border-top:1px dashed var(--border);padding:8px 2px 2px;margin-top:8px">${myNever.map(f=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px"><b>${esc(f.name||f.id)}</b> ${attWaBtn(f)} <span style="font-size:11px;color:var(--muted)">એક પણ યાદી નથી મોકલી</span></div>`).join('')}</div>` : ''}
      </div>`;
  }).join('');
  return `<div style="font-size:11.5px;color:var(--muted);margin-bottom:10px">🟢🟡🔴 પર ક્લિક કરો → એ જૂથના ખેડૂત નામ સાથે ખુલશે (WhatsApp બટન સાથે)</div>${cards}`;
}

window.exportAttendanceExcel = async () => {
  const {weeks, rows, never} = attendanceData();
  if(!rows.length && !never.length) return toast("કોઈ data નથી","err");
  toast("📊 Excel તૈયાર થાય છે…","ok");
  try{
    if(!_xlsxLib) _xlsxLib = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
    const XLSX = _xlsxLib;
    const CLSGU = {reg:'નિયમિત', mid:'મધ્યમ', irr:'અનિયમિત'};
    const sheetRows = rows.map(r => {
      const o = {
        'ખેડૂત': r.f.name||r.f.id, 'ફોન': r.f.phone||'', 'હાટ': r.f.haat||'',
        'હાજરી': `${r.attended}/${r.eligible}`, '%': r.pct, 'સ્થિતિ': CLSGU[r.cls],
        'સળંગ ગેરહાજર': r.missStreak, 'છેલ્લે આવ્યા': r.lastLabel,
      };
      weeks.forEach((w,i) => { o[w.label] = i < r.firstIdx ? '' : (r.marks[i] ? '✓' : '✗'); });
      return o;
    });
    never.forEach(f => {
      const o = {'ખેડૂત': f.name||f.id, 'ફોન': f.phone||'', 'હાટ': f.haat||'', 'હાજરી': '0', '%': 0, 'સ્થિતિ': 'ક્યારેય નહીં', 'સળંગ ગેરહાજર': '', 'છેલ્લે આવ્યા': '—'};
      weeks.forEach(w => { o[w.label] = ''; });
      sheetRows.push(o);
    });
    const ws = XLSX.utils.json_to_sheet(sheetRows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'હાજરી');
    XLSX.writeFile(wb, `khedut-haajri-${new Date().toISOString().slice(0,10)}.xlsx`);
    toast("✓ Excel download થયું","ok");
  }catch(e){ console.error(e); toast("Excel નિષ્ફળ: "+(e.message||e),"err"); }
};

/* V63: per-venue sales report — "શું વેચાયું ક્યાં?" Made possible by farmer V61's
   qtyRemainingByHaat. Per-venue sold is shown only where it's genuinely knowable:

let REPORT_VENUE_OPEN = new Set();
window.toggleVenueCard = code => { if(REPORT_VENUE_OPEN.has(code)) REPORT_VENUE_OPEN.delete(code); else REPORT_VENUE_OPEN.add(code); setTabBodyHtml(); };

function venueSalesData(){
  const weeks = REPORT_WEEK === 'all' ? REPORTS_DATA.weeks : REPORTS_DATA.weeks.filter(w => w.key === REPORT_WEEK);
  const venues = {};
  weeks.forEach(w => Object.entries(w.subs || {}).forEach(([fid, sub]) => {
    if(!sub || (sub.status && sub.status !== 'approved')) return;
    (sub.items || []).forEach(it => {
      if(!it || !it.productId || !PRODUCTS_DB[it.productId]) return;
      const cf = qtyConvFactor(it);
      const basePrice = +it.price || 0;
      const pbh = it.priceByHaat || {};
      const rbh = (it.qtyRemainingByHaat && typeof it.qtyRemainingByHaat === 'object') ? it.qtyRemainingByHaat : null;
      const perVenue = {};
      if(it.qtyByHaat && typeof it.qtyByHaat === 'object' && Object.keys(it.qtyByHaat).length){
        Object.entries(it.qtyByHaat).forEach(([code,q]) => { q = +q||0; if(q>0) perVenue[code] = q; });
      } else {
        const codes = Array.isArray(sub.farmerHaatCodes) ? sub.farmerHaatCodes : [];
        const q = +it.qty || 0;
        if(q > 0) perVenue[codes.length === 1 ? codes[0] : '__unknown'] = q;
      }
      const nVenues = Object.keys(perVenue).length;
      Object.entries(perVenue).forEach(([code, qRaw]) => {
        const brought = qRaw * cf;
        const price = (pbh[code] != null && +pbh[code] > 0) ? +pbh[code] : basePrice;
        let remaining = null;
        if(rbh && rbh[code] != null) remaining = (+rbh[code]||0) * cf;
        else if(it.qtyRemaining != null && it.qtyRemaining !== '' && nVenues === 1) remaining = (+it.qtyRemaining||0) * cf;
        const sold = remaining != null ? Math.max(0, brought - remaining) : null;
        const estSale = price * (sold != null ? sold : brought);
        const v = venues[code] = venues[code] || {brought:0, soldKnown:0, remainingKnown:0, hasSoldData:false, estSale:0, farmers:new Set(), products:{}};
        v.brought += brought; v.estSale += estSale; v.farmers.add(fid);
        if(sold != null){ v.soldKnown += sold; v.remainingKnown += remaining; v.hasSoldData = true; }
        const pn = it.name || '?';
        const P = v.products[pn] = v.products[pn] || {brought:0, sold:0, remaining:0, soldKnown:false, estSale:0, unit: it.unit||'kg', farmers:new Set()};
        P.brought += brought; P.estSale += estSale; P.farmers.add(fid);
        if(sold != null){ P.sold += sold; P.remaining += remaining; P.soldKnown = true; }
      });
    });
  }));
  return venues;
}

// Farmer-wise Excel export — same rows the on-screen ખેડૂત×પ્રોડક્ટ report is built from
// (reportActiveRows(), so it respects whichever week is currently selected), one flat sheet,
// sorted by farmer so all of one farmer's items sit together.
window.exportReportExcel = async () => {
  const rows = reportActiveRows();
  if(!rows.length) return toast("કોઈ approved data નથી","err");
  toast("📊 Excel તૈયાર થાય છે…","ok");
  try{
    if(!_xlsxLib) _xlsxLib = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
    const XLSX = _xlsxLib;
    const sorted = [...rows].sort((a,b) => a.farmerName.localeCompare(b.farmerName,'gu') || a.product.localeCompare(b.product,'gu'));
    const sheetRows = sorted.map(r => ({
      'ખેડૂત': r.farmerName, 'ફોન': r.farmerPhone||'', 'પ્રોડક્ટ': r.product, 'કેટેગરી': r.cat, 'એકમ': r.unit,
      'ભાવ': r.price, 'લાવ્યા': Math.round(r.brought*10)/10,
      'વેચાયું': r.sold!=null ? Math.round(r.sold*10)/10 : '',
      'બાકી': r.remaining!=null ? Math.round(r.remaining*10)/10 : '',
      'અંદાજિત વેચાણ': Math.round(r.estSale)
    }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheetRows), 'FarmerReport');
    const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    XLSX.writeFile(wb, 'khedut-haat-farmer-report-'+ts+'.xlsx');
    toast(`✅ Excel downloaded — ${sheetRows.length} rows`,"ok");
    try{ logAudit('report-excel-export','', { rows: sheetRows.length, week: REPORT_WEEK }); }catch(e){}
  }catch(e){ console.error(e); toast("Excel નિષ્ફળ: "+(e.message||e),"err"); }
};

window.updateDesignPreview = () => {
  const d = DESIGN_DRAFT; if(!d) return;
  const ov = +($('#dsOverlay')?.value ?? d.banner.overlay);
  const bl = +($('#dsBlur')?.value ?? d.banner.blur);
  const fit = $('#dsFit')?.value || d.banner.fit;
  d.banner.overlay = ov; d.banner.blur = bl; d.banner.fit = fit;
  d.text.title = $('#dsTitle')?.value ?? d.text.title;
  d.text.subtitle = $('#dsSub')?.value ?? d.text.subtitle;
  const ovv=$('#dsOverlayVal'); if(ovv) ovv.textContent = ov+'%';
  const blv=$('#dsBlurVal'); if(blv) blv.textContent = bl+'px';
  const img=$('#dpImg');
  if(img){ img.style.objectFit=fit; img.style.filter=`brightness(.65) blur(${bl}px)`; img.src=d.banner.url||''; img.style.display=d.banner.url?'block':'none'; }
  const ovl=$('#dpOverlay'); if(ovl) ovl.style.background=`linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(27,67,50,${(ov/100).toFixed(2)}) 100%)`;
  const t=$('#dpTitle'); if(t) t.textContent=d.text.title||SITE_DEFAULTS.title;
  const s=$('#dpSub'); if(s) s.textContent=d.text.subtitle||SITE_DEFAULTS.subtitle;
  // Login-screen background sections (adminLoginBg='al', farmerLoginBg='fl') — no live preview
  // pane, just sync slider/select values into the draft + their %/px labels.
  ['adminLoginBg','farmerLoginBg'].forEach((key,i) => {
    const p = i===0 ? 'al' : 'fl';
    const lb = d[key]; if(!lb) return;
    const lov = $('#'+p+'Overlay')?.value, lbl = $('#'+p+'Blur')?.value, lft = $('#'+p+'Fit')?.value;
    if(lov!=null) lb.overlay = +lov;
    if(lbl!=null) lb.blur = +lbl;
    if(lft) lb.fit = lft;
    const lovv=$('#'+p+'OverlayVal'); if(lovv) lovv.textContent = lb.overlay+'%';
    const lblv=$('#'+p+'BlurVal'); if(lblv) lblv.textContent = lb.blur+'px';
  });
};

window.uploadSiteImg = async (field, prop) => {
  prop = prop || 'url';
  if(!CLOUDINARY_CFG || !CLOUDINARY_CFG.cloudName) return toast("Cloudinary સેટ નથી","err");
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=async()=>{
    const f=inp.files[0]; if(!f) return;
    updateDesignPreview(); // capture current text/slider edits before re-render-free upload
    toast("☁️ Upload…","ok");
    try{
      // banner + the 2 login backgrounds are full hero-size images; logos stay small icons.
      const maxDim = (field==='banner' || field==='adminLoginBg' || field==='farmerLoginBg') ? 1280 : 256;
      const dataUrl = await resizePhoto(f, maxDim, 0.85);
      const blob = await (await fetch(dataUrl)).blob();
      const fd=new FormData();
      fd.append('file',blob, field+'-'+prop+'.webp');
      fd.append('upload_preset',CLOUDINARY_CFG.uploadPreset);
      fd.append('folder','sristi/site');
      const r=await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CFG.cloudName+'/image/upload',{method:'POST',body:fd});
      const j=await r.json();
      if(j.secure_url){
        DESIGN_DRAFT[field][prop]=j.secure_url;
        DESIGN_DRAFT_OVERRIDE = DESIGN_DRAFT;  // keep the upload through the re-render
        setTabBodyHtml();
        toast("✓ Uploaded — હવે 💾 સાચવો","ok");
      } else { toast("Upload નિષ્ફળ: "+(j.error?.message||'unknown'),"err"); }
    }catch(e){ console.error(e); toast("Upload error","err"); }
  };
  inp.click();
};

window.clearSiteImg = (field, prop) => {
  if(!DESIGN_DRAFT) return;
  DESIGN_DRAFT[field][prop||'url']='';
  DESIGN_DRAFT_OVERRIDE = DESIGN_DRAFT;

};

        JSON માં ગેરહાજર ખેડૂતોની items માં ફેરફાર નહીં થાય (તેમની previous items જેમ ની તેમ રહેશે).

let PARSED = null;
window.onJsonChange = () => {
  const ta = document.getElementById('jsonIn');
  const v = (ta?.value||"").trim();
  const status = document.getElementById('jsonStatus');
  const preview = document.getElementById('jsonPreview');
  const btn = document.getElementById('btnPublish');
  ta?.classList.remove('err');
  PARSED = null;
  if(!v){
    status.textContent = "JSON paste કરો — preview અહીં દેખાશે";
    if(preview) preview.innerHTML = '';
    btn.disabled = true; btn.style.background='#aaa'; btn.style.cursor='not-allowed';
    return;
  }
  let parsed; try{ parsed = JSON.parse(v); }
  catch(e){
    ta.classList.add('err');
    status.innerHTML = `<span style="color:var(--red)">⚠️ JSON valid નથી: ${esc(e.message)}</span>`;
    if(preview) preview.innerHTML = '';
    btn.disabled = true; btn.style.background='#aaa'; btn.style.cursor='not-allowed';
    return;
  }
  if(!parsed.submissions || typeof parsed.submissions!=='object'){
    status.innerHTML = `<span style="color:var(--red)">⚠️ JSON માં "submissions" object હોવો જોઈએ</span>`;
    btn.disabled = true; btn.style.background='#aaa'; btn.style.cursor='not-allowed';
    return;
  }
  // Validate each
  const subKeys = Object.keys(parsed.submissions);
  let validCount=0, itemTotal=0, missing=[], badItems=[];
  subKeys.forEach(fid=>{
    const sub = parsed.submissions[fid];
    if(!sub || !Array.isArray(sub.items)) return;
    const f = FARMERS.find(x=>x.id===fid);
    if(!f){ missing.push(fid); return; }
    validCount++;
    sub.items.forEach((it,idx)=>{
      if(!it || !it.name || it.price==null) badItems.push(`${f.name}: item ${idx+1}`);
      itemTotal++;
    });
  });
  PARSED = parsed;
  status.innerHTML = `✓ <b style="color:var(--green2)">${validCount}</b> ખેડૂત • <b>${itemTotal}</b> વસ્તુ ready
    ${missing.length?` • <span style="color:var(--orange)">⚠️ ${missing.length} unknown farmerId</span>`:''}
    ${badItems.length?` • <span style="color:var(--red)">⚠️ ${badItems.length} items માં ભૂલ</span>`:''}`;
  preview.innerHTML = renderJsonPreview(parsed);
  btn.disabled = false; btn.style.background='var(--green2)'; btn.style.cursor='pointer';
};

function renderJsonPreview(parsed){
  const list = Object.keys(parsed.submissions).map(fid=>{
    const f = FARMERS.find(x=>x.id===fid);
    const sub = parsed.submissions[fid];
    return {fid, name:f?.name||sub.farmerName||fid, items:sub.items||[], known:!!f};
  });
  if(!list.length) return '<div class="preview-empty">કોઈ submission નથી</div>';
  return `<div class="preview-list">${list.map(b=>`
    <div class="preview-farmer">
      <div class="preview-fnm">${esc(b.name)} <small>${esc(b.fid)}${b.known?'':' ⚠️ unknown'}</small></div>
      ${b.items.length?`
        <div class="preview-items">
          ${b.items.map(it=>`<div class="pi-row"><div class="nm">${esc(it.name||'?')} <span style="color:var(--muted);font-size:11px">${esc(it.cat||'')}</span></div><div class="pr">₹${esc(it.price)} <span style="color:var(--muted);font-weight:400">/${esc(it.unit||'')}</span></div></div>`).join('')}
        </div>
      `:'<div class="preview-empty">(કોઈ item parse નથી થઈ)</div>'}
    </div>
  `).join('')}</div>`;
}

window.doPublish = async () => {
  if(!PARSED || !PARSED.submissions) return toast("પહેલા valid JSON paste કરો","err");
  // V11: warn before overwriting farmers who already have a submission this week (approved/pending included)
  const overwrites = Object.keys(PARSED.submissions).filter(fid => SUBS[fid] && (SUBS[fid].items || SUBS[fid].status));
  if(overwrites.length && !(await asyncConfirm(
    `${overwrites.length} ખેડૂત ની હાલની submission overwrite થશે (approved/pending સહિત). આગળ વધવું?`,
    'હા, publish કરો', 'રદ'))) return;
  if(_busy) return; _busy = true;
  const btn = document.getElementById('btnPublish');
  btn.disabled = true; btn.textContent = "Publishing...";
  let wrote=0, errs=0;
  const updates = {};
  Object.keys(PARSED.submissions).forEach(fid=>{
    const sub = PARSED.submissions[fid];
    if(!sub || !Array.isArray(sub.items)) return;
    const norm = sub.items.map(it=>{
      const o = {
        name: String(it.name||"").trim(),
        price: +it.price||0,
        unit: String(it.unit||"kg").trim(),
        cat: String(it.cat||"અન્ય").trim(),
        available: true,
      };
      // V11: preserve quantity data if the parsed item carries it (was being dropped)
      if(it.qty != null && it.qty !== "" && +it.qty > 0) o.qty = +it.qty;
      if(it.qtyByHaat && typeof it.qtyByHaat === 'object') o.qtyByHaat = it.qtyByHaat;
      return o;
    }).filter(it=>it.name && it.price>0);
    updates['weekly/'+WK+'/submissions/'+fid+'/items'] = norm;
    updates['weekly/'+WK+'/submissions/'+fid+'/parsedAt'] = firebase.database.ServerValue.TIMESTAMP;
    updates['weekly/'+WK+'/submissions/'+fid+'/status'] = 'approved';
    updates['weekly/'+WK+'/submissions/'+fid+'/approvedAt'] = firebase.database.ServerValue.TIMESTAMP;
    updates['weekly/'+WK+'/submissions/'+fid+'/qtyUpdatedAt'] = null;   // Part B
    wrote++;
  });
  try{
    await fbRef('').update(updates);
    toast(`✓ ${wrote} ખેડૂત publish થયા — catalog લાઈવ!`, "ok");
    await loadAll();
  }catch(e){
    console.error(e); toast("Publish નિષ્ફળ: "+(e.message||e),"err");
    btn.disabled=false; btn.textContent="🚀 પ્રકાશિત કરો"; btn.style.background='var(--green2)';
  }
  finally{ _busy = false; }
};

function renderFarmerRow(f, num){
  const sub = SUBS[f.id];
  const hasSub = !!(sub && sub.rawText);
  const hasPub = !!(sub && Array.isArray(sub.items) && sub.items.length);
  const phoneClean = String(f.phone||"").replace(/[^0-9]/g,"");
  const submitUrl = location.origin + location.pathname.replace('admin','submit');
  // V25: pull this farmer's REAL haat day/time + the editable deadline, instead of
  // hardcoded "આ રવિવારે" / "શનિવાર સાંજે 8" — same data buildFarmerMessage() already uses.
  const fHaatCodes = Array.isArray(f.haatCodes) ? f.haatCodes : [];
  const fOpenCodes = fHaatCodes.filter(c => HAATS[c]?.open);
  const fShowCodes = fOpenCodes.length ? fOpenCodes : fHaatCodes;
  // Each haat carries its OWN deadline (set once in ✏️ haat edit) — falls back to the
  // shared week deadline only if that haat hasn't been given one yet. This avoids having
  // to flip one shared box back and forth between a Sunday haat and a Thursday haat.
  const weekDeadline = WK_META.deadline || 'શનિવાર સાંજે 8 વાગ્યા સુધી';
  const fDeadlineOf = c => (HAATS[c]?.deadline || weekDeadline);
  const fDeadlines = fShowCodes.map(fDeadlineOf);
  const fSameDeadline = fDeadlines.length>0 && fDeadlines.every(d => d===fDeadlines[0]);
  const fHaatLines = fShowCodes.length
    ? fShowCodes.map(c => { const h=HAATS[c]||{}; return `📍 ${h.nameGu||h.name||c}${h.days?' — '+h.days:''}${h.time?' • '+h.time:''}${fSameDeadline?'':' • છેલ્લો સમય: '+fDeadlineOf(c)}`; }).join('\n')
    : 'આ અઠવાડિયા ના હાટ માટે';
  // Bottom "છેલ્લો સમય" line ONLY when every shown haat shares one deadline (the common case);
  // when they differ, each haat line above already carries its own — no contradicting footer.
  const fDeadlineFooter = fSameDeadline ? `\n\nછેલ્લો સમય: ${fDeadlines[0]}` : '';
  const waMsg = encodeURIComponent(
`🌿 સૃષ્ટિ પ્રાકૃતિક ખેડૂત હાટ ${weekRange()}

નમસ્તે ${f.name||"ખેડૂતભાઈ"},

${fHaatLines}
તમારી પેદાશની યાદી નીચેની લિંક પરથી મોકલશો:

${submitUrl}

મોબાઈલ નંબર = username
પાસવર્ડ = તમારો પાસવર્ડ${fDeadlineFooter}

— સૃષ્ટિ ટીમ`
  );
  const waUrl = phoneClean ? `https://wa.me/91${phoneClean}?text=${waMsg}` : null;

  return `
    <div class="farmer-row">
      <div class="num">${String(num).padStart(3,'0')}</div>
      <div class="nm">
        <b>${esc(f.name||"-")}</b>
        <small>${esc([f.village,f.district].filter(Boolean).join(", "))} ${f.phone?'• '+esc(f.phone):''}</small>
      </div>
      ${hasPub ? '<span class="badge-parsed">✓ Published</span>'
        : (hasSub ? '<span class="badge-yes">✓ Submitted</span>'
                  : '<span class="badge-no">⏳ Pending</span>')}
      ${hasSub ? `<button class="preview-btn" onclick="previewSub('${esc(f.id).replace(/'/g,"\\'")}')" aria-label="${esc(f.name||'ખેડૂત')} ની submission preview કરો" title="Submission preview કરો">👁️</button>` : ''}
      ${waUrl ? `<a class="preview-btn" href="${waUrl}" target="_blank" rel="noopener" style="text-decoration:none;background:#25d366;color:#fff;border-color:#25d366" aria-label="${esc(f.name||'ખેડૂત')} ને WhatsApp">WA</a>` : ''}
      <button class="preview-btn" onclick="openEditFarmer('${esc(f.id).replace(/'/g,"\\'")}')" aria-label="${esc(f.name||'ખેડૂત')} ને edit કરો" title="ખેડૂત edit કરો — હાટ બદલો, નામ સુધારો">✏️</button>
      ${f.phone ? `<button class="preview-btn" style="background:#fff8d6;color:#7a5a00;border-color:#f7c800" onclick="resetFarmerPwd('${esc(f.id).replace(/'/g,"\\'")}','${esc(f.name||'').replace(/'/g,"\\'")}','${esc(String(f.phone).replace(/[^0-9]/g,'')).replace(/'/g,"\\'")}')" aria-label="${esc(f.name||'ખેડૂત')} નો પાસવર્ડ reset કરો" title="પાસવર્ડ reset કરો">🔑</button>` : ''}
      <button class="preview-btn" style="background:var(--red-pale);color:var(--red);border-color:#f5c4c4" onclick="removeFarmer('${esc(f.id).replace(/'/g,"\\'")}','${esc(f.name||'').replace(/'/g,"\\'")}')" aria-label="${esc(f.name||'ખેડૂત')} ને દૂર કરો" title="આ યાદીમાંથી દૂર કરો">🗑️</button>
    </div>
  `;
}

window.resetFarmerPwd = async (fid, name, phoneClean) => {
  const me = adminIdentity();
  const last4 = String(phoneClean).slice(-4);
  if(!(await asyncConfirm(
    `"${name}" નો પાસવર્ડ reset કરવો છે?\n\n` +
    `તેમના નવા login માટે:\n` +
    `   📱 મોબાઈલ: ${phoneClean}\n` +
    `   🔑 પાસવર્ડ: ${last4} (છેલ્લા 4 અંક)\n\n` +
    `Login કરતી વખતે પોતાનો નવો પાસવર્ડ બનાવવા કહેવાશે.`,
    '🔑 Reset password',
    'રદ'
  ))) return;
  try{
    // Delete the custom-password record — default (last 4 of phone) becomes valid;
    // farmer's next login triggers the force-change-pwd flow.
    await fbRef('farmerAuth/'+phoneClean).remove();
    // Audit on the farmer record
    await fbRef('marketFarmers/'+fid).update({
      lastPwdResetBy: me?.username || 'unknown',
      lastPwdResetAt: firebase.database.ServerValue.TIMESTAMP
    });
    // Client SDK cannot change another user's Auth password directly, and Firebase Console's
    // "Reset password" only SENDS AN EMAIL — undeliverable, since farmer accounts use a
    // synthetic @khedut-haat.app address with no real mailbox. Workaround: recreating the Auth
    // account (allowed from client, same secondary-instance trick as addManualFarmer) sets a
    // fresh password directly, with no email involved. Requires the OLD Auth entry to be gone
    // first — try immediately (already-deleted case), else prompt the admin to delete it.
    await attemptFarmerAuthRecreate(name, phoneClean, last4);
    await loadAll();
  }catch(e){
    console.error(e);
    toast("Reset નિષ્ફળ: " + (e.message||""),"err");
  }
};

window.attemptFarmerAuthRecreate = async (name, phoneClean, last4) => {
  try{
    // V7.3: delete-old + create-new now happens server-side (resetFarmerAuthAccount Cloud
    // Function) since only Admin SDK can delete another user's Auth account -- the browser
    // could never do this itself, which is why every reset used to need a manual Firebase
    // Console step. One call replaces that whole dance.
    const fn = firebase.app().functions('asia-southeast1').httpsCallable('resetFarmerAuthAccount');
    await fn({phone: phoneClean});
    toast(`🔑 પાસવર્ડ reset થયો — WhatsApp મોકલો`,"ok");
    showResetPwdWhatsAppHelper(name, phoneClean, last4);
  }catch(_e){
    console.error('farmer auth recreate', _e);
    toast("Auth reset નિષ્ફળ: " + (_e.message||""),"err");
  }
};

window.saveEditFarmer = async (fid) => {

window.addManualFarmer = async () => {
  const nm = ($('#afNm')?.value||'').trim();
  const ph = ($('#afPh')?.value||'').replace(/[^0-9]/g,'');
  const vl = ($('#afVl')?.value||'').trim();
  const dc = ($('#afDC')?.value||'').trim();
  const haatCodes = [...document.querySelectorAll('.af-haat-cb:checked')].map(cb=>cb.value);
  if(!nm) return toast("નામ ભરો","err");
  if(ph.length < 10) return toast("મોબાઈલ 10 અંકનો જોઈએ","err");
  if(!dc) return toast("જિલ્લો પસંદ કરો","err");
  const id = 'MF_'+ph;
  if(FARMERS.find(f=>f.id===id)) return toast("આ ID પહેલેથી છે","err");
  const phoneClash = FARMERS.find(f=>String(f.phone||'').replace(/[^0-9]/g,'').slice(-10) === ph.slice(-10));
  if(phoneClash) return toast("આ phone પહેલેથી છે: "+phoneClash.name,"err");

  try{
    // Atomic counter increment for the district
    const counterRef = fbRef('counters/farmerApp/'+dc);
    const tx = await counterRef.transaction(cur => (cur||0) + 1);
    if(!tx.committed){ toast("Counter ભૂલ — ફરી પ્રયત્ન કરો","err"); return; }
    const seq = tx.snapshot.val();
    const applicationNo = `A-GJ-${dc}-${String(seq).padStart(5,'0')}`;
    const district = DISTRICTS[dc];
    const haatNamesGu = haatCodes.map(c => HAATS[c]?.nameGu || c).join(', ');

    await fbRef('marketFarmers/'+id).set({
      id, name:nm, phone:ph, farm:'',
      village:vl,
      district: district?.nameGu || district?.name || '',  // legacy text — Gujarati name
      districtCode: dc,
      state:'Gujarat', stateCode:'GJ',
      haat: haatNamesGu,            // legacy text — comma-joined Gujarati names (for backward compat with summary tab)
      haatCodes: haatCodes,
      applicationNo,
      active:true, addedAt:Date.now(),
    });
    // Phase 2: create the farmer's Firebase Auth account (default pwd = last-4) on a SECONDARY
    // app instance so the admin's own login session is not disturbed. Idempotent.
    try{
      let _sec; try{ _sec = firebase.initializeApp(FB_CONFIG, 'mkfarmer'); }catch(_){ _sec = firebase.app('mkfarmer'); }
      await _sec.auth().createUserWithEmailAndPassword(ph + AUTH_DOMAIN, PWD_PREFIX + ph.slice(-4));
      await _sec.auth().signOut().catch(()=>{});
    }catch(_e){ if(_e && _e.code !== 'auth/email-already-in-use') console.warn('farmer auth create', _e); }
    toast(`✓ "${nm}" ઉમેરાયા (${applicationNo})`,"ok");
    closeModal(); await loadAll();
  }catch(e){
    console.error(e);
    toast("ઉમેરવામાં ભૂલ","err");
  }
};

window.saveItemPrice = async (fid, idx, multi) => {
  const s = SUBS[fid]; if(!s || !Array.isArray(s.items) || !s.items[idx]) return;
  const it = s.items[idx];
  const updates = {}; let fromDesc, toDesc;
  if(multi){
    const pbh = Object.assign({}, it.priceByHaat||{});
    fromDesc = JSON.stringify(pbh);
    Object.keys(pbh).forEach(c=>{ const el=document.getElementById('fx_'+c); if(el){ const v=Math.round(+el.value||0); if(v>0) pbh[c]=v; } });
    updates[`weekly/${WK}/submissions/${fid}/items/${idx}/priceByHaat`] = pbh;
    it.priceByHaat = pbh; toDesc = JSON.stringify(pbh);
  } else {
    const el=document.getElementById('fx_single'); const v=Math.round(+el.value||0);
    if(!(v>0)) return toast('ભાવ ખરો ભરો','err');
    fromDesc = '₹'+(+it.price||0);
    updates[`weekly/${WK}/submissions/${fid}/items/${idx}/price`] = v;
    it.price = v; toDesc = '₹'+v;
  }
  if(_busy) return; _busy = true;
  try{
    await fbRef('').update(updates);
    logAudit('price-edit', 'submissions/'+fid, { farmer: s.farmerName||fid, item: it.name, from: fromDesc, to: toDesc });
    toast('✓ ભાવ સુધાર્યો','ok');
    closeModal(); render();
  }catch(e){ console.error(e); toast('ભાવ સેવ નિષ્ફળ: '+(e.message||e),'err'); }
  finally{ _busy = false; }
};

// 💾 One-click backup — reads the Khedut-Haat data nodes and downloads a complete JSON snapshot.
// READ-ONLY: only reads + downloads to this device; writes nothing.
window.downloadBackup = async () => {
  toast("💾 Backup તૈયાર થાય છે…","ok");
  const NODES = ['weekly','marketFarmers','products','masterProducts','productsDeleted','productOrder','productPhotos','productPhotoMap','haats','settings','catalogStats','announcement','geo','auditLog','admins','farmerAuth','haatFarmers'];
  try{
    const pairs = await Promise.all(NODES.map(n => fbRef(n).get().then(s => [n, s.val()]).catch(() => [n, null])));
    const data = { _exportedAt: new Date().toISOString(), _namespace: 'prakrutik_kheti' };
    pairs.forEach(([n,v]) => { if(v != null) data[n] = v; });
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    a.download = 'khedut-haat-backup-' + ts + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    const mb = (json.length/1048576).toFixed(2);
    const subs = data.weekly ? Object.values(data.weekly).reduce((n,w) => n + (w && w.submissions ? Object.keys(w.submissions).length : 0), 0) : 0;
    const farmers = data.marketFarmers ? Object.keys(data.marketFarmers).length : 0;
    toast(`✅ Backup downloaded — ${mb} MB · ${subs} submissions · ${farmers} farmers`,"ok");
    try{ logAudit('backup-export','', { sizeKB: Math.round(json.length/1024), submissions: subs }); }catch(e){}
  }catch(e){ console.error(e); toast("Backup નિષ્ફળ: "+(e.message||e),"err"); }
};

// 📊 Readable Excel export — Submissions (one row per item) + Farmers + Products. READ-ONLY.
window.exportExcel = async () => {
  toast("📊 Excel તૈયાર થાય છે…","ok");
  try{
    if(!_xlsxLib) _xlsxLib = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
    const XLSX = _xlsxLib;
    const [wkSnap, fSnap, pSnap, hSnap] = await Promise.all([
      fbRef('weekly').get(), fbRef('marketFarmers').get(), fbRef('products').get(), fbRef('haats').get()
    ]);
    const weekly = wkSnap.val()||{}, farmers = fSnap.val()||{}, products = pSnap.val()||{}, haats = hSnap.val()||{};
    const haatName = c => (haats[c] && (haats[c].nameGu||haats[c].name)) || c;

    const subRows = [];
    Object.entries(weekly).forEach(([wk, w]) => {
      if(!w || typeof w !== 'object' || !w.submissions) return;
      const date = (w.meta && w.meta.dateLabel) || '';
      const wnum = (w.meta && w.meta.weekNum) || wk;
      Object.entries(w.submissions).forEach(([fid, sub]) => {
        if(!sub) return;
        (sub.items||[]).forEach(it => {
          if(!it) return;
          const cf = qtyConvFactor(it);
          let brought = 0;
          if(it.qtyByHaat) Object.values(it.qtyByHaat).forEach(v => brought += +v||0); else brought = +it.qty||0;
          brought *= cf;
          const rem = (it.qtyRemaining!=null && it.qtyRemaining!=='') ? (+it.qtyRemaining||0) * cf : '';
          const sold = rem!=='' ? Math.max(0, brought-rem) : '';
          const price = +it.price||0;
          const est = (sold!==''?sold:brought) * price;
          subRows.push({ 'અઠવાડિયું': wnum, 'તારીખ': date, 'ખેડૂત': sub.farmerName||fid, 'ફોન': sub.farmerPhone||'', 'હાટ': sub.farmerHaat||'', 'સ્થિતિ': sub.status||'', 'પ્રોડક્ટ': it.name||'', 'કેટેગરી': it.cat||'', 'એકમ': it.unit||'', 'ભાવ': price, 'લાવ્યા': brought, 'બાકી': rem, 'વેચાયું': sold, 'અંદાજિત વેચાણ': est });
        });
      });
    });
    const farmerRows = Object.values(farmers).filter(f=>f&&f.id).map(f => ({ 'નામ': f.name||'', 'ફોન': f.phone||'', 'ગામ': f.village||'', 'જિલ્લો': f.district||'', 'હાટ': Array.isArray(f.haatCodes)?f.haatCodes.map(haatName).join(', '):(f.haat||''), 'સક્રિય': f.active===false?'ના':'હા' }));
    const prodRows = Object.values(products).filter(p=>p&&p.name).map(p => ({ 'પ્રોડક્ટ': p.name||'', 'કેટેગરી': p.cat||'', 'એકમ': p.unit||'' }));

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(subRows.length?subRows:[{'(no data)':''}]), 'Submissions');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(farmerRows.length?farmerRows:[{'(no data)':''}]), 'Farmers');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prodRows.length?prodRows:[{'(no data)':''}]), 'Products');
    const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    XLSX.writeFile(wb, 'khedut-haat-data-'+ts+'.xlsx');
    toast(`✅ Excel downloaded — ${subRows.length} rows · ${farmerRows.length} farmers`,"ok");
    try{ logAudit('excel-export','', { rows: subRows.length }); }catch(e){}
  }catch(e){ console.error(e); toast("Excel નિષ્ફળ: "+(e.message||e),"err"); }
};

window.confirmNewWeek = async () => {
  // The report groups a round under this date label, so ask for the haat date
  // (falls back to today if left blank — never empty).
  const dateLabel = ($('#nwDate') && $('#nwDate').value.trim()) || todayLabel();
  // Derive the next week number robustly. The current key may be a non-numeric
  // label like "test_probe", so fall back to the editable meta.weekNum rather
  // than parseInt-ing the key (which yields NaN and crashed the advance).
  let base = (typeof WK==='number') ? WK : parseInt(WK,10);
  if(!Number.isFinite(base)) base = parseInt((WK_META&&WK_META.weekNum),10);
  if(!Number.isFinite(base)) base = 0;
  const nx = base + 1;
  await fbRef('weekly/'+nx+'/meta').set({weekNum:nx, dateLabel:dateLabel, timeLabel:"7–10 AM", frozen:false, createdAt:Date.now()});
  await fbRef('weekly/current').set(nx);
  // Freeze the old week LAST — only after the new week exists and is current,
  // so a failure can never leave the old week closed with no replacement.
  await fbRef('weekly/'+WK+'/meta').update({frozen:true});
  closeModal(); toast("નવા સબમિશન શરૂ થયા","ok"); await loadAll();
};

window.uploadAnnouncementImage = () => {
  if(!CLOUDINARY_CFG || !CLOUDINARY_CFG.cloudName){
    return toast("Cloudinary સેટ નથી — પહેલા Photo tab → સેટિંગ્સ માં configure કરો","err");
  }
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = async () => {
    const f = inp.files[0]; if(!f) return;
    toast("ઇમેજ અપલોડ થઈ રહી છે...");
    try{
      const dataUrl = await resizePhoto(f, 1200, 0.82);
      const fd = new FormData();
      fd.append('file', dataUrl);
      fd.append('upload_preset', CLOUDINARY_CFG.uploadPreset);
      fd.append('folder', 'sristi/announcements');
      const r = await fetch('https://api.cloudinary.com/v1_1/'+encodeURIComponent(CLOUDINARY_CFG.cloudName)+'/image/upload', {method:'POST', body:fd});
      if(!r.ok) throw new Error("Cloudinary "+r.status);
      const j = await r.json();
      const url = j.secure_url;
      const imgInp = document.getElementById('ancImg');
      const prev = document.getElementById('ancPreview');
      if(imgInp) imgInp.value = url;
      if(prev){ prev.src = url; prev.style.display=''; }
      toast("✓ અપલોડ થયું","ok");
    }catch(e){ console.error(e); toast("Upload નિષ્ફળ: "+(e.message||e),"err"); }
  };
  inp.click();
};

window.saveHaatForm = async (code) => {
  const nameGu   = ($('#hfName')?.value||'').trim();
  const days     = ($('#hfDay')?.value||'').trim();
  const time     = ($('#hfTime')?.value||'').trim();
  const deadline = ($('#hfDeadline')?.value||'').trim();
  const gmaps    = ($('#hfGmaps')?.value||'').trim();
  const cityGu   = ($('#hfCity')?.value||'').trim();
  if(!nameGu) return toast("નામ ભરો","err");
  if(_busy) return; _busy = true;
  try{
    if(code){
      await fbRef('haats/'+code).update({nameGu, name:nameGu, days, time, deadline, gmaps, cityGu, city:cityGu});
      Object.assign(HAATS[code], {nameGu, name:nameGu, days, time, deadline, gmaps, cityGu, city:cityGu});
      logAudit('haat-edit','haats/'+code,{name:nameGu});
    } else {
      const newCode = 'H-'+Date.now().toString(36).toUpperCase();
      const seqOrder = Object.values(HAATS).reduce((m,h)=>Math.max(m,+h.seqOrder||0),0)+1;
      const data = {code:newCode, nameGu, name:nameGu, days, time, deadline, gmaps, cityGu, city:cityGu, open:false, seqOrder, createdAt:Date.now()};
      await fbRef('haats/'+newCode).set(data);
      HAATS[newCode] = data;
      logAudit('haat-add','haats/'+newCode,{name:nameGu});
    }
    closeModal();
    toast(`✓ હાટ "${nameGu}" સાચવાયો`,"ok");
    refreshHaatOpenCountInTopbar();
    setTabBodyHtml();
  }catch(e){ console.error(e); toast("Save નિષ્ફળ: "+(e.message||e),"err"); }
  finally{ _busy = false; }
};

window.deleteHaat = async (code) => {
  const h = HAATS[code];
  if(!h) return toast("હાટ મળ્યો નથી","err");
  const nm = h.nameGu || h.name || code;
  const assignedFarmers = FARMERS.filter(f => Array.isArray(f.haatCodes) && f.haatCodes.includes(code));
  const inCurrentWeek = Object.values(SUBS||{}).filter(s => s && Array.isArray(s.farmerHaatCodes) && s.farmerHaatCodes.includes(code));
  let warn = '';
  if(inCurrentWeek.length) warn = `\n\n⚠️ આ અઠવાડિયે ${inCurrentWeek.length} ખેડૂતે આ હાટ માટે યાદી મોકલી છે — delete કરવાથી એ યાદીઓ પરથી હાટનું નામ નહીં હટે, પણ કેટલોગમાં એ હાટ હવે નહીં દેખાય.`;
  else if(assignedFarmers.length) warn = `\n\n${assignedFarmers.length} ખેડૂત આ હાટ સાથે જોડાયેલા છે (આ અઠવાડિયે યાદી નથી મોકલી) — તેમની ફાળવણીમાંથી આપોઆપ અસર નહીં થાય (harmless — filtered out already).`;
  if(!(await asyncConfirm(`"${nm}" હાટ કાયમ માટે delete કરવો છે?${warn}`, 'હા, delete કરો', 'રદ', true))) return;
  if(_busy) return; _busy = true;
  try{
    // V67 fix: the deployed RTDB rules (confirmed live, unlike productsDeleted for products)
    // have NO whitelist entry for a haatsDeleted node. A multi-path .update() is atomic — the
    // permission-denied write to that unlisted path was rejecting the WHOLE update, including
    // the otherwise-permitted haats/{code}:null delete. Haats have no auto-resurrection path
    // (unlike products' loadAllProductsAcrossWeeks history-sync), so a tombstone isn't
    // load-bearing here — logAudit() below already records who/what/when to the whitelisted
    // auditLog node, which is all the paper trail this actually needs.
    await fbRef('haats/'+code).remove();
    delete HAATS[code];
    logAudit('haat-delete','haats/'+code,{name:nm});
    toast(`🗑️ "${nm}" delete થયો`,"ok");
    closeModal();
    refreshHaatOpenCountInTopbar();
    setTabBodyHtml();
  }catch(e){ console.error(e); toast("Delete નિષ્ફળ: "+(e.message||e),"err"); }
  finally{ _busy = false; }
};

  const total = Object.keys(HAATS).length;

  target.innerHTML = `📍 હાટ <b style="color:var(--green2)">${open}</b>/${total} ઓપન`;

window.toggleHaatOpenInline = async (code) => {
  if(!HAATS[code]) return;
  const newState = !HAATS[code].open;
  try{
    await fbRef('haats/'+code+'/open').set(newState);
    HAATS[code].open = newState;
    const btn = document.getElementById('op_'+code);
    if(btn){
      btn.style.background = newState ? 'var(--green-pale)' : '#eee';
      btn.style.color = newState ? 'var(--green2)' : '#666';
      btn.innerHTML = newState ? '✅ ઓપન' : '⚫ બંધ';
    }
    refreshHaatOpenCountInTopbar();
    toast(`${HAATS[code].nameGu||HAATS[code].name||code} ${newState?'ઓપન':'બંધ'}`,'ok');
  }catch(e){
    console.error(e);
    toast('Save નિષ્ફળ','err');
  }
};

window.setAllHaatsOpen = async (open) => {
  const updates = {};
  Object.values(HAATS).forEach(h => { updates[`haats/${h.code}/open`] = open; });
  try{
    await fbRef('').update(updates);
    Object.values(HAATS).forEach(h => { h.open = open; });
    refreshHaatOpenCountInTopbar();
    toast(`બધા હાટ ${open?'ઓપન':'બંધ'} થયા`,'ok');
    closeModal();
    openHaatWeekEditor();
  }catch(e){ toast('Save નિષ્ફળ','err'); }
};

function formatDateLabel(iso){
  // "2026-06-14" -> "14 June 2026"
  if(!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return '';
  const [y, m, d] = iso.split('-').map(Number);
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${d} ${MONTHS[m-1]} ${y}`;
}

window.saveHaatWeeks = async () => {
  const updates = {};
  let n = 0;
  for (const h of Object.values(HAATS)) {
    const numEl = document.getElementById('wn_'+h.code);
    const dateEl = document.getElementById('wd_'+h.code);
    if (!numEl) continue;
    const num = parseInt(numEl.value, 10);
    const iso = (dateEl?.value || '').trim();
    if (Number.isFinite(num) && num >= 1) {
      updates[`haats/${h.code}/weekNum`] = num;
      n++;
    }
    if (iso) {
      updates[`haats/${h.code}/weekDate`] = iso;
      updates[`haats/${h.code}/weekDateLabel`] = formatDateLabel(iso);
    }
  }
  try {
    await fbRef('').update(updates);
    toast(`✓ ${n} હાટ સચવાયા`, 'ok');
    closeModal();
    await loadAll();
  } catch (e) {
    console.error(e); toast('સાચવવામાં ભૂલ', 'err');
  }
};

function showState(icon,title,body){
  $('#wrap').innerHTML = `<div class="state"><div class="state-icon">${icon}</div><div class="state-title">${title}</div><div class="state-body">${body}</div></div>`;
}

/* ════════ V25: Start fresh for this haat (+ Undo) ════════ */
window.askFreshHaat = async () => {
  const ok = await asyncConfirm(
    "Start fresh for this haat? Everyone resets to PENDING. The current submissions are archived (kept safe) — not deleted — so you can Undo.",
    "Yes, start fresh", "Cancel", true);
  if(!ok) return;
  try{
    const cur = (await fbRef('weekly/'+WK+'/submissions').get()).val() || {};
    const key = 'arch_'+Date.now();
    await fbRef('weekly/'+WK+'/_archive/'+key).set({ at: weekRange(), count: Object.keys(cur).length, submissions: cur });
    await fbRef('weekly/'+WK+'/_lastArchive').set(key);
    await fbRef('weekly/'+WK+'/submissions').remove();
    toast("Fresh round started — everyone pending. Undo available.","ok");
    await loadAll();
  }catch(e){ console.error(e); toast("Start-fresh failed: "+(e.message||e),"err"); }
};
window.undoFreshHaat = async () => {
  try{
    const key = (await fbRef('weekly/'+WK+'/_lastArchive').get()).val();
    if(!key) return toast("Nothing to undo","err");
    const arch = (await fbRef('weekly/'+WK+'/_archive/'+key).get()).val();
    if(!arch) return toast("Nothing to undo","err");
    await fbRef('weekly/'+WK+'/submissions').set(arch.submissions || {});
    await fbRef('weekly/'+WK+'/_archive/'+key).remove();
    await fbRef('weekly/'+WK+'/_lastArchive').remove();
    toast("Undone — submissions restored.","ok");
    await loadAll();
  }catch(e){ console.error(e); toast("Undo failed: "+(e.message||e),"err"); }
};
