<style>
:root{
  --green:#1b4332; --green2:#2d6a4f; --green3:#52b788; --green-pale:#d8f3dc;
  --orange:#e36414; --orange-pale:#fff0e0; --yellow:#f7c59f;
  --red:#c1121f; --bg:#fffbf4; --card:#fff; --text:#1a1a1a; --muted:#6b7280; --border:#e8e0d0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* V14 (2026-06-23): Inter for English/Latin + Hind Vadodara for Gujarati — global override (replaces Noto/Fraunces/DM Sans). */
*,*::before,*::after{font-family:"Inter","Hind Vadodara",sans-serif !important}
body{font-family:"Inter","Hind Vadodara",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.45}
img.emoji{height:1em;width:1em;margin:0 .05em 0 .1em;vertical-align:-.15em;display:inline-block}
.wrap{max-width:560px;margin:0 auto;background:var(--bg);min-height:100vh}

/* HERO */
.hero{position:relative;height:340px;overflow:hidden;background:#1b4332}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 90%;filter:brightness(.65)}
.hero-fallback{display:none}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(27,67,50,.85) 100%)}
.hero-logos{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:center;z-index:2}
.hero-logo{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.55);padding:3px;backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center}
.hero-logo img{width:100%;height:100%;object-fit:contain;border-radius:50%}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:24px 20px 8px;color:#fff}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--orange);color:#fff;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:4px;padding:4px 10px;margin-bottom:10px}
.hero-title{font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:clamp(26px,7.5vw,36px);font-weight:900;line-height:1.05;margin-bottom:14px;white-space:nowrap}
.hero-sub{font-size:14px;opacity:.88;margin-bottom:14px;font-weight:300}
.hero-chips{display:flex;flex-wrap:wrap;gap:8px}
.hero-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(4px);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:#fff;white-space:nowrap}

/* LOCATIONS */
.locations-strip{background:var(--green);padding:16px 16px 14px}
.loc-heading{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--green3);margin-bottom:10px}
.loc-cards{display:flex;flex-direction:column;gap:8px}
.loc-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.loc-name{font-size:13px;font-weight:600;color:#fff}
.loc-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
.loc-link{font-size:11px;font-weight:700;color:var(--green);background:var(--green3);border-radius:20px;padding:4px 12px;text-decoration:none;white-space:nowrap;flex-shrink:0;margin-left:10px}
.loc-link.more{background:transparent;color:var(--green3);border:1px solid rgba(255,255,255,.2)}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100}
.tab{flex:1;padding:13px 8px;text-align:center;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.active{color:var(--green2);border-bottom-color:var(--green2)}

/* SEARCH + FILTERS */
.controls{background:#fff;padding:12px 14px 10px;border-bottom:1px solid var(--border);position:sticky;top:48px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.search-wrap{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:0 12px;margin-bottom:10px}
.search-wrap input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:14px;padding:10px 0;color:var(--text)}
.search-wrap input::placeholder{color:var(--muted)}
.filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;white-space:nowrap;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text);font-family:inherit;transition:.15s}
.filter-btn.active{background:var(--green2);border-color:var(--green2);color:#fff}

/* RESULTS BAR */
.results-bar{padding:10px 16px;font-size:12px;color:var(--muted)}

/* CATEGORY SECTIONS */
.cat-section{margin-bottom:4px}
.cat-header{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;background:var(--bg);position:sticky;top:138px;z-index:50;border-bottom:1px solid var(--border)}
.cat-emoji{font-size:22px}
.cat-name{font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:20px;font-weight:700;color:var(--green)}
.cat-count{font-size:11px;color:var(--muted);font-weight:500;background:var(--green-pale);border-radius:20px;padding:2px 8px;margin-left:auto}

/* ITEM CARDS — compact vertical grid (5 cols on mobile, more on bigger screens) */
.items-scroll{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:6px;padding:0 10px 14px}

.item-card{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:transform .15s;display:flex;flex-direction:column}

.item-card-img{width:100%;aspect-ratio:1;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
.item-card-img img{width:100%;height:100%;object-fit:cover}
.item-card-body{padding:4px 5px 5px;text-align:center}

.item-card-qty{font-size:8.5px;color:var(--green2);font-weight:600;margin-top:2px;line-height:1}

.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;padding:12px 14px 40px}

/* FARMER CARDS */
.farmers-list{padding:12px 14px 40px;display:flex;flex-direction:column;gap:12px}

.farmer-avatar img{width:100%;height:100%;object-fit:cover}
.farmer-info{flex:1;min-width:0}
.farmer-num{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:1px}
.farmer-name{font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:16px;font-weight:700;line-height:1.2}
.farmer-farm{font-size:11px;color:var(--muted);margin-top:1px}
.farmer-toggle{font-size:20px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.farmer-toggle.open{transform:rotate(180deg)}
.farmer-venues{display:flex;flex-wrap:wrap;gap:5px;padding:0 16px 10px}
.venue-chip{font-size:10px;font-weight:600;background:var(--green-pale);color:var(--green2);border-radius:20px;padding:3px 9px}
.farmer-items{display:none;border-top:1px solid var(--border)}
.farmer-items.open{display:block}
.farmer-item-row{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid var(--border);font-size:13px}
.farmer-item-row:last-child{border-bottom:none}
.item-cat-tag{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);background:var(--bg);border-radius:4px;padding:1px 5px;margin-right:6px}
.item-price-tag{font-weight:700;color:var(--orange);font-size:13px;white-space:nowrap}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}

function photoKey(name){
  try{ return 'p_'+btoa(unescape(encodeURIComponent(String(name||'')))).replace(/[^a-zA-Z0-9]/g,'').slice(0,100); }
  catch(e){ return 'p_'+String(name||'').replace(/[^a-zA-Z0-9]/g,'').slice(0,100); }
}
function photoFor(name){
  const k = photoKey(name);
  // 1. Slicer route: name → cellKey → URL
  const cell = PRODUCT_PHOTO_MAP[k];
  if(cell && PRODUCT_PHOTOS[cell]) return PRODUCT_PHOTOS[cell];
  // 2. Direct URL (Wikipedia, custom upload, etc.)
  return PRODUCT_PHOTOS[k] || '';
}
function cloudinaryThumb(url, w){
  if(!url) return '';
  if(url.indexOf('res.cloudinary.com') !== -1 && url.indexOf('/upload/') !== -1 && url.indexOf('/upload/w_') === -1){
    return url.replace('/upload/', '/upload/w_'+(w||200)+',q_auto,f_auto,c_fill/');
  }
  return url;
}

function venueMatch(itemVenues, venueKey){
  if(venueKey === 'all') return true;
  if(!Array.isArray(itemVenues)) return false;
  return itemVenues.some(v => v.includes(venueKey) || venueKey.includes(v));
}

async function init(){
  renderSkeleton();
  FB.app = firebase.initializeApp(FB_CONFIG);
  FB.db  = firebase.database();
  try{
    const cur = await fbRef('weekly/current').get();
    WK = cur.exists() ? cur.val() : 1;
    const [metaSnap, subSnap, fSnap, pSnap, mSnap] = await Promise.all([
      fbRef('weekly/'+WK+'/meta').get(),
      fbRef('weekly/'+WK+'/submissions').get(),
      fbRef('marketFarmers').get(),
      fbRef('productPhotos').get(),
      fbRef('productPhotoMap').get(),
    ]);
    WK_META = metaSnap.val() || {weekNum:WK};
    SUBMISSIONS = subSnap.val() || {};
    PRODUCT_PHOTOS = pSnap.val() || {};
    PRODUCT_PHOTO_MAP = mSnap.val() || {};
    const raw = fSnap.val() || {};
    Object.values(raw).forEach(f => { if(f && f.id && f.active!==false) FARMERS_MAP[f.id] = f; });
  }catch(e){

    return renderErrorState(init);

}

function farmerVenues(f){
  if(!f) return [];
  if(Array.isArray(f.venues)) return f.venues;
  if(typeof f.haat === 'string' && f.haat) return f.haat.split(/[,;|\/]/).map(s=>s.trim()).filter(Boolean);
  return [];
}

function buildLists(){
  ALL_ITEMS = []; FARMER_LIST = [];
  // 1. Collect raw (farmer, item) tuples and build per-farmer list
  const allRaw = [];
  Object.keys(SUBMISSIONS).forEach(fid => {
    const sub = SUBMISSIONS[fid];
    if(sub.status === 'pending' || sub.status === 'rejected') return;
    const f = FARMERS_MAP[fid] || {id:fid, name: sub.farmerName || "ખેડૂત"};
    // V15: venues come from THIS week's submission (the haat(s) the farmer actually submitted for),
    // NOT the farmer's full enrollment — so a closed haat doesn't show. Fallback to enrollment for legacy subs.
    const venues = (sub.farmerHaat && String(sub.farmerHaat).trim())
      ? String(sub.farmerHaat).split(/[,;|\/]/).map(s=>s.trim()).filter(Boolean)
      : farmerVenues(f);
    const items = (sub.items||[]).filter(it=>it.available!==false);
    if(!items.length) return;
    items.forEach((it, idx)=>{
      allRaw.push({...it, farmerName: f.name || sub.farmerName || "ખેડૂત", farmerFid: fid, venues});
    });
    FARMER_LIST.push({
      id:fid, name:f.name||sub.farmerName||"ખેડૂત", farm:f.farm||"",
      loc:[f.village,f.district].filter(Boolean).join(", "),
      phone:f.phone||"", photo:f.photoUrl||"", venues, items
    });
  });
  // 2. Aggregate. Group by slicer's cellKey when available (ignoring unit so 500ml & 1Lt merge),
  //    else fall back to name+unit so items without a photo mapping stay safe.
  const aggMap = new Map();
  allRaw.forEach(it => {
    const trimmed = (it.name||'').trim();
    const sk = photoKey(trimmed);
    const cellKey = PRODUCT_PHOTO_MAP[sk];
    const groupId = cellKey ? cellKey : `${trimmed}|${it.unit||''}`;
    let agg = aggMap.get(groupId);
    if(!agg){
      agg = {
        name: trimmed, nameOptions: new Set([trimmed]),
        unitCounts: {}, cat: it.cat, emoji: it.emoji,
        prices: [], totalQty: 0,
        venueSet: new Set(), farmers: [],
        _k: 'agg_'+btoa(unescape(encodeURIComponent(groupId))).replace(/[^a-zA-Z0-9]/g,'').slice(0,32)
      };
      aggMap.set(groupId, agg);
    } else {
      agg.nameOptions.add(trimmed);
    }
    const u = it.unit||'';
    agg.unitCounts[u] = (agg.unitCounts[u]||0)+1;
    const p = +it.price || 0;
    if(p > 0) agg.prices.push(p);
    if(it.qty != null && it.qty !== "" && +it.qty > 0) agg.totalQty += +it.qty;
    (it.venues || []).forEach(v => agg.venueSet.add(v));
    agg.farmers.push({name:it.farmerName, farmerFid:it.farmerFid, originalItemName:trimmed, unit:u, price:p, qty:+it.qty||0});
  });
  // 3. Build ALL_ITEMS — canonical name = shortest; canonical unit = most common
  ALL_ITEMS = [...aggMap.values()].map(agg => {
    const canonical = [...agg.nameOptions].sort((a,b)=> a.length - b.length || a.localeCompare(b))[0];
    const variantNames = [...agg.nameOptions].filter(n=>n!==canonical);
    const sortedUnits = Object.entries(agg.unitCounts).sort((a,b)=>b[1]-a[1]);
    const canonicalUnit = sortedUnits[0][0];
    const hasMultipleUnits = sortedUnits.length > 1;
    const minP = agg.prices.length ? Math.min(...agg.prices) : 0;
    const maxP = agg.prices.length ? Math.max(...agg.prices) : 0;
    return {
      name: canonical, unit: canonicalUnit, cat: agg.cat, emoji: agg.emoji,
      minPrice: minP, maxPrice: maxP, price: minP,
      qty: agg.totalQty || null,
      hasMultipleUnits,
      farmerCount: agg.farmers.length,
      venues: [...agg.venueSet],
      farmers: agg.farmers,
      variantNames,
      _k: agg._k
    };
  });
}

function filteredItems(){
  const q = Q.trim().toLowerCase();
  return ALL_ITEMS.filter(it=>{
    if(CAT!=='all' && it.cat!==CAT) return false;
    if(!venueMatch(it.venues, VENUE)) return false;
    if(q){
      const hay = (it.name+' '+(it.cat||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function filteredFarmers(){
  const q = Q.trim().toLowerCase();
  return FARMER_LIST.filter(f=>{
    if(CAT!=='all' && !f.items.some(it=>it.cat===CAT)) return false;
    if(!venueMatch(f.venues, VENUE)) return false;
    if(q){
      const hay = (f.name+' '+f.loc+' '+f.farm+' '+f.items.map(i=>i.name).join(' ')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function uniqueActiveVenues(){

  FARMER_LIST.forEach(f=>f.venues.forEach(v=>set.add(v)));
  return VENUES.filter(v=>{
    return [...set].some(s => s.includes(v.key) || v.key.includes(s));
  });
}

        <div style="flex:1;min-width:0">
          <div style="font-size:12.5px;font-weight:600">${esc(f.name)}</div>
          ${venueText ? `<div style="font-size:10px;color:#6b7280;margin-top:1px">📍 ${esc(venueText)}</div>` : ''}
        </div>
        <div style="font-size:13.5px;color:#e36414;font-weight:700;flex-shrink:0">₹${esc(f.price)}<span style="font-size:9.5px;color:#6b7280;font-weight:500">/${esc(f.unit)}</span></div>
        ${waLink ? `<a href="${waLink}" target="_blank" rel="noopener" style="background:#25d366;color:#fff;border-radius:6px;padding:6px 9px;font-size:11px;font-weight:700;text-decoration:none;flex-shrink:0">📞</a>` : ''}
      </div>
    `;
  }).join('');

  const overlay = document.createElement('div');
  overlay.id = 'productSheetOverlay';
  overlay.style.cssText = wrap;
  overlay.innerHTML = `
    <div style="${sheet}">
      ${isSmall ? `
        <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #e8e0d0;flex-shrink:0">
          <div onclick="closeProductSheet()" style="background:#f4f4ef;color:#444;font-size:16px;font-weight:600;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer">←</div>
          <div style="width:38px;height:38px;background:#d8f3dc;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0">${img}</div>
          <div style="flex:1;min-width:0">
            <div style="font-family:'Fraunces','Noto Sans Gujarati',serif;font-size:15px;font-weight:600">${esc(it.name)}</div>
            <div style="font-size:10.5px;color:#6b7280">${esc(it.cat||'')} · ${enriched.length} ખેડૂત · ₹${esc(it.minPrice)}${it.maxPrice && it.maxPrice !== it.minPrice ? '-'+esc(it.maxPrice) : ''}/${esc(it.unit)}</div>
          </div>
        </div>
        <div style="padding:11px 14px 6px;font-size:10px;color:#6b7280;font-weight:700;letter-spacing:.8px;text-transform:uppercase">આ ખેડૂત પાસે મળશે</div>
        <div style="padding:0 14px 18px;flex:1">${farmerRowsHTML}</div>
      ` : `
        <div style="padding:14px 16px 16px;overflow-y:auto">
          <div style="width:34px;height:3px;background:#d3d1c7;border-radius:3px;margin:0 auto 12px"></div>
          <div style="display:flex;align-items:center;gap:11px;margin-bottom:12px">
            <div style="width:46px;height:46px;background:#d8f3dc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;flex-shrink:0">${img}</div>
            <div style="flex:1">
              <div style="font-family:'Fraunces','Noto Sans Gujarati',serif;font-size:18px;font-weight:600">${esc(it.name)}</div>
              <div style="font-size:11px;color:#6b7280">${esc(it.cat||'')} · ${enriched.length} ખેડૂત · ₹${esc(it.minPrice)}${it.maxPrice && it.maxPrice !== it.minPrice ? '-'+esc(it.maxPrice) : ''}/${esc(it.unit)}</div>
            </div>
            <div onclick="closeProductSheet()" style="background:#f4f4ef;color:#444;font-size:18px;font-weight:600;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">×</div>
          </div>
          <div style="font-size:10px;color:#6b7280;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin:2px 0 7px">આ ખેડૂત પાસે મળશે</div>
          ${farmerRowsHTML}
        </div>
      `}
    </div>
  `;
  // a11y: dialog semantics + body-scroll lock so catalog doesn't scroll behind the sheet
  overlay.setAttribute('role', 'dialog');
  overlay.setAttribute('aria-modal', 'true');
  overlay.setAttribute('aria-label', it.name + ' — ' + enriched.length + ' ખેડૂત');
  document.body.style.overflow = 'hidden';
  document.body.appendChild(overlay);
  if(!isSmall){
    overlay.onclick = e => { if(e.target === overlay) closeProductSheet(); };
  }
  // Esc key closes the sheet (V11: store ref + remove on close so listeners don't stack across opens)
  if(_sheetEsc) document.removeEventListener('keydown', _sheetEsc);
  _sheetEsc = function(e){ if(e.key === 'Escape') closeProductSheet(); };
  document.addEventListener('keydown', _sheetEsc);
};
window.closeProductSheet = () => {
  document.getElementById('productSheetOverlay')?.remove();
  document.body.style.overflow = '';
  if(_sheetEsc){ document.removeEventListener('keydown', _sheetEsc); _sheetEsc = null; }
};

function renderFarmers(){
  const list = filteredFarmers();
  if(!list.length){
    if(FARMER_LIST.length===0){
      return `<div class="empty"><div class="empty-icon">🌱</div><p>યાદી જલ્દી જ આવશે</p></div>`;
    }
    return `<div class="empty"><div class="empty-icon">🔍</div><p>કોઈ ખેડૂત મળ્યો નહિ</p></div>`;
  }
  return `<div class="farmers-list fade-in">
    ${list.map((f,idx)=>{
      const open = OPEN_FARMERS.has(f.id);
      return `
        <div class="farmer-card">
          <div class="farmer-header" onclick="toggleFarmer('${esc(f.id)}')">
            <div class="farmer-avatar">${f.photo?`<img src="${esc(f.photo)}">`:esc((f.name||'?').charAt(0))}</div>
            <div class="farmer-info">
              <div class="farmer-num">ખેડૂત ${String(idx+1).padStart(2,'0')}</div>
              <div class="farmer-name">${esc(f.name)}</div>
              ${f.farm?`<div class="farmer-farm">${esc(f.farm)} ${f.loc?'• '+esc(f.loc):''}</div>`:(f.loc?`<div class="farmer-farm">${esc(f.loc)}</div>`:'')}
            </div>
            <div class="farmer-toggle ${open?'open':''}">▾</div>
          </div>
          ${f.venues.length?`<div class="farmer-venues">${f.venues.map(v=>`<span class="venue-chip">📍 ${esc(v)}</span>`).join('')}</div>`:''}
          <div class="farmer-items ${open?'open':''}">
            ${f.items.map(it=>`
              <div class="farmer-item-row">
                <div style="flex:1;min-width:0">
                  <span class="item-cat-tag">${esc(it.cat||'')}</span>
                  ${esc(it.name)}
                </div>
                <div class="item-price-tag">₹${esc(it.price)} <span style="font-weight:400;color:var(--muted);font-size:11px">/ ${esc(it.unit)}</span>${it.qty?` <span style="color:var(--green2);font-weight:600;font-size:10.5px;margin-left:5px">× ${esc(it.qty)} ${esc(it.unit)}</span>`:''}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('')}
  </div>`;
}

function venueChips(){
  // Count items per venue (using current CAT/Q so chip counts stay consistent with what would show)
  const counts = {};
  ALL_ITEMS.forEach(it=>{
    if(CAT!=='all' && it.cat!==CAT) return;
    (it.venues||[]).forEach(v=>{
      VENUES.forEach(vk=>{
        if(v.includes(vk.key) || vk.key.includes(v)){
          counts[vk.key] = (counts[vk.key]||0)+1;
        }
      });
    });
  });
  return VENUES.filter(v=>counts[v.key]).map(v=>({key:v.key, count:counts[v.key]}));
}

window.setTab = t => { TAB=t; render(); };
window.scrollToList = (tab) => {
  if(TAB !== tab){ TAB = tab; render(); }
  setTimeout(()=>{
    document.querySelector('.tabs')?.scrollIntoView({behavior:'smooth', block:'start'});
  }, 50);
};
window.setVenue = v => { VENUE=v; render(); };
window.setCat = c => { CAT=c; render(); };
window.setQ = q => { Q=q; clearTimeout(_qTimer); _qTimer = setTimeout(()=>{ const wasFocus = document.activeElement?.id==='searchInput'; const car = wasFocus?document.activeElement.selectionStart:null; render(); if(wasFocus){ const el=document.getElementById('searchInput'); if(el){el.focus(); if(car!=null) el.setSelectionRange(car,car);}} }, 160); };
window.resetFilters = () => { Q=''; CAT='all'; VENUE='all'; render(); };
window.toggleFarmer = id => { if(OPEN_FARMERS.has(id)) OPEN_FARMERS.delete(id); else OPEN_FARMERS.add(id); render(); };

window.shareWA = () => {
  const msg = encodeURIComponent(
    `🌿 *સૃષ્ટિ પ્રાકૃતિક ખેડૂત હાટ #${WK}*\n${WK_META.dateLabel?WK_META.dateLabel+'\n':''}\n`+
    `ઝેરમુક્ત શાક • ફળ • ઘી • મધ — સીધું વેરિફાઈડ ખેડૂત પાસેથી.\n\n`+
    `બધી પેદાશ અને ભાવ:\n`+location.href+`\n\n`+
    `મિત્રો, સોસાયટી ગ્રુપમાં ફોરવર્ડ કરજો. 🙏`
  );
  window.open(`https://wa.me/?text=${msg}`, '_blank');
};

window.showAllLocs = () => {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:#fff;width:100%;max-width:420px;border-radius:18px;overflow:hidden;max-height:80vh;display:flex;flex-direction:column">
      <div style="padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:700">બધા હાટ સ્થળ</div>
        <button onclick="this.closest('div[style*=fixed]').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)">✕</button>
      </div>
      <div style="padding:12px;overflow-y:auto">
        ${VENUES.map(v=>`
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
            <div style="min-width:0;flex:1"><div style="font-size:13.5px;font-weight:600">${esc(v.name)}</div><div style="font-size:11px;color:var(--muted)">${esc(v.sub)}</div></div>
            <a href="${esc(v.map)}" target="_blank" rel="noopener" style="font-size:11px;font-weight:700;color:var(--green);background:var(--green3);border-radius:20px;padding:4px 12px;text-decoration:none;white-space:nowrap;margin-left:10px">નક્શો ↗</a>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
};

init();
</script>
