const CAT_EMOJI = {
  "શાકભાજી":"🥬","ભાજી":"🌿","ફળ":"🥭","ડેરી":"🥛",
  "દાળ/કઠોળ":"🫘","અનાજ/લોટ":"🌾","મસાલા":"🌶️","તેલ":"🛢️",
  "ગોળ/ખાંડ":"🍯","ફરસાણ":"🍪","પ્રવાહી":"🥤","તૈયાર ભોજન":"🍽️","અન્ય":"🌿"
};
const CAT_ORDER = ["શાકભાજી","ભાજી","ફળ","ડેરી","દાળ/કઠોળ","અનાજ/લોટ","મસાલા","તેલ","ગોળ/ખાંડ","ફરસાણ","પ્રવાહી","તૈયાર ભોજન","અન્ય"];
// Merge admin-added categories (settings/categories) into the built-in lists.
function mergeCustomCats(custom){
  Object.entries(custom||{}).forEach(([name, emoji]) => {
    name = (name||'').trim(); if(!name) return;
    if(!(name in CAT_EMOJI)) CAT_EMOJI[name] = emoji || '🌿';
    if(!CAT_ORDER.includes(name)){
      const i = CAT_ORDER.indexOf('અન્ય');
      if(i >= 0) CAT_ORDER.splice(i, 0, name); else CAT_ORDER.push(name);
    }
  });
}
// Reorder CAT_ORDER by a saved order (settings/categoryOrder); unknowns keep relative pos at end.
function applyCategoryOrder(order){
  if(!Array.isArray(order) || !order.length) return;
  const rank = {}; order.forEach((n,i) => { rank[n] = i; });
  const tagged = CAT_ORDER.map((c,i) => ({c, ord: (rank[c] != null ? rank[c] : 1000 + i)}));
  tagged.sort((a,b) => a.ord - b.ord);
  CAT_ORDER.length = 0; tagged.forEach(t => CAT_ORDER.push(t.c));
}

// Live Mon→Sun date range of the current week (DD-MM-YYYY to DD-MM-YYYY) — replaces the confusing #number.
function weekRange(d){
  d = d || new Date();
  const day = (d.getDay()+6)%7;
  const mon = new Date(d); mon.setDate(d.getDate()-day);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const f = x => String(x.getDate()).padStart(2,'0')+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+x.getFullYear();
  return f(mon)+' to '+f(sun);
}
// V26: auto-generate the little schedule line (e.g. "ગુરુવાર સવાર 7–10") from a
// haat's day+time fields, instead of a separately hand-typed string. Derived + verified
// against all 7 real live haat time patterns before use — see sristi-haat-v26 notes.
function haatScheduleText(h){
  const DAY_FULL  = {Sun:'રવિવાર',Mon:'સોમવાર',Tue:'મંગળવાર',Wed:'બુધવાર',Thu:'ગુરુવાર',Fri:'શુક્રવાર',Sat:'શનિવાર'};
  const DAY_SHORT = {Sun:'રવિ',Mon:'સોમ',Tue:'મંગળ',Wed:'બુધ',Thu:'ગુરુ',Fri:'શુક્ર',Sat:'શનિ'};
  const days = Array.isArray(h.days) ? h.days : (h.days ? [h.days] : []);
  const dayText = days.length<=1
    ? (days[0] ? (DAY_FULL[days[0]]||days[0]) : '')
    : days.map(d=>DAY_SHORT[d]||d).join(' + ');
  let periodText = '', timeRangeText = '';
  if(h.time){
    const m = /^(\d{1,2}):(\d{2})-(\d{1,2}):(\d{2})$/.exec(h.time);
    if(m){
      const h1=+m[1], h2=+m[3], min1=+m[2], min2=+m[4];
      periodText = h1<12?'સવાર':(h1<17?'બપોર':'સાંજ');
      const fmt = (hh,mm)=>{ let disp=hh%12; if(disp===0) disp=12; return mm ? `${disp}:${String(mm).padStart(2,'0')}` : `${disp}`; };
      timeRangeText = `${fmt(h1,min1)}–${fmt(h2,min2)}`;
    }
  }
  return [dayText, periodText, timeRangeText].filter(Boolean).join(' ');
}
let SITE_CFG=null;            // settings/siteConfig — admin Design tab branding (banner/logo/text)

let PRODUCTS_MASTER={}, PRODUCTS_BY_NAME={};   // Part A: master catalogue (id -> product, normName -> product)
function normName(s){ return String(s==null?'':s).trim().toLowerCase(); }
function resolveMaster(it){
  if(it && it.productId && PRODUCTS_MASTER[it.productId]) return PRODUCTS_MASTER[it.productId];
  return (it && PRODUCTS_BY_NAME[normName(it.name)]) || null;
}
let PRODUCT_PHOTOS={};        // safeKey OR cellKey -> URL/dataURL
let PRODUCT_PHOTO_MAP={};     // safeKey -> cellKey (when slicer was used)

function photoKey(name){
  try{ return 'p_'+btoa(unescape(encodeURIComponent(String(name||'')))).replace(/[^a-zA-Z0-9]/g,'').slice(0,100); }
  catch(e){ return 'p_'+String(name||'').replace(/[^a-zA-Z0-9]/g,'').slice(0,100); }
}
function photoFor(name){
  const k = photoKey(name);
  // 1. Slicer route: name → cellKey → URL
  const cell = PRODUCT_PHOTO_MAP[k];
  if(cell && PRODUCT_PHOTOS[cell]) return PRODUCT_PHOTOS[cell];
  // 2. Direct URL (Wikipedia, custom upload, etc.)
  return PRODUCT_PHOTOS[k] || '';
}
function cloudinaryThumb(url, w){
  if(!url) return '';
  if(url.indexOf('res.cloudinary.com') !== -1 && url.indexOf('/upload/') !== -1 && url.indexOf('/upload/w_') === -1){
    return url.replace('/upload/', '/upload/w_'+(w||200)+',h_'+(w||200)+',q_auto,f_auto,c_fill,g_auto/');
  }
  return url;
}

    HAATS = haatSnap.val() || {};
    HAAT_NAME_BY_CODE = {}; HAAT_OPEN_BY_NAME = {}; HAAT_CODE_BY_NAME = {};
    Object.entries(HAATS).forEach(([code, h]) => {
      HAAT_NAME_BY_CODE[code] = (h && (h.nameGu || h.name)) || code;
      if(h && h.open){
        if(h.nameGu){ HAAT_OPEN_BY_NAME[h.nameGu]=true; HAAT_CODE_BY_NAME[h.nameGu]=code; }
        if(h.name){ HAAT_OPEN_BY_NAME[h.name]=true; HAAT_CODE_BY_NAME[h.name]=code; }
      }
    });
    { const cc = {}; Object.values(catSnap.val() || {}).forEach(c => { if(c && c.name) cc[c.name] = c.emoji || '🌿'; }); mergeCustomCats(cc); CAT_LABELS = clSnap.val() || {}; applyCategoryOrder(coSnap.val() || []); }
    SUBMISSIONS = subSnap.val() || {};
    PRODUCT_PHOTOS = pSnap.val() || {};
    PRODUCT_PHOTO_MAP = mSnap.val() || {};
    const raw = fSnap.val() || {};
    Object.values(raw).forEach(f => { if(f && f.id && f.active!==false) FARMERS_MAP[f.id] = f; });
    // Part A: load the master product catalogue — customer display names resolve from here by id
    PRODUCTS_MASTER = {}; PRODUCTS_BY_NAME = {};
    Object.values(prodSnap.val() || {}).forEach(p => {
      if(!p || !p.id || p.active===false) return;
      PRODUCTS_MASTER[p.id] = p;
      if(p.name) PRODUCTS_BY_NAME[normName(p.name)] = p;
    });
  }catch(e){
    console.error(e);
    return renderErrorState(init);
  }
  buildLists();
  render();
  trackCatalogView();
}

// V39: catalog view tracking — the admin's 📊 કસ્ટમર વ્યુ popup reads exactly these fields.
// Writes go to catalogViews (the node the RTDB rules actually allow — the earlier admin-side
// reader targeted catalogStats, which the rules block; that name mismatch is why counts never
// showed). Fire-and-forget: runs after render, all failures swallowed — tracking must never
// break or slow the catalog.
function trackCatalogView(){
  try{
    const inc = firebase.database.ServerValue.increment(1);
    const today = new Date().toISOString().slice(0,10);
    let dev = '';
    try{
      dev = localStorage.getItem('kh_device_id') || '';
      if(!dev){ dev = 'd_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); localStorage.setItem('kh_device_id', dev); }
    }catch(e){ /* storage blocked (private mode) → count the view, skip unique-device */ }
    const updates = {};
    updates['catalogViews/totalViews'] = inc;
    updates['catalogViews/byDate/' + today] = inc;
    if(WK != null) updates['catalogViews/byWeek/' + WK] = inc;
    if(dev) updates['catalogViews/uniqueDevices/' + dev] = firebase.database.ServerValue.TIMESTAMP;
    // V50: record the device under TODAY's date (a "set", so re-visits don't double-count) →
    // gives accurate daily-unique visitors + cumulative-unique. Only fills from this deploy forward.
    if(dev) updates['catalogViews/dailyDevices/' + today + '/' + dev] = firebase.database.ServerValue.TIMESTAMP;
    fbRef('').update(updates).catch(()=>{});
  }catch(e){ /* never surface tracking errors to customers */ }
}

function farmerVenues(f){
  if(!f) return [];
  if(Array.isArray(f.venues)) return f.venues;
  if(typeof f.haat === 'string' && f.haat) return f.haat.split(/[,;|\/]/).map(s=>s.trim()).filter(Boolean);
  return [];
}

function buildLists(){
  ALL_ITEMS = []; FARMER_LIST = [];
  // 1. Collect raw (farmer, item) tuples and build per-farmer list
  const allRaw = [];
  Object.keys(SUBMISSIONS).forEach(fid => {
    const sub = SUBMISSIONS[fid];
    if(sub.status === 'pending' || sub.status === 'rejected') return;
    const f = FARMERS_MAP[fid] || {id:fid, name: sub.farmerName || "ખેડૂત"};
    // Show products ONLY for haats that are currently OPEN. A product submitted to a
    // closed haat is hidden; a product submitted to [open, closed] shows under the open one only.
    // V26: venues are haat CODES (stable, admin-assigned), not display names — names can be
    // renamed/reordered freely without breaking this matching (was the root cause of 3 live
    // regressions on 2026-07-01, all from fuzzy name-substring matching between two independent
    // name strings for the same haat).
    const subCodes = Array.isArray(sub.farmerHaatCodes) ? sub.farmerHaatCodes : [];
    let openCodes = [];
    if(subCodes.length){
      // Primary path: keep only the codes whose haat is open.
      openCodes = subCodes.filter(c => HAATS[c] && HAATS[c].open);
      if(!openCodes.length) return;                       // all of this farmer's haats closed → hide
    } else {
      // Legacy path (no codes, pre-enforcement submissions): resolve venue NAMES to codes via
      // the open-haat reverse map; hide if none resolve to an open haat.
      const rawVenues = (sub.farmerHaat && String(sub.farmerHaat).trim())
        ? String(sub.farmerHaat).split(/[,;|\/]/).map(s=>s.trim()).filter(Boolean)
        : farmerVenues(f);
      openCodes = rawVenues.map(nm => HAAT_CODE_BY_NAME[nm]).filter(Boolean);
      if(!openCodes.length) return;                       // no open venue → hide
    }
    const venues = openCodes;
    const items = (sub.items||[]).filter(it=>it.available!==false);
    if(!items.length) return;
    // Part A: resolve each item to its MASTER product → display the master name + category.
    // Legacy items with no master match keep their typed name but fall into "અન્ય" (Other).
    const resolved = items.map(it => {
      const m = resolveMaster(it);
      // Per-venue price keyed by haat CODE — only OPEN venues. Use per-haat price if set, else base.
      const pbv = {};
      openCodes.forEach(code => {
        pbv[code] = (it.priceByHaat && it.priceByHaat[code] != null) ? +it.priceByHaat[code] : (+it.price||0);
      });
      return { ...it,
        _dispName: m ? m.name : (it.name||'').trim(),
        _dispCat:  m ? (m.cat||'અન્ય') : 'અન્ય',
        _masterId: m ? m.id : null,
        _emoji:    (m && m.emoji) || it.emoji,
        _photo:    (m && m.photo) || '',
        _aliases:  (m && m.aliases) || '',
        _priceByVenue: pbv,
      };
    }).filter(it => it._masterId); // Only show products in the admin catalogue
    resolved.forEach(it=>{
      allRaw.push({...it, farmerName: f.name || sub.farmerName || "ખેડૂત", farmerFid: fid, venues});
    });
    FARMER_LIST.push({
      id:fid, name:f.name||sub.farmerName||"ખેડૂત", farm:f.farm||"",
      loc:[f.village,f.district].filter(Boolean).join(", "),
      phone:f.phone||"", photo:f.photoUrl||"", venues,
      items: resolved.map(it => ({...it, name: it._dispName, cat: it._dispCat, emoji: it._emoji}))
    });
  });
  // 2. Aggregate. Group by slicer's cellKey when available (ignoring unit so 500ml & 1Lt merge),
  //    else fall back to name+unit so items without a photo mapping stay safe.
  const aggMap = new Map();
  allRaw.forEach(it => {
    const dispName = it._dispName || (it.name||'').trim();
    const isMaster = !!it._masterId;
    // Part A: group master-resolved items by master id (variants consolidate under the master);
    // legacy items keep the old cellKey / name+unit grouping.
    const groupId = isMaster ? ('m_'+it._masterId)
                  : (PRODUCT_PHOTO_MAP[photoKey(dispName)] || `${dispName}|${it.unit||''}`);
    let agg = aggMap.get(groupId);
    if(!agg){
      agg = {
        name: dispName, isMaster, nameOptions: new Set([dispName]),
        unitCounts: {}, cat: it._dispCat || it.cat || 'અન્ય', emoji: it._emoji || it.emoji, photoUrl: it._photo || '',
        aliases: it._aliases || '',
        prices: [], totalQty: 0,
        venueSet: new Set(), farmers: [],
        _k: 'agg_'+btoa(unescape(encodeURIComponent(groupId))).replace(/\+/g,'p').replace(/\//g,'q').replace(/=/g,'')
      };
      aggMap.set(groupId, agg);
    } else {
      agg.nameOptions.add(dispName);
    }
    const u = it.unit||'';
    agg.unitCounts[u] = (agg.unitCounts[u]||0)+1;
    const p = +it.price || 0;
    if(p > 0) agg.prices.push(p);
    if(it.qty != null && it.qty !== "" && +it.qty > 0) agg.totalQty += +it.qty;
    (it.venues || []).forEach(v => agg.venueSet.add(v));
    agg.farmers.push({name:it.farmerName, farmerFid:it.farmerFid, originalItemName:dispName, unit:u, price:p, qty:+it.qty||0, priceByVenue: it._priceByVenue || {}});
  });
  // 3. Build ALL_ITEMS — master groups use the master name; legacy use shortest variant.
  ALL_ITEMS = [...aggMap.values()].map(agg => {
    const canonical = agg.isMaster ? agg.name : [...agg.nameOptions].sort((a,b)=> a.length - b.length || a.localeCompare(b))[0];
    const variantNames = [...agg.nameOptions].filter(n=>n!==canonical);
    const sortedUnits = Object.entries(agg.unitCounts).sort((a,b)=>b[1]-a[1]);
    const canonicalUnit = sortedUnits[0][0];
    const hasMultipleUnits = sortedUnits.length > 1;
    const minP = agg.prices.length ? Math.min(...agg.prices) : 0;
    const maxP = agg.prices.length ? Math.max(...agg.prices) : 0;
    return {
      name: canonical, unit: canonicalUnit, cat: agg.cat, emoji: agg.emoji, photoUrl: agg.photoUrl || '',
      minPrice: minP, maxPrice: maxP, price: minP,
      qty: agg.totalQty || null,
      hasMultipleUnits,
      farmerCount: agg.farmers.length,
      venues: [...agg.venueSet],
      farmers: agg.farmers,
      variantNames,
      aliases: agg.aliases || '',
      _k: agg._k
    };
  });
}

function filteredItems(){
  const q = Q.trim().toLowerCase();
  return ALL_ITEMS.filter(it=>{
    if(CAT!=='all' && it.cat!==CAT) return false;
    if(!venueMatch(it.venues, VENUE)) return false;
    if(q){
      const hay = (it.name+' '+(it.cat||'')+' '+(it.aliases||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function filteredFarmers(){
  const q = Q.trim().toLowerCase();
  return FARMER_LIST.filter(f=>{
    if(CAT!=='all' && !f.items.some(it=>it.cat===CAT)) return false;
    if(!venueMatch(f.venues, VENUE)) return false;
    if(q){
      const hay = (f.name+' '+f.loc+' '+f.farm+' '+f.items.map(i=>i.name+' '+(i._aliases||'')).join(' ')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

// All physical haat locations, ordered by admin's seqOrder — used for the informational
// "all locations" panels (hero location strip, showAllLocs), independent of weekly open status.
function allVenuesSorted(){
  return Object.entries(HAATS)
    .map(([code,h]) => ({key:code, name:(h&&(h.nameGu||h.name))||code, sub:haatScheduleText(h||{}), map:(h&&h.gmaps)||''}))
    .sort((a,b) => ((HAATS[a.key]&&HAATS[a.key].seqOrder)||999) - ((HAATS[b.key]&&HAATS[b.key].seqOrder)||999));
}
// Venues that actually have something for sale this week (drives the location strip preview).
function uniqueActiveVenues(){
  const set = new Set();
  FARMER_LIST.forEach(f=>(f.venues||[]).forEach(v=>set.add(v)));
  return allVenuesSorted().filter(v=>set.has(v.key));
}

// V26: priceByVenue is keyed by haat CODE (stable) — direct lookup, no fuzzy matching needed.
// Per-haat pricing: a farmer's effective price at the currently selected venue (base when 'all').
function farmerEffPrice(f){
  if(VENUE !== 'all'){
    const v = f.priceByVenue && f.priceByVenue[VENUE];
    if(v != null) return +v||0;
  }
  return +f.price||0;
}
// Item price min/max, scoped to the selected venue (only farmers present at that venue).
function itemPriceRange(it){
  let prices;
  if(VENUE === 'all'){
    prices = (it.farmers||[]).map(f => +f.price||0).filter(p=>p>0);
  } else {
    prices = (it.farmers||[])
      .map(f => { const v = f.priceByVenue && f.priceByVenue[VENUE]; return v != null ? +v||0 : 0; })
      .filter(p=>p>0);
  }
  if(!prices.length) return {min: it.minPrice||it.price||0, max: it.maxPrice||it.price||0};
  return {min: Math.min(...prices), max: Math.max(...prices)};
}

// it.farmerCount is a STATIC total set once at data-load time (all open haats combined) —
// doesn't update when the customer picks a venue. Scope it live, same as the price range.
function venueFarmerCount(it){
  if(VENUE === 'all') return it.farmerCount;
  return (it.farmers||[]).filter(f => f.priceByVenue && f.priceByVenue[VENUE] != null).length;
}
function itemCard(it){
  const emo = it.emoji || CAT_EMOJI[it.cat] || '🌿';
  const photo = it.photoUrl || photoFor(it.name);
  const img = photo ? `<img src="${esc(cloudinaryThumb(photo,200))}" alt="" loading="lazy">` : esc(emo);
  const _pr = itemPriceRange(it);
  const priceTxt = (_pr.min && _pr.max && _pr.min !== _pr.max)
    ? `₹${esc(_pr.min)}-${esc(_pr.max)}`
    : `₹${esc(_pr.min || it.price)}`;
  const scopedFarmerCount = venueFarmerCount(it);
  const farmerBadge = scopedFarmerCount > 1
    ? `<div style="position:absolute;top:3px;right:3px;background:rgba(0,0,0,.78);color:#fff;border-radius:9999px;padding:0 5px;font-size:8.5px;font-weight:700;line-height:1.35">${scopedFarmerCount}</div>`
    : '';
  return `
    <div class="item-card" onclick="openProductSheet('${esc(it._k).replace(/'/g,"\\'")}')" style="cursor:pointer">
      <div class="item-card-img" style="position:relative">${img}${farmerBadge}</div>
      <div class="item-card-body">
        <div class="item-card-name">${esc(it.name)}</div>
        <div class="item-card-price">${priceTxt}<span class="item-card-unit">/${esc(it.unit)}</span></div>
      </div>
    </div>
  `;
}

window.openProductSheet = (productKey) => {
  const it = ALL_ITEMS.find(x => x._k === productKey);
  if(!it) return;
  const _shr = itemPriceRange(it);   // venue-scoped price range for the sheet header
  // Sort farmers by price (cheapest first) — use the price for the selected venue.
  // V25 fix: only list farmers whose ACTUAL submission covers the currently selected venue —
  // same direct priceByVenue[VENUE] lookup itemPriceRange() uses above for the price range, so
  // the farmer list and the header price never disagree. Previously this showed every farmer
  // who had ANY open-haat submission for this product, regardless of the venue being viewed.
  const venueFiltered = VENUE === 'all'
    ? (it.farmers||[])
    : (it.farmers||[]).filter(f => f.priceByVenue && f.priceByVenue[VENUE] != null);
  const sorted = [...venueFiltered].sort((a,b) => (farmerEffPrice(a)||0) - (farmerEffPrice(b)||0));
  const cheapest = farmerEffPrice(sorted[0]||{}) || 0;
  // Resolve farmer details from FARMERS_MAP
  const enriched = sorted.map(f => {
    const meta = (f.farmerFid && FARMERS_MAP[f.farmerFid]) || Object.values(FARMERS_MAP).find(m => m.name === f.name);
    return {
      name: f.name,
      price: farmerEffPrice(f),

  const photo = it.photoUrl || photoFor(it.name);
  const img = photo ? `<img src="${esc(cloudinaryThumb(photo,160))}" alt="" style="width:100%;height:100%;object-fit:cover">` : esc(it.emoji||CAT_EMOJI[it.cat]||'🌿');

  const wrap = isSmall
    ? 'position:fixed;inset:0;background:#fff;z-index:300;display:flex;flex-direction:column;animation:slideUp .25s ease'
    : 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:flex-end;justify-content:center';

    : 'background:#fff;width:100%;max-width:480px;border-radius:18px 18px 0 0;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .25s ease';

  const farmerRowsHTML = enriched.map((f, idx) => {

        <div style="flex:1;min-width:0">
          <div style="font-size:12.5px;font-weight:600">${esc(f.name)}</div>
        </div>
        <div style="font-size:13.5px;color:#e36414;font-weight:700;flex-shrink:0">₹${esc(f.price)}<span style="font-size:9.5px;color:#6b7280;font-weight:500">/${esc(f.unit)}</span></div>
        ${waLink ? `<a href="${waLink}" target="_blank" rel="noopener" style="background:#25d366;color:#fff;border-radius:6px;padding:6px 9px;font-size:11px;font-weight:700;text-decoration:none;flex-shrink:0">📞</a>` : ''}
      </div>
    `;
  }).join('');

  const overlay = document.createElement('div');
  overlay.id = 'productSheetOverlay';
  overlay.style.cssText = wrap;
  overlay.innerHTML = `
    <div style="${sheet}">

        <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #e8e0d0;flex-shrink:0">
          <div onclick="closeProductSheet()" style="background:#f4f4ef;color:#444;font-size:16px;font-weight:600;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer">←</div>

            </div>
            <div onclick="closeProductSheet()" style="background:#f4f4ef;color:#444;font-size:18px;font-weight:600;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">×</div>

  document.body.appendChild(overlay);
  if(!isSmall){
    overlay.onclick = e => { if(e.target === overlay) closeProductSheet(); };

  // Esc key closes the sheet (V11: store ref + remove on close so listeners don't stack across opens)

};

function venueChips(){
  // Count items per venue code (using current CAT/Q so chip counts stay consistent with what would show)
  const counts = {};
  ALL_ITEMS.forEach(it=>{
    if(CAT!=='all' && it.cat!==CAT) return;
    (it.venues||[]).forEach(code=>{ counts[code] = (counts[code]||0)+1; });
  });
  return Object.entries(HAATS)
    .filter(([code,h]) => h && h.open && counts[code])
    .filter(([code,h]) => CITY==='all' || (h.cityGu||h.city||'')===CITY)
    .map(([code,h]) => ({key:code, label:h.nameGu||h.name||code, count:counts[code]}))
    .sort((a,b) => ((HAATS[a.key]&&HAATS[a.key].seqOrder)||999) - ((HAATS[b.key]&&HAATS[b.key].seqOrder)||999));
}

// V27: distinct cities among this week's active (open + submitted-to) venues, ordered by the
// earliest seqOrder among that city's haats. City filter is presentational only — it narrows
// which venue chips are shown; it doesn't touch item/farmer matching (VENUE still does that).
function uniqueCities(){
  const activeCodes = new Set();
  ALL_ITEMS.forEach(it => (it.venues||[]).forEach(c => activeCodes.add(c)));
  const cityOrder = new Map();
  activeCodes.forEach(code => {
    const h = HAATS[code];
    if(!h || !h.open) return;
    const cityName = h.cityGu || h.city; if(!cityName) return;
    const ord = h.seqOrder || 999;
    if(!cityOrder.has(cityName) || ord < cityOrder.get(cityName)) cityOrder.set(cityName, ord);
  });
  return [...cityOrder.entries()].sort((a,b)=>a[1]-b[1]).map(([name])=>name);
}

      <div style="padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:700">બધા હાટ સ્થળ</div>
        <button onclick="this.closest('div[style*=fixed]').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)">✕</button>
      </div>
      <div style="padding:12px;overflow-y:auto">
        ${allVenuesSorted().map(v=>`
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
            <div style="min-width:0;flex:1"><div style="font-size:13.5px;font-weight:600">${esc(v.name)}</div><div style="font-size:11px;color:var(--muted)">${esc(v.sub)}</div></div>
            <a href="${esc(v.map)}" target="_blank" rel="noopener" style="font-size:11px;font-weight:700;color:var(--green);background:var(--green3);border-radius:20px;padding:4px 12px;text-decoration:none;white-space:nowrap;margin-left:10px">નક્શો ↗</a>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
};

init();
</script>
</body>
</html>
