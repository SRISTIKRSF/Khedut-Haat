<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>મારી પેદાશ — સૃષ્ટિ ખેડૂત હાટ · V40</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b4332">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Hind+Vadodara:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1b4332; --green2:#2d6a4f; --green3:#52b788; --green-pale:#d8f3dc;
  --orange:#e36414; --orange-pale:#fff0e0; --red:#c1121f; --red-pale:#ffe0e0;
  --bg:#fffbf4; --card:#fff; --text:#1a1a1a; --muted:#6b7280; --border:#e8e0d0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* V14 (2026-06-23): Inter for English/Latin + Hind Vadodara for Gujarati — global override (replaces Noto/Fraunces/DM Sans). */
*,*::before,*::after{font-family:"Inter","Hind Vadodara",sans-serif !important}
body{font-family:"Inter","Hind Vadodara",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.45;min-height:100vh}
img.emoji{height:1em;width:1em;margin:0 .05em 0 .1em;vertical-align:-.15em;display:inline-block}
.wrap{max-width:560px;margin:0 auto;padding-bottom:110px}

/* LOGIN — background is blank by default; optionally set from Design tab → farmerLoginBg */
.login{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:24px 22px;max-width:420px;margin:0 auto}
.login-bg-img{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:none;z-index:0}
.login-bg-overlay{position:fixed;inset:0;display:none;z-index:0}
.login-hero{position:relative;z-index:1;text-align:center;padding:30px 10px 24px}
.login-hero-emoji{font-size:62px;margin-bottom:10px}
.login-title{font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:28px;font-weight:900;color:var(--green);line-height:1.1;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--muted)}
.login-card{position:relative;z-index:1;background:#fff;border:1px solid var(--border);border-radius:16px;padding:22px 20px;box-shadow:0 6px 24px rgba(27,67,50,.08)}
.frm{display:flex;flex-direction:column;gap:14px}
.frm-row{display:flex;flex-direction:column;gap:5px}
.frm-label{font-size:12.5px;font-weight:600;color:var(--muted)}
.frm-in{border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;font-size:16px;font-family:inherit;outline:none;background:#fff}
.frm-in:focus{border-color:var(--green2)}
.btn-primary{background:var(--green2);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15.5px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;box-shadow:0 4px 14px rgba(45,106,79,.3)}
.btn-primary:active{transform:scale(.99)}
.login-hint{margin-top:14px;font-size:12.5px;color:var(--muted);text-align:center;line-height:1.6}
.login-hint b{color:var(--green2);font-weight:600}
.login-err{background:var(--red-pale);color:var(--red);border-radius:8px;padding:10px 12px;font-size:13px;text-align:center;margin-top:10px;font-weight:500}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);color:#fff;padding:14px 18px 18px;position:relative;overflow:hidden}
.hdr::before{content:"🌿";position:absolute;right:-12px;top:-22px;font-size:120px;opacity:.08;transform:rotate(-15deg)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:relative;z-index:2}
.hdr-week{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.8}
.hdr-logout{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.hdr-title{font-size:20px;font-weight:800;line-height:1.2;margin-bottom:9px}
.farmer-card{background:rgba(255,255,255,.12);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:10px 13px;display:flex;align-items:center;gap:11px}
.farmer-avatar{width:38px;height:38px;border-radius:50%;background:var(--green3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--green);flex-shrink:0;overflow:hidden}
.farmer-avatar img{width:100%;height:100%;object-fit:cover}
.farmer-info{flex:1;min-width:0}
.farmer-name{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.farmer-meta{font-size:11px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* DEADLINE BAR */
.deadline{background:var(--orange-pale);border-left:4px solid var(--orange);padding:10px 16px;font-size:12.5px;color:#7a3010;font-weight:500}
.deadline b{font-weight:700}
.admin-note{background:#fff8d6;border:2px solid #f7c800;border-radius:11px;padding:12px 14px;margin:11px 14px 4px;box-shadow:0 2px 10px rgba(247,200,0,.18)}

/* SEARCH BAR (sticky) */
.search-bar{background:#fff;padding:10px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.search-wrap{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:0 12px}
.search-wrap input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:14.5px;padding:9px 0;color:var(--text)}
.search-wrap input::placeholder{color:var(--muted)}
.search-meta{font-size:11.5px;color:var(--muted);margin-top:7px;display:flex;align-items:center;justify-content:space-between}
.search-meta b{color:var(--green2);font-weight:700}

/* CATEGORY HEADER */
.cat-h{display:flex;align-items:center;gap:8px;padding:14px 16px 8px;background:var(--bg);position:sticky;top:74px;z-index:50}
.cat-h-emoji{font-size:18px}
.cat-h-name{font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:16px;font-weight:700;color:var(--green)}
.cat-h-count{font-size:10.5px;color:var(--muted);font-weight:500;background:#fff;border-radius:20px;padding:2px 8px;margin-left:auto;border:1px solid var(--border)}

/* ITEM ROW (the structured form) */
.items{padding:0 12px}
.cat-section.collapsed .items{display:none}
.cat-section.collapsed .cat-h{padding-bottom:14px}
.item{background:#fff;border:1.5px solid var(--border);border-radius:11px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;gap:9px;transition:.15s}
.item.active{border-color:var(--green3);background:#f3fbf5}
.item.search-hidden{display:none}
.ph-price{display:none!important}
.item.ph-on .ph-price{display:flex!important}
.ph-toggle{background:none;border:none;color:var(--green2);font-family:inherit;font-size:10.5px;font-weight:700;cursor:pointer;padding:2px 0;white-space:nowrap}
.phc-row{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:12.5px;color:var(--green);font-weight:600;padding:8px 11px;margin:7px 0 9px;background:var(--green-pale);border:1px solid var(--green2);border-radius:9px}
.phc-row input{width:16px;height:16px;accent-color:var(--green2);margin:0;cursor:pointer;flex-shrink:0}
.item.ph-on .wrap-bhav{opacity:.5;background:#f2f2ef!important;pointer-events:none}
.item-emo{width:38px;height:38px;border-radius:8px;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.item-emo img{width:100%;height:100%;object-fit:cover}
.item.active .item-emo{background:var(--green3)}
.item-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.item-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-unit{font-size:10.5px;color:var(--muted);font-weight:400}
.item-inputs{display:flex;gap:6px;flex-shrink:0;align-items:flex-start}
.input-col{display:flex;flex-direction:column;gap:2px;align-items:center}
.input-col-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.input-wrap{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:0 9px;gap:3px;transition:.15s}
.input-wrap.has-val{background:#fff;border-color:var(--green2)}
.input-wrap .pfx{font-size:13px;color:var(--muted);font-weight:600;flex-shrink:0;margin-left:-2px;margin-right:5px}
.input-wrap input{flex:1;min-width:0;width:44px;min-height:44px;border:none;background:none;outline:none;font-family:inherit;font-size:14px;font-weight:600;padding:7px 0;color:var(--text);text-align:center;-moz-appearance:textfield;touch-action:manipulation}
/* V36: single-haat boxes — wider ભાવ (fits ₹9999 /250gm), narrower જથ્થો */
.wrap-bhav{width:130px}
.wrap-qty{width:88px}
.input-wrap:focus-within{outline:2px solid var(--green2);outline-offset:1px}
/* V36.1: the wrap's green ring above IS the focus cue — kill the redundant inner
   outline on the number input that boxed-in and crowded the ₹ symbol. */
.input-wrap input:focus-visible{outline:none;border-radius:0}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
}
/* Visible keyboard focus ring (default browser ring is removed elsewhere) */
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[role="button"]:focus-visible{outline:2px solid var(--green2);outline-offset:2px;border-radius:6px}
.input-wrap input::-webkit-outer-spin-button,
.input-wrap input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.input-wrap .sfx{font-size:10.5px;color:#374151;font-weight:600;white-space:nowrap;flex-shrink:0}
.input-wrap .sfx.qty-sfx{color:var(--green2);font-weight:700}

/* CUSTOM ADD */
.add-row{padding:16px 14px 6px;text-align:center}
.add-btn{background:#fff;border:2px dashed var(--green3);color:var(--green2);border-radius:11px;padding:11px 18px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit}
.add-btn:active{background:var(--green-pale)}
.custom-form{background:#fff;border:1.5px solid var(--green3);border-radius:11px;padding:12px;margin:10px 12px 0}
.custom-form .frm-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.custom-form-foot{display:flex;gap:8px;margin-top:10px}
.btn-mini{padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex:1;border:1.5px solid var(--border);background:#fff;color:var(--muted)}
.btn-mini.primary{background:var(--green2);color:#fff;border-color:var(--green2)}

/* CUSTOM ITEMS LIST (above PRODUCT_LIB items) */
.custom-list-hdr{padding:6px 16px;font-size:11px;font-weight:700;color:var(--green2);text-transform:uppercase;letter-spacing:1px}

/* SUBMIT FOOTER */
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:11px 14px env(safe-area-inset-bottom,11px);box-shadow:0 -4px 18px rgba(0,0,0,.06);z-index:60}
.submit-bar-inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:10px}
.submit-summary{flex:1;font-size:11.5px;color:var(--muted);line-height:1.3}
.submit-summary b{color:var(--text);font-size:13.5px;display:block;font-weight:700}
.btn-submit{background:var(--green2);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;box-shadow:0 4px 12px rgba(45,106,79,.3)}
.btn-submit:disabled{background:#aaa;box-shadow:none;cursor:not-allowed}
.btn-submit:active:not(:disabled){transform:scale(.97)}

/* STATES & TOAST */
.state{padding:80px 30px;text-align:center;color:var(--muted)}
.state-icon{font-size:60px;margin-bottom:14px}
.state-title{font-size:17px;color:var(--text);font-weight:700;margin-bottom:6px}
.state-body{font-size:13.5px;line-height:1.6}
.toast-wrap{position:fixed;top:16px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:200;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:10px 18px;border-radius:24px;font-size:13.5px;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:80%;text-align:center;animation:toastIn .25s ease-out}
.toast.ok{background:var(--green2)}.toast.err{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* STATUS PILL */
.status-pill{display:inline-flex;align-items:center;gap:6px;background:var(--green-pale);color:var(--green2);padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:600;margin:10px 0 0 16px}
.status-pill.warn{background:var(--orange-pale);color:#7a3010}
</style>
</head>

   product library grouped by category → type price + qty for what
   you have → submit. Submission is structured items[] (no parsing
   needed). Catalog reads it directly.

   DB additions (under prakrutik_kheti namespace):
     weekly/current               → current week #
     weekly/{n}/meta              → {weekNum, dateLabel, frozen, deadline}
     weekly/{n}/submissions/{fid} → {items[], submittedAt, updatedAt}

// Live Mon→Sun date range of the current week (DD-MM-YYYY to DD-MM-YYYY) — replaces the confusing #number.
function weekRange(d){
  d = d || new Date();

  const f = x => String(x.getDate()).padStart(2,'0')+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+x.getFullYear();
  return f(mon)+' to '+f(sun);
}

function toast(msg, kind=""){
  const w=$('#toasts');const t=document.createElement('div');
  t.className='toast '+(kind||"");t.textContent=msg;
  // a11y: announce errors assertively, success politely (screen readers pick this up)
  t.setAttribute('role', kind==='err' ? 'alert' : 'status');
  t.setAttribute('aria-live', kind==='err' ? 'assertive' : 'polite');
  t.style.cursor='pointer';
  t.title='ટેપ કરી બંધ કરો';
  w.appendChild(t);
  const dismiss = ()=>{ t.style.opacity='0';t.style.transition='.3s';setTimeout(()=>t.remove(),320); };
  t.addEventListener('click', dismiss);
  // Older farmers may take time to read — 5s instead of 2.2s

}

// Replace native confirm() with a Promise-based styled dialog that matches the app
function asyncConfirm(msg, okLabel='OK', cancelLabel='Cancel'){
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');
    overlay.setAttribute('aria-labelledby', 'acTitle');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeUp .2s ease';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:14px;max-width:340px;width:100%;padding:18px 18px 14px;box-shadow:0 12px 36px rgba(0,0,0,.25)">
        <div id="acTitle" style="font-size:14px;line-height:1.55;color:#1a1a1a;white-space:pre-line">${esc(msg)}</div>
        <div style="display:flex;gap:9px;margin-top:16px">
          <button class="btn-mini" data-act="cancel" style="flex:1">${esc(cancelLabel)}</button>
          <button class="btn-mini primary" data-act="ok" autofocus style="flex:1">${esc(okLabel)}</button>
        </div>
      </div>
    `;
    const close = ok => { overlay.remove(); document.body.style.overflow=''; resolve(ok); };
    overlay.addEventListener('click', e => {
      const act = e.target?.dataset?.act;
      if(act) close(act === 'ok');
      else if(e.target === overlay) close(false);
    });
    document.addEventListener('keydown', function esc(e){
      if(e.key === 'Escape'){ document.removeEventListener('keydown', esc); close(false); }
    });
    document.body.style.overflow = 'hidden';
    document.body.appendChild(overlay);
  });
}

// Re-establish a previously verified session WITHOUT re-checking the password.
// The session blob already proves prior PIN verification within the same browser tab.
async function resumeSession(phoneClean){
  const fSnap = await fbRef('marketFarmers').get();
  const all = fSnap.val()||{};
  const _entry = Object.entries(all).find(([k,f]) =>
    f && f.active!==false &&
    String(f.phone||'').replace(/[^0-9]/g,'').slice(-10) === String(phoneClean).slice(-10)
  );
  const match = _entry ? _entry[1] : null;
  if(match) match._key = _entry[0];   // V11: capture RTDB key for safe submission fid
  if(!match){
    try{ sessionStorage.removeItem(AUTH_KEY); }catch{}
    throw new Error("Farmer record missing");
  }
  FARMER = match;
  await loadSubmission();
}

async function loginByPhone(phone, pwd, silent){
  const fSnap = await fbRef('marketFarmers').get();
  const all = fSnap.val()||{};
  // exact last-10 match (was: endsWith — overly permissive)
  const entered10 = String(phone).replace(/[^0-9]/g,'').slice(-10);
  const _entry = Object.entries(all).find(([k,f]) =>
    f && f.active!==false &&
    String(f.phone||'').replace(/[^0-9]/g,'').slice(-10) === entered10
  );
  const match = _entry ? _entry[1] : null;
  if(match) match._key = _entry[0];   // V11: capture RTDB key for safe submission fid
  if(!match) throw new Error("આ નંબર નોંધાયેલો નથી. કૃપા કરી ઑફિસ સંપર્ક કરો.");
  const phoneClean = String(match.phone||'').replace(/[^0-9]/g,'');
  const defaultPwd = phoneClean.slice(-4);
  const authSnap = await fbRef('farmerAuth/'+phoneClean).get();
  const customPwd = authSnap.exists()?String(authSnap.val().pwd||''):'';
  const expected = customPwd || defaultPwd;
  if(String(pwd) !== expected) throw new Error("પાસવર્ડ ખોટો છે");

  // Persist phone-only hint (NEVER password) in localStorage for autofill convenience
  try{ localStorage.setItem(PHONE_HINT_KEY, phoneClean); }catch{}
  // Per-tab session blob with expiry; sessionStorage dies on tab close
  try{
    sessionStorage.setItem(AUTH_KEY, JSON.stringify({phone:phoneClean, expires: Date.now() + AUTH_TTL_MS}));
  }catch{}

  FARMER = match;
  if(!silent) toast("સ્વાગત છે, "+(match.name||"")+"!", "ok");

  // SECURITY: if farmer is still using the default password (last 4 digits of phone),
  // force them to set a new one before proceeding. One-time prompt; skips on subsequent
  // logins once a custom password is recorded.
  if(!customPwd && String(pwd) === defaultPwd){
    return renderForceChangePwd(phoneClean);
  }
  await loadSubmission();
}

/* ════════ SUBMISSION LOAD ════════ */
async function loadSubmission(){
  const wkSnap = await fbRef('weekly/current').get();
  WK = wkSnap.exists() ? wkSnap.val() : 1;
  if(!wkSnap.exists()){
    await fbRef('weekly/current').set(1);
    await fbRef('weekly/1/meta').set({weekNum:1, dateLabel:"", frozen:false, createdAt:Date.now()});
  }
  const metaSnap = await fbRef('weekly/'+WK+'/meta').get();
  WK_META = metaSnap.val() || {weekNum:WK};
  if(WK_META.frozen) return showState("🔒","હાટ બંધ થઈ ગઈ",`હાટ ${esc(weekRange())} માટેનો સમય પૂરો થયો છે. આગલા હાટ માટે રાહ જુઓ.`);

  // Load product order (set by admin) — used to sort within each category
  try{
    const oSnap = await fbRef('productOrder').get();
    PRODUCT_ORDER = oSnap.val() || {};
    rebuildOrderPriority();
  }catch(e){ /* non-fatal */ }

  // Load the admin's canonical product database — overrides the seed PRODUCT_LIB
  try{
    const pSnap = await fbRef('products').get();
    const fromDB = pSnap.val();
    if(fromDB && Object.keys(fromDB).length){
      const arr = Object.values(fromDB)
        .filter(p => p && p.active !== false)
        .sort((a,b) => {
          const ca = CAT_ORDER.indexOf(a.cat); const cb = CAT_ORDER.indexOf(b.cat);
          if(ca !== cb) return (ca===-1?99:ca) - (cb===-1?99:cb);
          return (+a.order||0) - (+b.order||0);
        })
        .map(p => ({n:p.name, u:p.unit||'kg', c:p.cat||'અન્ય', e:p.emoji||'🌿', photo:p.photo||'', id:p.id||'', a:p.aliases||''}));
      if(arr.length){
        // Replace PRODUCT_LIB contents in place
        PRODUCT_LIB.length = 0;
        arr.forEach(x => PRODUCT_LIB.push(x));
      }
    }
  }catch(e){ /* non-fatal — fall back to seeded PRODUCT_LIB */ }

  // Load admin-added categories so new categories show in the form
  try{
    const cc = {};
    Object.values((await fbRef('settings/categories').get()).val() || {}).forEach(c => { if(c && c.name) cc[c.name] = c.emoji || '🌿'; });
    mergeCustomCats(cc);
    CAT_LABELS = (await fbRef('settings/categoryLabels').get()).val() || {};
    applyCategoryOrder((await fbRef('settings/categoryOrder').get()).val() || []);
  }catch(e){ /* non-fatal */ }
  // Load haats and filter to ones currently OPEN for this farmer
  try{
    const hSnap = await fbRef('haats').get();
    HAATS_ALL = hSnap.val() || {};
    const myCodes = Array.isArray(FARMER.haatCodes) ? FARMER.haatCodes : [];
    if(myCodes.length){
      OPEN_HAATS = myCodes.filter(c => HAATS_ALL[c] && HAATS_ALL[c].open);
      if(!OPEN_HAATS.length){
        const myHaatNames = myCodes.map(c => HAATS_ALL[c]?.nameGu || HAATS_ALL[c]?.name || c).join(', ');
        return showState("⏸️","હાલ કોઈ હાટ ઓપન નથી",
          `તમારા હાટ (${myHaatNames}) આ સમયે submission માટે બંધ છે. ઑફિસ ઓપન કરે ત્યારે ફરી લોગ-ઇન કરો.`);
      }
    } else {
      // Legacy farmer without haatCodes — allow all open haats
      OPEN_HAATS = Object.values(HAATS_ALL).filter(h=>h.open).map(h=>h.code);
    }
  }catch(e){ console.error(e); OPEN_HAATS = []; }

  ENTRIES = new Map();
  ROUTINE_ITEMS = new Map();
  LAST_WK_SUBMISSION = null;
  CUR_STATUS = '';

  // Load current week's submission first — if it exists, it becomes both ENTRIES (with prices) AND ROUTINE_ITEMS (shown at top)
  const curSub = await fbRef('weekly/'+WK+'/submissions/'+subFid()).get();
  if(curSub.exists()){
    const v = curSub.val();
    SUBMITTED_AT = v.submittedAt || null;
    NOTE_TO_FARMER = v.noteToFarmer || "";
    CUR_STATUS = v.status || '';
    (v.items||[]).forEach(it => {
      if(!it || !it.name) return;
      if(it.custom) return; // v2: catalogue-only — skip custom items from old submissions
      ENTRIES.set(it.name, {price:it.price||"", qty:it.qty||"", remaining: it.qtyRemaining||"", qtyByHaat: it.qtyByHaat || {}, priceByHaat: it.priceByHaat || {}, unit:it.unit, cat:it.cat, emoji:it.emoji, custom:false});
      ROUTINE_ITEMS.set(it.name, {
        lastPrice: it.price||"",
        unit: it.unit, cat: it.cat, emoji: it.emoji, custom: !!it.custom, photo: it.photo||''
      });
    });
  }

  // Always try to load last week's submission for the "ગયા હાટ ની યાદી" accordion
  const lastWk = (typeof WK==='number'?WK:parseInt(WK,10))-1;
  if(lastWk>0){
    try{
      const lastSub = await fbRef('weekly/'+lastWk+'/submissions/'+subFid()).get();
      if(lastSub.exists()){
        const v = lastSub.val();
        LAST_WK_SUBMISSION = {
          wk: lastWk,
          items: v.items || [],
          status: v.status || '',
          totalValue: (v.items||[]).reduce((s,it) => s + (+it.price||0) * (+it.qty||1), 0)
        };
        // If no current submission, also seed ROUTINE_ITEMS so the form pre-fills
        if(!curSub.exists()){
          (v.items||[]).forEach(it=>{
            if(!it || !it.name) return;
            ROUTINE_ITEMS.set(it.name, {
              lastPrice: it.price||"",
              unit: it.unit, cat: it.cat, emoji: it.emoji, custom: !!it.custom, photo: it.photo||''
            });
          });
        }
      }
    }catch{}
  }
  // Part A: seed persistent starred products (FARMER.myProductIds) so the farmer's recurring
  // items show at top EVERY week — surviving "નવો અઠવાડિયું" / skipped weeks. Resolve via the
  // master catalogue by id; products renamed/removed from the master simply won't resolve.
  if(Array.isArray(FARMER.myProductIds) && FARMER.myProductIds.length){
    const byId = {}; PRODUCT_LIB.forEach(p => { if(p.id) byId[p.id] = p; });
    FARMER.myProductIds.forEach(pid => {
      const p = byId[pid];
      if(p && !ROUTINE_ITEMS.has(p.n)){
        ROUTINE_ITEMS.set(p.n, {lastPrice:"", unit:p.u, cat:p.c, emoji:p.e, custom:false, photo:p.photo||''});
      }
    });
  }
  renderForm();
}

function customItems(){

  ENTRIES.forEach((v,name) => { if(!lib.has(name)) arr.push({n:name, u:v.unit, c:v.cat, e:v.emoji||"🌿", custom:true}); });
  return arr;
}

// Track which categories are expanded. મારી પ્રોડક્ટ્સ default open; rest closed.
const EXPANDED = new Set(['__routine__']);
window.toggleCat = (key) => {
  if(EXPANDED.has(key)) EXPANDED.delete(key); else EXPANDED.add(key);
  // Just update the section in place rather than full re-render (keeps focus)
  const safeKey = btoa(unescape(encodeURIComponent(key))).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);
  const sec = document.getElementById('cat_'+safeKey);
  if(sec){
    sec.classList.toggle('collapsed', !EXPANDED.has(key));
    const chev = sec.querySelector('.cat-chev');
    if(chev) chev.textContent = EXPANDED.has(key) ? '▼' : '▶';
  }
};

function renderItems(){
  let html = '';

  // Top section: "મારી પ્રોડક્ટ્સ"
  if(ROUTINE_ITEMS.size > 0){
    // Resolve photo + alias from the live catalogue by name — routine items loaded from a previous
    // submission have no stored photo, so fall back to the master catalogue photo (else emoji).
    const _libByName = {}; PRODUCT_LIB.forEach(p => { _libByName[p.n] = p; });
    const routineList = [...ROUTINE_ITEMS.entries()].map(([name, r]) => ({
      n: name, u: r.unit, c: r.cat, e: r.emoji || '🌿',
      custom: r.custom, lastPrice: r.lastPrice,
      photo: r.photo || (_libByName[name] && _libByName[name].photo) || '',
      a: (_libByName[name] && _libByName[name].a) || '',
    }));
    const isOpen = EXPANDED.has('__routine__');
    const safeKey = btoa(unescape(encodeURIComponent('__routine__'))).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);
    html += `
      <div class="cat-section ${isOpen?'':'collapsed'}" id="cat_${safeKey}">
        <div class="cat-h" style="background:linear-gradient(90deg,#d8f3dc,#fffbf4);cursor:pointer" onclick="toggleCat('__routine__')">
          <span class="cat-h-emoji">⭐</span>
          <span class="cat-h-name">મારી પ્રોડક્ટ્સ</span>
          <span class="cat-h-count">${routineList.length}</span>
          <span class="cat-chev" style="margin-left:6px;color:#7a7a7a;font-size:11px">${isOpen?'▼':'▶'}</span>
        </div>
        <div class="items">${routineList.map(p => itemRow(p, true)).join('')}</div>
      </div>
    `;
  }

  // Below: full master catalog by category, EXCLUDING routine items (collapsed by default)
  // PRODUCT_LIB already sorted by p.order from products DB at load time; preserve that.
  const all = [...PRODUCT_LIB].filter(p => !ROUTINE_ITEMS.has(p.n));
  const groups = {};
  all.forEach(p=>{(groups[p.c]=groups[p.c]||[]).push(p);});
  const order = CAT_ORDER.filter(c=>groups[c]).concat(Object.keys(groups).filter(c=>!CAT_ORDER.includes(c)));
  html += order.map(c=>{
    const isOpen = EXPANDED.has(c);
    const safeKey = btoa(unescape(encodeURIComponent(c))).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);
    return `
      <div class="cat-section ${isOpen?'':'collapsed'}" id="cat_${safeKey}">
        <div class="cat-h" style="cursor:pointer" onclick="toggleCat('${esc(c).replace(/'/g,"\\'")}')">
          <span class="cat-h-emoji">${CAT_EMOJI[c]||'🌿'}</span>
          <span class="cat-h-name">${esc(catLabel(c))}</span>
          <span class="cat-h-count">${groups[c].length}</span>
          <span class="cat-chev" style="margin-left:6px;color:#7a7a7a;font-size:11px">${isOpen?'▼':'▶'}</span>
        </div>
        <div class="items">${groups[c].map(itemRow).join('')}</div>
      </div>
    `;
  }).join('');
  return html;
}

// V36 (2026-06-27): pricing unit vs quantity-entry unit. The PRICE stays per the
// pricing unit (e.g. ₹30 /250gm), but the farmer enters the QUANTITY in kg for any
// gm-priced product and in Lt for any ml-priced product. Other units (kg, જુડી,
// નંગ, પેકેટ…) are unchanged. Submitted items carry a qtyUnit field so the admin /
// customer / reports know how to read the quantity (legacy items have no qtyUnit).
function qtyUnitOf(u){
  u = String(u||'').trim();
  if(/^\d+\s*gm$/i.test(u)) return 'kg';
  if(/^\d+\s*ml$/i.test(u)) return 'Lt';
  return u || 'kg';
}

};
window.onRemaining = (name, val) => {   // Part B (B6): બાકી જથ્થો (unsold)
  const e = ENTRIES.get(name) || pristine(name);
  e.remaining = val;

window.onQtyForHaat = (name, haatCode, val) => {
  const e = ENTRIES.get(name) || pristine(name);
  if(!e.qtyByHaat) e.qtyByHaat = {};
  e.qtyByHaat[haatCode] = val;
  ENTRIES.set(name, e);
  refreshRow(name);
};
window.onPriceForHaat = (name, haatCode, val) => {   // per-haat price override (blank = base price)
  const e = ENTRIES.get(name) || pristine(name);
  if(!e.priceByHaat) e.priceByHaat = {};
  e.priceByHaat[haatCode] = val;
  ENTRIES.set(name, e);
  refreshRow(name);
};
const PERHAAT_ON = new Set();   // product names with per-haat pricing opted-in (survives row re-render)
window.togglePHP = (name, cb) => {   // opt-in per-haat pricing (checkbox per product)
  const on = !!cb.checked;
  if(on) PERHAAT_ON.add(name); else PERHAAT_ON.delete(name);
  const row = cb.closest('.item');
  if(row) row.classList.toggle('ph-on', on);
  const commonIn = row ? row.querySelector('.wrap-bhav input') : null;
  if(on){
    // show "—" in the common price box: per-haat prices apply, common price is not used
    if(commonIn){ commonIn.value = ''; commonIn.placeholder = '—'; }
  }
  if(!on){
    // turned off → drop any per-haat price overrides so the common price applies everywhere
    const e = ENTRIES.get(name);
    if(e){ e.priceByHaat = {}; ENTRIES.set(name, e); }
    if(row) row.querySelectorAll('input[data-price]').forEach(inp => { inp.value=''; });
    refreshRow(name);  // re-renders with correct value + placeholder restored
  }
};
function pristine(name){
  const p = PRODUCT_LIB.find(x=>x.n===name);
  return {price:"", qty:"", qtyByHaat:{}, priceByHaat:{}, unit:p?p.u:"kg", cat:p?p.c:"અન્ય", emoji:p?p.e:"🌿"};
}
function refreshRow(name){
  const safeId = 'it_'+btoa(unescape(encodeURIComponent(name))).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);
  const row = document.getElementById('row_'+safeId);
  const e = ENTRIES.get(name) || pristine(name);
  if(!row) return;
  const active = (+e.price)>0;
  row.classList.toggle('active', active);
  const wraps = row.querySelectorAll('.input-wrap');
  const isMulti = row.classList.contains('multi-haat');
  if(wraps[0]) wraps[0].classList.toggle('has-val', active);  // base price box (top)
  if(isMulti){
    // Each haat row now has a price-override + a qty input — target by data marker, not index.
    const qbh = e.qtyByHaat || {};
    const pbh = e.priceByHaat || {};
    let total = 0;
    row.querySelectorAll('input[data-qty]').forEach(inp => {
      const v = +(qbh[inp.dataset.code] || 0);
      if(v > 0) total += v;
      const w = inp.closest('.input-wrap'); if(w) w.classList.toggle('has-val', v > 0);
    });
    row.querySelectorAll('input[data-price]').forEach(inp => {
      const w = inp.closest('.input-wrap'); if(w) w.classList.toggle('has-val', (+(pbh[inp.dataset.code]||0))>0);
    });
    const tot = document.getElementById('tot_'+safeId);
    if(tot){
      const p = PRODUCT_LIB.find(x => x.n === name);
      const unit = qtyUnitOf(p ? p.u : (e.unit || 'kg'));
      tot.textContent = total ? total + ' ' + unit : '—';
    }
  } else {
    if(wraps[1]) wraps[1].classList.toggle('has-val', (+e.qty)>0);
  }
  const ct = activeCount();
  const a = document.getElementById('activeCt'); if(a) a.textContent = ct;
  const s = document.getElementById('submitCt'); if(s) s.textContent = ct + " વસ્તુ ભરી";
}

// Levenshtein distance — used to detect typos of canonical product names
function levenshtein(a, b){
  const m=a.length, n=b.length;
  if(!m) return n; if(!n) return m;
  const dp = Array.from({length:m+1}, ()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i;
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++){
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  }
  return dp[m][n];
}
window.saveCustom = async () => {
  let nm   = document.getElementById('cuNm').value.trim();
  let u    = document.getElementById('cuU').value;
  let c    = document.getElementById('cuC').value;
  if(!nm) return toast("નામ ભરો","err");
  // collide check
  if(PRODUCT_LIB.find(p=>p.n===nm) || ENTRIES.has(nm)) return toast("આ વસ્તુ યાદીમાં છે જ","err");
  // typo guard: if name is within 2 edits of a canonical product, suggest swapping
  const similar = PRODUCT_LIB.find(p => {
    const d = levenshtein(nm, p.n);
    return d > 0 && d <= 2;
  });
  if(similar){
    const useCanonical = await asyncConfirm(
      `'${nm}' '${similar.n}' જેવું લાગે છે — typo હોઈ શકે?\n\n` +
      `'${similar.n}' વાપરો = યાદીમાંથી પસંદ કરો\n` +
      `'${nm}' નવું ઉમેરો = custom item તરીકે જશે`,
      `'${similar.n}' વાપરો`,
      `'${nm}' નવું ઉમેરો`
    );
    if(useCanonical){
      // Swap to the canonical product — uses its category/unit/emoji
      nm = similar.n;
      u  = similar.u || u;
      c  = similar.c || c;
      if(ENTRIES.has(nm)){ closeCustomForm(); return toast(`'${nm}' પહેલેથી છે — ભાવ ભરો`,"ok"); }
      ENTRIES.set(nm, {price:"", qty:"", unit:u, cat:c, emoji:similar.e||CAT_EMOJI[c]||"🌿"});
      closeCustomForm();
      document.getElementById('itemsContainer').innerHTML = renderItems();
      toast(`'${nm}' (યાદીમાંથી) — ભાવ ભરો`,"ok");
      setTimeout(()=>{
        const safeId = 'it_'+btoa(unescape(encodeURIComponent(nm))).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);
        document.getElementById('row_'+safeId)?.scrollIntoView({behavior:'smooth', block:'center'});
      }, 100);
      return;
    }
    // else: fall through, save as custom with the typed name
  }
  ENTRIES.set(nm, {price:"", qty:"", unit:u, cat:c, emoji:CAT_EMOJI[c]||"🌿", custom:true});
  closeCustomForm();
  // re-render items container only (preserves scroll mostly)
  document.getElementById('itemsContainer').innerHTML = renderItems();
  toast("ઉમેરાઈ ગઈ — હવે ભાવ ભરો","ok");
  // scroll to it
  setTimeout(()=>{
    const safeId = 'it_'+btoa(unescape(encodeURIComponent(nm))).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);
    document.getElementById('row_'+safeId)?.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
};

/* ════════ SUBMIT ════════ */
window.submitAll = async () => {
  if(_submitting) return;            // V11: block double-tap / double-submit
  _submitting = true;
  try {
  // CRITICAL: force-read every visible input from the DOM before submit.
  // Without this, an unfocused input's last keystroke can be lost if the
  // user taps "મોકલો" before the input fires its 'input' event.
  document.querySelectorAll('.item').forEach(row => {
    const name = row.dataset?.name;
    if(!name) return;
    const inputs = row.querySelectorAll('input[type="number"]');
    inputs.forEach(inp => {
      // Dispatch a synthetic 'input' so any debounced/uncaptured value flushes
      inp.dispatchEvent(new Event('input', {bubbles:true}));
    });
  });

  const isMulti = OPEN_HAATS.length > 1;
  const idByName = {}; PRODUCT_LIB.forEach(p => { if(p.id) idByName[p.n] = p.id; });   // Part A: name -> master productId
  if(!Object.keys(idByName).length) return toast("વસ્તુ યાદી લોડ નથી — ઇન્ટરનેટ તપાસી ફરી ખોલો","err");
  const items = [];
  ENTRIES.forEach((e, name) => {
    if(!idByName[name]) return; // v2: catalogue-only — skip anything not in admin catalogue
    let price = +e.price;
    // Multi-haat: if base price blank but per-haat overrides exist, use the highest as the
    // backward-compat fallback price so the item isn't dropped.
    if(isMulti && !(price>0) && e.priceByHaat){
      const ovs = OPEN_HAATS.map(c => +(e.priceByHaat[c]||0)).filter(x => x>0);
      if(ovs.length) price = Math.max(...ovs);
    }
    if(!(price>0)) return;
    const it = {name, price, unit:e.unit||"kg", qtyUnit:qtyUnitOf(e.unit||"kg"), cat:e.cat||"અન્ય", available:true};   // V36: qtyUnit = the unit the entered quantity is in (kg/Lt for gm/ml-priced)
    it.productId = idByName[name];   // always set — guaranteed by check above
    if(isMulti && e.qtyByHaat){
      const qbh = {};
      const pbh = {};
      const pbhSrc = e.priceByHaat || {};
      let total = 0;
      OPEN_HAATS.forEach(code => {
        const v = +(e.qtyByHaat[code] || 0);
        // record the effective per-haat price for EVERY haat the farmer submits to,
        // even with 0 qty (so an approved price stays locked even before qty is filled).
        const ov = +(pbhSrc[code] || 0);
        pbh[code] = ov > 0 ? ov : price;   // override else base price
        if(v > 0){ qbh[code] = v; total += v; }
      });
      it.priceByHaat = pbh;
      if(Object.keys(qbh).length){
        it.qtyByHaat = qbh;
        it.qty = total;     // backwards-compat aggregate
      }
    } else if(e.qty != null && e.qty !== "" && +e.qty>0){
      it.qty = +e.qty;
    }
    if(e.remaining != null && e.remaining !== "" && !isNaN(+e.remaining)) it.qtyRemaining = +e.remaining;   // Part B (B6)
    if(e.emoji) it.emoji = e.emoji;
    if(e.custom) it.custom = true;
    items.push(it);
  });
  if(!items.length) return toast("ઓછામાં ઓછી 1 વસ્તુનો ભાવ ભરો","err");
  if(navigator.onLine === false) return toast("ઇન્ટરનેટ નથી — કનેક્શન તપાસી ફરી મોકલો","err");
  const noQty = items.filter(it => it.qty == null).length;
  if(noQty > 0) toast(noQty + " વસ્તુ માં જથ્થો ભર્યો નથી — વાંધો નહીં, મોકલાય છે", "");
  const btn = $('#btnSubmit'); btn.disabled = true; btn.textContent = "મોકલાય છે...";
  try{
    // Check if we're re-editing a previously approved submission (so admin sees a flag)
    const curSnap = await fbRef('weekly/'+WK+'/submissions/'+subFid()).get();
    const cur = curSnap.val() || {};
    const isQtyPhase = (cur.status === 'approved');   // Part B: price already approved+locked → quantity-only update
    if(isQtyPhase){
      // Part B: write ONLY quantity (+ qtyUpdatedAt). Price + status + approval fields untouched. No re-review.
      await Promise.race([
        fbRef('weekly/'+WK+'/submissions/'+subFid()).update({ items, qtyUpdatedAt: firebase.database.ServerValue.TIMESTAMP }),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")), 20000))
      ]);
      logAudit('qty-update', 'weekly/'+WK+'/submissions/'+subFid(), { items: items.length });
      showState("✅","જથ્થો અપડેટ થયો!",
        `તમારો જથ્થો અપડેટ થઈ ગયો છે. <b>${items.length} વસ્તુ</b>
         ${submissionSummaryHtml(items)}
         <div style="font-size:12.5px;color:#555;margin:6px 0">ભાવ મંજૂર થયેલો છે — એ બદલાયો નથી. 🔒</div>
         ${summaryShareBtn(items)}<br>
         <button class="btn-primary" onclick="loadSubmission()" style="max-width:200px;margin-top:8px">↻ ફરી જુઓ</button>`);
    } else {
      // Price phase (new / pending / sent-back): full submit → goes to review
      const submissionHaatNames = OPEN_HAATS.length
        ? OPEN_HAATS.map(c => HAATS_ALL[c]?.nameGu || HAATS_ALL[c]?.name || c).join(', ')
        : (FARMER.haat || "");
      const payload = {
        farmerId: subFid(),
        farmerName: FARMER.name||"",
        farmerPhone: String(FARMER.phone||"").replace(/[^0-9]/g,""),
        farmerVillage: FARMER.village||"",
        farmerDistrict: FARMER.district||"",
        farmerHaat: submissionHaatNames,
        farmerHaatCodes: OPEN_HAATS.slice(),
        weekNum: WK,
        items,
        status: 'pending',
        submittedAt: cur.submittedAt || firebase.database.ServerValue.TIMESTAMP,
        updatedAt:   firebase.database.ServerValue.TIMESTAMP,
      };
      await Promise.race([
        fbRef('weekly/'+WK+'/submissions/'+subFid()).set(payload),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")), 20000))
      ]);
      // Part A: remember this farmer's products (master ids) so they're starred at top in future weeks
      try{
        const ids = items.map(it => it.productId).filter(Boolean);
        const existing = Array.isArray(FARMER.myProductIds) ? FARMER.myProductIds : [];
        const merged = [...new Set([...existing, ...ids])];
        if(ids.length && merged.length !== existing.length){
          FARMER.myProductIds = merged;
          await fbRef('marketFarmers/'+(FARMER._key||subFid())+'/myProductIds').set(merged);
        }
      }catch(e){ /* non-fatal */ }
      logAudit('submit', 'weekly/'+WK+'/submissions/'+subFid(), { items: items.length });
      showState("✅","ધન્યવાદ!",
        `તમારી પેદાશ હાટ ${esc(weekRange())} માટે મોકલાઈ ગઈ છે. <b>${items.length} વસ્તુ</b>
         ${submissionSummaryHtml(items)}
         <div style="font-size:12.5px;color:#555;margin:6px 0">⏳ <b>સૃષ્ટિ ટીમની સમીક્ષા બાકી</b></div>
         ${summaryShareBtn(items)}<br>
         <button class="btn-primary" onclick="loadSubmission()" style="max-width:200px;margin-top:8px">↻ બદલવા જાઓ</button>`);
    }
  }catch(e){
    console.error(e);
    toast("મોકલવામાં ભૂલ. ફરી પ્રયત્ન કરો.","err");
    btn.disabled = false; btn.textContent = (CUR_STATUS==='approved'?'જથ્થો અપડેટ કરો':'મોકલો ✓');
  }
  } finally {
    _submitting = false;             // V11: always release the guard
  }
};

function formatAgo(ts){
  if(!ts) return "";
  const m = Math.round((Date.now()-ts)/60000);
  if(m<1)  return "હમણાં જ";
  if(m<60) return m+" મિનિટ પહેલા";
  const h = Math.round(m/60);
  if(h<24) return h+" કલાક પહેલા";
  return Math.round(h/24)+" દિવસ પહેલા";
}

function showState(icon, title, body){
  $('#wrap').innerHTML = `<div class="state">
    <div class="state-icon">${icon}</div>
    <div class="state-title">${title}</div>
    <div class="state-body">${body}</div>
  </div>`;
}

init().catch(e=>{ console.error(e); renderLogin(e.message||String(e)); });
</script>
