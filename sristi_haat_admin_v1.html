window.commitProductImport = async () => {
  if(!PRODUCT_IMPORT || !PRODUCT_IMPORT.toCreate.length) return;
  // only the ticked rows (read checkbox state before we close the modal)
  const checkedIdx = new Set([...document.querySelectorAll('.imp-chk:checked')].map(c => +c.dataset.idx));
  const toCreate = PRODUCT_IMPORT.toCreate.filter((_, i) => checkedIdx.has(i));
  if(!toCreate.length) return toast("એકપણ પ્રોડક્ટ select નથી","err");
  if(_busy) return; _busy = true;
  // append each new product to the end of its category
  const catNext = {};
  const orderFor = (cat) => {
    if(catNext[cat] == null){
      const same = Object.values(PRODUCTS_DB).filter(p => p.cat === cat);
      catNext[cat] = same.length ? Math.max(...same.map(p => +p.order||0)) + 1 : 0;
    }
    return catNext[cat]++;
  };
  const updates = {};
  const created = [];
  toCreate.forEach(r => {
    const data = {id:r.id, name:r.name, cat:r.cat, unit:r.unit, emoji:CAT_EMOJI_MAP[r.cat]||'🌿', photo:'', order:orderFor(r.cat), active:true, manual:true, addedAt:Date.now()};
    updates['products/'+r.id] = data;
    if(DELETED_PRODUCT_IDS.has(r.id)) updates['productsDeleted/'+r.id] = null;
    created.push(data);
  });
  try{
    await fbRef('').update(updates);
    created.forEach(d => { PRODUCTS_DB[d.id] = d; DELETED_PRODUCT_IDS.delete(d.id); PRODUCTS_OPEN_CATS.add(categoryKeyOf({cat:d.cat})); });
    logAudit('product-import', 'products', { count: created.length });
    closeModal();
    toast(`✓ ${created.length} પ્રોડક્ટ ઉમેરાયા`,"ok");
    PRODUCT_IMPORT = null;
    setTabBodyHtml();
  }catch(e){ console.error(e); toast("Import save નિષ્ફળ: "+(e.message||e),"err"); }
  finally{ _busy = false; }
};

// Sync the form inputs into DESIGN_DRAFT, then apply DESIGN_DRAFT to the preview.
window.updateDesignPreview = () => {
  const d = DESIGN_DRAFT; if(!d) return;
  const ov = +($('#dsOverlay')?.value ?? d.banner.overlay);
  const bl = +($('#dsBlur')?.value ?? d.banner.blur);
  const fit = $('#dsFit')?.value || d.banner.fit;
  d.banner.overlay = ov; d.banner.blur = bl; d.banner.fit = fit;
  d.text.title = $('#dsTitle')?.value ?? d.text.title;
  d.text.subtitle = $('#dsSub')?.value ?? d.text.subtitle;
  const ovv=$('#dsOverlayVal'); if(ovv) ovv.textContent = ov+'%';
  const blv=$('#dsBlurVal'); if(blv) blv.textContent = bl+'px';
  const img=$('#dpImg');
  if(img){ img.style.objectFit=fit; img.style.filter=`brightness(.65) blur(${bl}px)`; img.src=d.banner.url||''; img.style.display=d.banner.url?'block':'none'; }
  const ovl=$('#dpOverlay'); if(ovl) ovl.style.background=`linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(27,67,50,${(ov/100).toFixed(2)}) 100%)`;
  const t=$('#dpTitle'); if(t) t.textContent=d.text.title||SITE_DEFAULTS.title;
  const s=$('#dpSub'); if(s) s.textContent=d.text.subtitle||SITE_DEFAULTS.subtitle;
};

window.uploadSiteImg = async (field) => {
  if(!CLOUDINARY_CFG || !CLOUDINARY_CFG.cloudName) return toast("Cloudinary સેટ નથી","err");
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=async()=>{
    const f=inp.files[0]; if(!f) return;
    updateDesignPreview(); // capture current text/slider edits before re-render-free upload
    toast("☁️ Upload…","ok");
    try{
      const maxDim = field==='banner' ? 1280 : 256;
      const dataUrl = await resizePhoto(f, maxDim, 0.85);
      const blob = await (await fetch(dataUrl)).blob();
      const fd=new FormData();
      fd.append('file',blob, field+'.webp');
      fd.append('upload_preset',CLOUDINARY_CFG.uploadPreset);
      fd.append('folder','sristi/site');
      const r=await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CFG.cloudName+'/image/upload',{method:'POST',body:fd});
      const j=await r.json();
      if(j.secure_url){
        if(field==='banner') DESIGN_DRAFT.banner.url=j.secure_url;
        else DESIGN_DRAFT[field].url=j.secure_url;
        DESIGN_DRAFT_OVERRIDE = DESIGN_DRAFT;  // keep the upload through the re-render
        setTabBodyHtml();
        toast("✓ Uploaded — હવે 💾 સાચવો","ok");
      } else { toast("Upload નિષ્ફળ: "+(j.error?.message||'unknown'),"err"); }
    }catch(e){ console.error(e); toast("Upload error","err"); }
  };
  inp.click();
};

window.clearSiteImg = (field) => {
  if(!DESIGN_DRAFT) return;
  if(field==='banner') DESIGN_DRAFT.banner.url=''; else DESIGN_DRAFT[field].url='';

  setTabBodyHtml();

    banner:   { url:d.banner.url||'', overlay:+d.banner.overlay, blur:+d.banner.blur, fit:d.banner.fit||'cover' },
    logoLeft: { url:d.logoLeft.url||'' },
    logoRight:{ url:d.logoRight.url||'' },
    text:     { title:(d.text.title||'').trim(), subtitle:(d.text.subtitle||'').trim() },

let PARSED = null;
window.onJsonChange = () => {
  const ta = document.getElementById('jsonIn');
  const v = (ta?.value||"").trim();
  const status = document.getElementById('jsonStatus');
  const preview = document.getElementById('jsonPreview');
  const btn = document.getElementById('btnPublish');
  ta?.classList.remove('err');
  PARSED = null;
  if(!v){
    status.textContent = "JSON paste કરો — preview અહીં દેખાશે";
    if(preview) preview.innerHTML = '';
    btn.disabled = true; btn.style.background='#aaa'; btn.style.cursor='not-allowed';
    return;
  }
  let parsed; try{ parsed = JSON.parse(v); }
  catch(e){
    ta.classList.add('err');
    status.innerHTML = `<span style="color:var(--red)">⚠️ JSON valid નથી: ${esc(e.message)}</span>`;
    if(preview) preview.innerHTML = '';
    btn.disabled = true; btn.style.background='#aaa'; btn.style.cursor='not-allowed';
    return;
  }
  if(!parsed.submissions || typeof parsed.submissions!=='object'){
    status.innerHTML = `<span style="color:var(--red)">⚠️ JSON માં "submissions" object હોવો જોઈએ</span>`;
    btn.disabled = true; btn.style.background='#aaa'; btn.style.cursor='not-allowed';
    return;
  }
  // Validate each
  const subKeys = Object.keys(parsed.submissions);
  let validCount=0, itemTotal=0, missing=[], badItems=[];
  subKeys.forEach(fid=>{
    const sub = parsed.submissions[fid];
    if(!sub || !Array.isArray(sub.items)) return;
    const f = FARMERS.find(x=>x.id===fid);
    if(!f){ missing.push(fid); return; }
    validCount++;
    sub.items.forEach((it,idx)=>{
      if(!it || !it.name || it.price==null) badItems.push(`${f.name}: item ${idx+1}`);
      itemTotal++;
    });
  });
  PARSED = parsed;
  status.innerHTML = `✓ <b style="color:var(--green2)">${validCount}</b> ખેડૂત • <b>${itemTotal}</b> વસ્તુ ready
    ${missing.length?` • <span style="color:var(--orange)">⚠️ ${missing.length} unknown farmerId</span>`:''}
    ${badItems.length?` • <span style="color:var(--red)">⚠️ ${badItems.length} items માં ભૂલ</span>`:''}`;
  preview.innerHTML = renderJsonPreview(parsed);
  btn.disabled = false; btn.style.background='var(--green2)'; btn.style.cursor='pointer';
};

function renderJsonPreview(parsed){
  const list = Object.keys(parsed.submissions).map(fid=>{
    const f = FARMERS.find(x=>x.id===fid);
    const sub = parsed.submissions[fid];
    return {fid, name:f?.name||sub.farmerName||fid, items:sub.items||[], known:!!f};
  });
  if(!list.length) return '<div class="preview-empty">કોઈ submission નથી</div>';
  return `<div class="preview-list">${list.map(b=>`
    <div class="preview-farmer">
      <div class="preview-fnm">${esc(b.name)} <small>${esc(b.fid)}${b.known?'':' ⚠️ unknown'}</small></div>
      ${b.items.length?`
        <div class="preview-items">
          ${b.items.map(it=>`<div class="pi-row"><div class="nm">${esc(it.name||'?')} <span style="color:var(--muted);font-size:11px">${esc(it.cat||'')}</span></div><div class="pr">₹${esc(it.price)} <span style="color:var(--muted);font-weight:400">/${esc(it.unit||'')}</span></div></div>`).join('')}
        </div>
      `:'<div class="preview-empty">(કોઈ item parse નથી થઈ)</div>'}
    </div>
  `).join('')}</div>`;
}

window.doPublish = async () => {
  if(!PARSED || !PARSED.submissions) return toast("પહેલા valid JSON paste કરો","err");
  // V11: warn before overwriting farmers who already have a submission this week (approved/pending included)
  const overwrites = Object.keys(PARSED.submissions).filter(fid => SUBS[fid] && (SUBS[fid].items || SUBS[fid].status));
  if(overwrites.length && !(await asyncConfirm(
    `${overwrites.length} ખેડૂત ની હાલની submission overwrite થશે (approved/pending સહિત). આગળ વધવું?`,
    'હા, publish કરો', 'રદ'))) return;
  if(_busy) return; _busy = true;
  const btn = document.getElementById('btnPublish');
  btn.disabled = true; btn.textContent = "Publishing...";
  let wrote=0, errs=0;
  const updates = {};
  Object.keys(PARSED.submissions).forEach(fid=>{
    const sub = PARSED.submissions[fid];
    if(!sub || !Array.isArray(sub.items)) return;
    const norm = sub.items.map(it=>{
      const o = {
        name: String(it.name||"").trim(),
        price: +it.price||0,
        unit: String(it.unit||"kg").trim(),
        cat: String(it.cat||"અન્ય").trim(),
        available: true,
      };
      // V11: preserve quantity data if the parsed item carries it (was being dropped)
      if(it.qty != null && it.qty !== "" && +it.qty > 0) o.qty = +it.qty;
      if(it.qtyByHaat && typeof it.qtyByHaat === 'object') o.qtyByHaat = it.qtyByHaat;
      return o;
    }).filter(it=>it.name && it.price>0);
    updates['weekly/'+WK+'/submissions/'+fid+'/items'] = norm;
    updates['weekly/'+WK+'/submissions/'+fid+'/parsedAt'] = firebase.database.ServerValue.TIMESTAMP;
    updates['weekly/'+WK+'/submissions/'+fid+'/status'] = 'approved';
    updates['weekly/'+WK+'/submissions/'+fid+'/approvedAt'] = firebase.database.ServerValue.TIMESTAMP;
    updates['weekly/'+WK+'/submissions/'+fid+'/qtyUpdatedAt'] = null;   // Part B
    wrote++;
  });
  try{
    await fbRef('').update(updates);
    toast(`✓ ${wrote} ખેડૂત publish થયા — catalog લાઈવ!`, "ok");
    await loadAll();
  }catch(e){
    console.error(e); toast("Publish નિષ્ફળ: "+(e.message||e),"err");
    btn.disabled=false; btn.textContent="🚀 પ્રકાશિત કરો"; btn.style.background='var(--green2)';
  }
  finally{ _busy = false; }
};

};

window.addManualFarmer = async () => {
  const nm = ($('#afNm')?.value||'').trim();
  const ph = ($('#afPh')?.value||'').replace(/[^0-9]/g,'');
  const vl = ($('#afVl')?.value||'').trim();
  const dc = ($('#afDC')?.value||'').trim();
  const haatCodes = [...document.querySelectorAll('.af-haat-cb:checked')].map(cb=>cb.value);
  if(!nm) return toast("નામ ભરો","err");
  if(ph.length < 10) return toast("મોબાઈલ 10 અંકનો જોઈએ","err");
  if(!dc) return toast("જિલ્લો પસંદ કરો","err");
  const id = 'MF_'+ph;
  if(FARMERS.find(f=>f.id===id)) return toast("આ ID પહેલેથી છે","err");
  const phoneClash = FARMERS.find(f=>String(f.phone||'').replace(/[^0-9]/g,'').slice(-10) === ph.slice(-10));
  if(phoneClash) return toast("આ phone પહેલેથી છે: "+phoneClash.name,"err");

  try{
    // Atomic counter increment for the district
    const counterRef = fbRef('counters/farmerApp/'+dc);
    const tx = await counterRef.transaction(cur => (cur||0) + 1);
    if(!tx.committed){ toast("Counter ભૂલ — ફરી પ્રયત્ન કરો","err"); return; }
    const seq = tx.snapshot.val();
    const applicationNo = `A-GJ-${dc}-${String(seq).padStart(5,'0')}`;
    const district = DISTRICTS[dc];
    const haatNamesGu = haatCodes.map(c => HAATS[c]?.nameGu || c).join(', ');

    await fbRef('marketFarmers/'+id).set({
      id, name:nm, phone:ph, farm:'',
      village:vl,
      district: district?.nameGu || district?.name || '',  // legacy text — Gujarati name
      districtCode: dc,
      state:'Gujarat', stateCode:'GJ',
      haat: haatNamesGu,            // legacy text — comma-joined Gujarati names (for backward compat with summary tab)
      haatCodes: haatCodes,
      applicationNo,
      active:true, addedAt:Date.now(),
    });
    toast(`✓ "${nm}" ઉમેરાયા (${applicationNo})`,"ok");
    closeModal(); await loadAll();
  }catch(e){
    console.error(e);
    toast("ઉમેરવામાં ભૂલ","err");
  }
};

window.uploadAnnouncementImage = () => {
  if(!CLOUDINARY_CFG || !CLOUDINARY_CFG.cloudName){
    return toast("Cloudinary સેટ નથી — પહેલા Photo tab → સેટિંગ્સ માં configure કરો","err");
  }
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = async () => {
    const f = inp.files[0]; if(!f) return;
    toast("ઇમેજ અપલોડ થઈ રહી છે...");
    try{
      const dataUrl = await resizePhoto(f, 1200, 0.82);
      const fd = new FormData();
      fd.append('file', dataUrl);
      fd.append('upload_preset', CLOUDINARY_CFG.uploadPreset);
      fd.append('folder', 'sristi/announcements');
      const r = await fetch('https://api.cloudinary.com/v1_1/'+encodeURIComponent(CLOUDINARY_CFG.cloudName)+'/image/upload', {method:'POST', body:fd});
      if(!r.ok) throw new Error("Cloudinary "+r.status);
      const j = await r.json();
      const url = j.secure_url;
      const imgInp = document.getElementById('ancImg');
      const prev = document.getElementById('ancPreview');
      if(imgInp) imgInp.value = url;
      if(prev){ prev.src = url; prev.style.display=''; }
      toast("✓ અપલોડ થયું","ok");
    }catch(e){ console.error(e); toast("Upload નિષ્ફળ: "+(e.message||e),"err"); }
  };
  inp.click();
};

  try{
    if(code){
      await fbRef('haats/'+code).update({nameGu, name:nameGu, days, time});
      Object.assign(HAATS[code], {nameGu, name:nameGu, days, time});
      logAudit('haat-edit','haats/'+code,{name:nameGu});
    } else {
      const newCode = 'H-'+Date.now().toString(36).toUpperCase();
      const seqOrder = Object.values(HAATS).reduce((m,h)=>Math.max(m,+h.seqOrder||0),0)+1;

    setTabBodyHtml();

};

function formatDateLabel(iso){
  // "2026-06-14" -> "14 June 2026"
  if(!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return '';
  const [y, m, d] = iso.split('-').map(Number);
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${d} ${MONTHS[m-1]} ${y}`;
}

window.saveHaatWeeks = async () => {
  const updates = {};
  let n = 0;
  for (const h of Object.values(HAATS)) {
    const numEl = document.getElementById('wn_'+h.code);
    const dateEl = document.getElementById('wd_'+h.code);
    if (!numEl) continue;
    const num = parseInt(numEl.value, 10);
    const iso = (dateEl?.value || '').trim();
    if (Number.isFinite(num) && num >= 1) {
      updates[`haats/${h.code}/weekNum`] = num;
      n++;
    }
    if (iso) {
      updates[`haats/${h.code}/weekDate`] = iso;
      updates[`haats/${h.code}/weekDateLabel`] = formatDateLabel(iso);
    }
  }
  try {
    await fbRef('').update(updates);
    toast(`✓ ${n} હાટ સચવાયા`, 'ok');
    closeModal();
    await loadAll();
  } catch (e) {
    console.error(e); toast('સાચવવામાં ભૂલ', 'err');
  }
};

function showState(icon,title,body){
  $('#wrap').innerHTML = `<div class="state"><div class="state-icon">${icon}</div><div class="state-title">${title}</div><div class="state-body">${body}</div></div>`;
}

init().catch(e=>{ console.error(e); renderLogin(e.message||String(e)); });
</script>
</body>
