<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>એડમિન — સૃષ્ટિ ખેડૂત હાટ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Hind+Vadodara:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1b4332; --green2:#2d6a4f; --green3:#52b788; --green-pale:#d8f3dc;
  --orange:#e36414; --orange-pale:#fff0e0; --red:#c1121f; --red-pale:#ffe0e0;
  --bg:#fffbf4; --card:#fff; --text:#1a1a1a; --muted:#6b7280; --border:#e8e0d0;
  --code:#1f2937; --code-bg:#111827;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* V14 (2026-06-23): Inter for English/Latin + Hind Vadodara for Gujarati — global override (replaces Noto/Fraunces/DM Sans/JetBrains Mono). Also: dashboard date sized to match the status text. */
*,*::before,*::after{font-family:"Inter","Hind Vadodara",sans-serif !important}
body{font-family:"Inter","Hind Vadodara",sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;min-height:100vh}
img.emoji{height:1em;width:1em;margin:0 .05em 0 .1em;vertical-align:-.15em;display:inline-block}
.wrap{max-width:1280px;margin:0 auto;padding-bottom:60px}

/* LOGIN */
.login{padding:40px 22px;max-width:380px;margin:0 auto}
.login-hero{text-align:center;padding:30px 10px 24px}
.login-title{font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:26px;font-weight:900;color:var(--green);line-height:1.1;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted)}
.login-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px 20px;box-shadow:0 6px 24px rgba(27,67,50,.08)}
.frm{display:flex;flex-direction:column;gap:12px}
.frm-label{font-size:12px;font-weight:600;color:var(--muted)}
.frm-in{border:1.5px solid var(--border);border-radius:9px;padding:12px 13px;font-size:15px;font-family:inherit;outline:none;background:#fff;width:100%}
.frm-in:focus{border-color:var(--green2)}
.btn-primary{background:var(--green2);color:#fff;border:none;border-radius:9px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.btn-primary:hover{background:var(--green)}
.btn-primary:disabled{background:#aaa;cursor:not-allowed}
.btn-primary:active:not(:disabled){transform:scale(.99)}
.login-err{background:var(--red-pale);color:var(--red);border-radius:7px;padding:10px 12px;font-size:13px;text-align:center;margin-top:8px;font-weight:500}

/* TOP BAR */
.topbar{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.topbar-l{display:flex;align-items:center;gap:10px}
.topbar-emoji{font-size:24px}
.topbar-title{font-family:"Fraunces","Noto Sans Gujarati",serif;font-size:18px;font-weight:900}
.topbar-sub{font-size:11px;opacity:.7;letter-spacing:1px;text-transform:uppercase}
.topbar-r{display:flex;align-items:center;gap:8px}
.topbar-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.topbar-btn:hover{background:rgba(255,255,255,.25)}

/* WEEK BAR */
.week-bar{background:#fff;padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.week-bar-info{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.week-num{font-family:"Fraunces",serif;font-size:24px;font-weight:900;color:var(--green)}
.week-date{font-size:13px;color:var(--muted)}
.week-stat{font-size:12.5px;color:var(--text);font-weight:600}
.week-stat b{color:var(--green2);font-weight:700;font-size:14.5px}
.week-bar-actions{display:flex;gap:6px}
.btn-sm{padding:7px 12px;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;font-family:inherit;border:1.5px solid var(--border);background:#fff;color:var(--text)}
.btn-sm:hover{background:var(--bg)}
.btn-sm.primary{background:var(--green2);color:#fff;border-color:var(--green2)}
.btn-sm.primary:hover{background:var(--green)}
.btn-sm.warn{background:var(--orange);color:#fff;border-color:var(--orange)}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none;align-items:stretch;padding:0 4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:16px 20px;text-align:center;font-size:15px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;transition:color .15s ease, background .15s ease}
.tab:hover{background:#faf6ec;color:var(--green)}
.tab.active{color:var(--green2);border-bottom-color:var(--green2);font-weight:700}
.tab .badge{background:var(--red);color:#fff;border-radius:11px;padding:2px 9px;font-size:11.5px;margin-left:6px;font-weight:700}
.tab.active .badge{background:var(--green2)}
.tab-more-wrap{position:relative}
.tab-more-menu{position:absolute;top:100%;right:6px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.12);min-width:200px;z-index:200;overflow:hidden;display:none}
.tab-more-wrap.open .tab-more-menu{display:block}
.tab-more-menu button{display:block;width:100%;text-align:left;background:none;border:none;font-family:inherit;font-size:15px;font-weight:600;padding:13px 16px;cursor:pointer;color:var(--text);transition:background .12s}
.tab-more-menu button:hover{background:var(--bg);color:var(--green2)}
.tab-more-menu button.active{background:var(--green-pale);color:var(--green2);font-weight:700}
.tab-loading{position:fixed;top:0;left:0;right:0;height:3px;background:var(--green2);z-index:500;transform:scaleX(0);transform-origin:left center;transition:transform .3s ease}
.tab-loading.active{transform:scaleX(1);animation:tabLoadPulse 1s ease-in-out infinite}
@keyframes tabLoadPulse{50%{opacity:.55}}
.tab-fade{animation:tabFadeIn .18s ease}
@keyframes tabFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.order-ghost{opacity:.4;background:var(--green-pale)!important;border:1px dashed var(--green2)!important}
.order-item{transition:background .12s ease}
.order-item:hover{background:var(--bg)!important}

/* CONTENT */
.body{padding:20px 22px 44px;font-size:16px}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
.card h3{font-family:"Fraunces",serif;font-size:18.5px;font-weight:700;color:var(--green);margin-bottom:8px}
.card-sub{font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.6}
.card-sub code{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-family:"JetBrains Mono",monospace;font-size:13px}

/* DASHBOARD GRID */
.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.dash-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px}
.dash-card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.dash-card-val{font-family:"Fraunces",serif;font-size:30px;font-weight:900;color:var(--green);line-height:1}
.dash-card-val.warn{color:var(--orange)}
.dash-card-val.ok{color:var(--green2)}
.dash-card-sub{font-size:11.5px;color:var(--muted);margin-top:4px}

/* FARMER ROWS */
.frm-search{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;font-family:inherit;outline:none;width:100%;margin-bottom:10px}
.frm-search:focus{border-color:var(--green2)}
.farmer-row{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:6px;display:flex;align-items:center;gap:12px;font-size:15px}
.farmer-row .num{font-size:12.5px;color:var(--muted);font-weight:600;width:34px;flex-shrink:0;font-family:"JetBrains Mono",monospace}
.farmer-row .nm{flex:1;min-width:0}
.farmer-row .nm b{font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px}
.farmer-row .nm small{font-size:12.5px;color:var(--muted)}
.farmer-row .badge-yes{background:var(--green-pale);color:var(--green2);font-size:12.5px;padding:4px 11px;border-radius:14px;font-weight:700;white-space:nowrap}
.farmer-row .badge-no{background:#fef0f0;color:var(--red);font-size:12.5px;padding:4px 11px;border-radius:14px;font-weight:600;white-space:nowrap}
.farmer-row .badge-parsed{background:#dbeafe;color:#1e40af;font-size:12.5px;padding:4px 11px;border-radius:14px;font-weight:600;white-space:nowrap}
.farmer-row .preview-btn{font-size:13px;color:var(--green2);background:none;border:1px solid var(--border);border-radius:7px;padding:5px 11px;cursor:pointer;font-family:inherit;font-weight:600}

/* TEXT BLOCKS */
.code-box{background:var(--code-bg);color:#e5e7eb;border-radius:10px;padding:14px;font-family:"JetBrains Mono","Noto Sans Gujarati",monospace;font-size:12px;line-height:1.6;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-word}
.code-box.gj{font-family:"Noto Sans Gujarati","JetBrains Mono",monospace}
.btn-copy{background:var(--green2);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-sm{background:#fff;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s, border-color .12s}
.btn-sm:hover{background:var(--bg);border-color:var(--green3)}
.btn-sm.primary{background:var(--green2);color:#fff;border-color:var(--green2)}
.btn-sm.primary:hover{background:var(--green)}
.btn-sm.warn{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-copy:hover{background:var(--green)}
.btn-copy:active{transform:scale(.98)}

.step{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
.step-num{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--green2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:"Fraunces",serif}
.step-body{flex:1;min-width:0}
.step-title{font-size:14.5px;font-weight:700;margin-bottom:4px;color:var(--text)}
.step-desc{font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.55}
.step-desc a{color:var(--green2);font-weight:600;text-decoration:none}
.step-desc a:hover{text-decoration:underline}

/* TEXTAREA INPUT */
.json-ta{width:100%;min-height:240px;border:1.5px solid var(--border);border-radius:10px;padding:13px 15px;font-size:13px;font-family:"JetBrains Mono",monospace;outline:none;line-height:1.55;background:#fff;resize:vertical}
.json-ta:focus{border-color:var(--green2)}
.json-ta.err{border-color:var(--red);background:#fff7f7}

/* PREVIEW */
.preview-list{margin-top:14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;max-height:380px;overflow-y:auto}
.preview-farmer{margin-bottom:11px;padding-bottom:11px;border-bottom:1px dashed var(--border)}
.preview-farmer:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.preview-fnm{font-weight:700;font-size:13.5px;color:var(--green);margin-bottom:5px}
.preview-fnm small{font-weight:400;color:var(--muted);font-size:11.5px;margin-left:4px}
.preview-items{display:grid;grid-template-columns:1fr 1fr;gap:3px 14px;font-size:12.5px}
.preview-items .pi-row{display:flex;justify-content:space-between;gap:8px}
.preview-items .pi-row .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-items .pi-row .pr{font-weight:700;color:var(--orange);white-space:nowrap}
.preview-empty{color:var(--muted);font-size:12px;font-style:italic;margin-top:3px}

/* STATES & TOAST */
.state{padding:50px 20px;text-align:center;color:var(--muted)}
.state-icon{font-size:48px;margin-bottom:12px}
.state-title{font-size:16px;color:var(--text);font-weight:700;margin-bottom:6px}
.state-body{font-size:13px;line-height:1.6}
.toast-wrap{position:fixed;top:16px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:200;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:10px 18px;border-radius:24px;font-size:13.5px;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:80%;text-align:center;animation:toastIn .25s ease-out}
.toast.ok{background:var(--green2)}.toast.err{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
/* a11y: respect motion preferences (vestibular safety) */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
}
/* a11y: visible keyboard focus ring */
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[role="button"]:focus-visible{outline:2px solid var(--green2);outline-offset:2px;border-radius:6px}

.alert{background:var(--orange-pale);border-left:4px solid var(--orange);padding:11px 14px;border-radius:6px;font-size:12.5px;color:#7a3010;margin-bottom:14px;line-height:1.55}
.alert b{font-weight:700}
.notice{background:#eef6ff;border-left:4px solid #2563eb;padding:11px 14px;border-radius:6px;font-size:12.5px;color:#1e3a8a;margin-bottom:14px;line-height:1.55}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;width:100%;max-width:680px;border-radius:14px;overflow:hidden;max-height:88vh;display:flex;flex-direction:column}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:"Fraunces",serif;font-size:18px;font-weight:700;color:var(--green)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);width:34px;height:34px;border-radius:50%;font-family:inherit}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1}
</style>
</head>

</noscript>
<div class="wrap" id="wrap"></div>
<div class="toast-wrap" id="toasts" aria-live="polite" aria-atomic="false"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════════
   સૃષ્ટિ ખેડૂત હાટ — Office admin v1
   File: sristi_haat_admin_v1.html (2026-06-11)

   What office staff does here, weekly:
     1. Open the page Saturday evening, log in (PIN)
     2. See dashboard: who submitted / who didn't
     3. Click "📋 બધી messages Copy" → all raw farmer texts on clipboard
     4. Open claude.ai (or Claude Code) and paste the prompt block + messages
     5. Copy Claude's JSON response
     6. Paste into "Parsed JSON" textarea here → Preview
     7. Click "પ્રકાશિત કરો" → catalog goes live for Sunday

   Optional extras (here): week settings, new-week button, farmer
   password reset, individual-farmer message preview.

   Auth: simple shared PIN (default: 2026, change ADMIN_PIN below).
   ══════════════════════════════════════════════════════════════════ */

const FB_CONFIG = {
  apiKey:"AIzaSyCd0jU_rtG3Us3E4au4rntN5N8tbciHWY0",
  authDomain:"prakrutik-kheti-c0a89.firebaseapp.com",
  databaseURL:"https://prakrutik-kheti-c0a89-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"prakrutik-kheti-c0a89",
  storageBucket:"prakrutik-kheti-c0a89.firebasestorage.app",
  messagingSenderId:"269627097742",
  appId:"1:269627097742:web:2d82d97f0621db87133fdf",
};
const FB_NAMESPACE='prakrutik_kheti';
const AUTH_KEY  = "sristi_admin_auth_v3";   // multi-admin via admins/{username}
const AUTH_TTL_MS = 4 * 60 * 60 * 1000;     // 4 hours

function isAdminAuthed(){
  try{
    const raw = sessionStorage.getItem(AUTH_KEY);
    if(!raw) return false;
    const v = JSON.parse(raw);
    if(!v || typeof v.expires !== 'number' || !v.username) return false;
    if(v.expires < Date.now()){ sessionStorage.removeItem(AUTH_KEY); return false; }
    return true;
  }catch{ return false; }
}
function adminIdentity(){
  try{
    const raw = sessionStorage.getItem(AUTH_KEY);
    if(!raw) return null;
    const v = JSON.parse(raw);
    return v && v.username ? {username:v.username, name:v.name||v.username} : null;
  }catch{ return null; }
}

let FB={app:null,db:null};
function fbRef(p){return FB.db.ref(FB_NAMESPACE+(p?'/'+p:''));}

// ── Part C: append-only audit trail (auditLog/{YYYY-MM}/{pushId}) ──
function auditActor(){
  try{ const a=JSON.parse(sessionStorage.getItem(AUTH_KEY)||'{}'); return 'admin:'+(a.username||a.name||'?'); }catch(_){ return 'admin:?'; }
}
function logAudit(action, target, extra){
  try{
    const d=new Date(), ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    fbRef('auditLog/'+ym).push().set(Object.assign({
      ts: firebase.database.ServerValue.TIMESTAMP,
      actor: auditActor(), action, target,
      wk: (typeof WK!=='undefined'?WK:null)
    }, extra||{}));
  }catch(e){ console.warn('audit', e); }
}

const $=q=>document.querySelector(q);
const $$=q=>document.querySelectorAll(q);
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function twe(){ if(window.twemoji) setTimeout(()=>twemoji.parse(document.body,{folder:'svg',ext:'.svg'}),0); }

function toast(msg, kind=""){
  const w=$('#toasts');const t=document.createElement('div');
  t.className='toast '+(kind||"");t.textContent=msg;
  // a11y: announce errors assertively, success politely
  t.setAttribute('role', kind==='err' ? 'alert' : 'status');
  t.setAttribute('aria-live', kind==='err' ? 'assertive' : 'polite');
  w.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='.3s';},2400);
  setTimeout(()=>t.remove(),2900);
}

// Promise-based confirm that matches the app's design (vs jarring native confirm())
function asyncConfirm(msg, okLabel='OK', cancelLabel='Cancel', danger=false){
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');
    overlay.setAttribute('aria-labelledby', 'acTitle');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:18px';
    const okBg = danger ? '#c1121f' : 'var(--green2)';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:14px;max-width:380px;width:100%;padding:20px 20px 16px;box-shadow:0 12px 36px rgba(0,0,0,.25)">
        <div id="acTitle" style="font-size:14px;line-height:1.6;color:#1a1a1a;white-space:pre-line">${esc(msg)}</div>
        <div style="display:flex;gap:10px;margin-top:18px;justify-content:flex-end">
          <button class="btn-sm" data-act="cancel">${esc(cancelLabel)}</button>
          <button class="btn-sm" data-act="ok" autofocus style="background:${okBg};color:#fff;border-color:${okBg}">${esc(okLabel)}</button>
        </div>
      </div>
    `;
    const close = ok => { overlay.remove(); document.body.style.overflow=''; resolve(ok); };
    overlay.addEventListener('click', e => {
      const act = e.target?.dataset?.act;
      if(act) close(act === 'ok');
      else if(e.target === overlay) close(false);
    });
    document.addEventListener('keydown', function esc(e){
      if(e.key === 'Escape'){ document.removeEventListener('keydown', esc); close(false); }
    });

function photoKey(name){
  try{ return 'p_'+btoa(unescape(encodeURIComponent(String(name||'')))).replace(/[^a-zA-Z0-9]/g,'').slice(0,100); }
  catch(e){ return 'p_'+String(name||'').replace(/[^a-zA-Z0-9]/g,'').slice(0,100); }
}
function photoForName(name){
  if(!name) return '';
  const k = photoKey(name);
  // 1. Slicer route: name -> cellKey -> URL/dataURL
  const cellKey = PRODUCT_PHOTO_MAP[k];
  if(cellKey && PRODUCT_PHOTOS[cellKey]) return PRODUCT_PHOTOS[cellKey];
  // 2. Direct upload route
  return PRODUCT_PHOTOS[k] || '';
}
function photoForNameUrlOnly(name){
  // Same lookup but skip data URIs — used when we plan to persist to products/.photo
  const v = photoForName(name);
  return (v && !v.startsWith('data:')) ? v : '';
}
function cloudinaryThumb(url, w){
  if(!url) return '';
  if(url.indexOf('res.cloudinary.com') !== -1 && url.indexOf('/upload/') !== -1 && url.indexOf('/upload/w_') === -1){
    return url.replace('/upload/', '/upload/w_'+(w||200)+',q_auto,f_auto,c_fill/');
  }
  return url;
}

async function loadAllProductsAcrossWeeks(){
  // Replicates the customer catalog's consolidation: groups variants by productPhotoMap cellKey,
  // picks the CANONICAL (shortest) name per group → matches what demo customer view shows.
  ALL_PRODUCTS_MAP = new Map();
  try{
    const photoMapSnap = await fbRef('productPhotoMap').get();
    const photoMap = photoMapSnap.val() || {};

    const snap = await fbRef('weekly').get();
    const weeks = snap.val() || {};

    const aggMap = new Map(); // groupId -> {nameOptions:Set, emoji, cat, unit, count}
    Object.values(weeks).forEach(wkData => {
      if(!wkData || typeof wkData !== 'object' || !wkData.submissions) return;
      Object.values(wkData.submissions).forEach(sub => {
        if(!sub || sub.status === 'rejected') return;
        (sub.items||[]).forEach(it => {
          if(!it || !it.name) return;
          const trimmed = String(it.name).trim();
          const sk = photoKey(trimmed);
          const cellKey = photoMap[sk];
          const groupId = cellKey || `${trimmed}|${it.unit||''}`;
          const ex = aggMap.get(groupId) || {nameOptions:new Set(), emoji:it.emoji||'🌿', cat:it.cat||'', unit:it.unit||'kg', count:0};
          ex.nameOptions.add(trimmed);
          if(it.emoji) ex.emoji = it.emoji;
          if(it.cat) ex.cat = it.cat;
          if(it.unit) ex.unit = it.unit;
          ex.count++;
          aggMap.set(groupId, ex);
        });
      });
    });
    // For each group: canonical = shortest name
    aggMap.forEach(ex => {
      const canonical = [...ex.nameOptions].sort((a,b) => a.length - b.length || a.localeCompare(b,'gu'))[0];
      if(!ALL_PRODUCTS_MAP.has(canonical)){
        ALL_PRODUCTS_MAP.set(canonical, {emoji:ex.emoji, cat:ex.cat, unit:ex.unit, count:ex.count});
      }
    });
  }catch(e){ console.error('all-weeks aggregation failed', e); }
}

async function loadProductsDB(){
  await loadAllProductsAcrossWeeks();
  const [snap, delSnap] = await Promise.all([
    fbRef('products').get(),
    fbRef('productsDeleted').get(),
  ]);
  const masterDB = snap.val() || {};
  DELETED_PRODUCT_IDS = new Set(Object.keys(delSnap.val() || {}));

  // PART A (simplified — farmers SELECT-only, never add): `products` is the admin-curated
  // source of truth. No history rebuild, no auto-discovery, no overwrite → admin edits always
  // persist (this is what makes rename/edit stick). Exclude any tombstoned id defensively.
  // NOTE: loadAllProductsAcrossWeeks() above is kept only because other admin features use
  // ALL_PRODUCTS_MAP (~line 2248/2574); loadProductsDB itself no longer uses it.
  Object.keys(masterDB).forEach(id => { if(DELETED_PRODUCT_IDS.has(id)) delete masterDB[id]; });
  PRODUCTS_DB = masterDB;
}

window.setTab = t => {
  const loader = document.getElementById('tabLoading');
  if(loader) loader.classList.add('active');
  TAB = t;
  // Defer render one frame so the loading bar paints, then fade body in
  requestAnimationFrame(() => {
    const el = document.getElementById('tabBody');
    if(el){
      el.classList.remove('tab-fade'); // restart animation
      el.innerHTML = renderTab();
      // force reflow then re-add to retrigger
      void el.offsetWidth;
      el.classList.add('tab-fade');
      twe();
    } else {
      render();
    }
    // Update tab bar active states (re-render shell only if tab buttons need refresh)
    document.querySelectorAll('.tab').forEach(btn => {
      const onclick = btn.getAttribute('onclick') || '';
      const m = onclick.match(/setTab\('([^']+)'\)/);
      if(m){ btn.classList.toggle('active', m[1] === t); }
      else if(onclick.includes('toggleMoreMenu')){
        btn.classList.toggle('active', ['photos','order','guide'].includes(t));
      }
    });
    document.querySelectorAll('.tab-more-menu button').forEach(btn => {
      const onclick = btn.getAttribute('onclick') || '';
      const m = onclick.match(/setTab\('([^']+)'\)/);
      if(m) btn.classList.toggle('active', m[1] === t);
    });
    setTimeout(() => { if(loader) loader.classList.remove('active'); }, 220);
  });
};
window.toggleMoreMenu = (ev) => {

  document.getElementById('tabMoreWrap')?.classList.toggle('open');

const AUDIT_META = {
  'submit':        {ic:'📤', lbl:'ખેડૂતે મોકલ્યું',  c:'#1b6b3a', bg:'#d8f3dc'},

  'edit-approve':  {ic:'✏️', lbl:'Edit & approve',    c:'#0a6a3a', bg:'#d8f3dc'},
  'send-back':     {ic:'↩️', lbl:'Send back',         c:'#7a3010', bg:'#fff0e0'},

function auditSummary(e){
  const bits=[];
  if(e.renamedFrom) bits.push(esc(e.renamedFrom)+' → '+esc(e.product||''));
  else if(e.product) bits.push(esc(e.product)+(e.isNew?' (નવું)':''));
  if(e.farmer) bits.push(esc(e.farmer));
  if(e.count!=null) bits.push(e.count+' ખેડૂત');
  if(e.items!=null) bits.push(e.items+' વસ્તુ');
  if(e.note) bits.push('"'+esc(String(e.note).slice(0,40))+'"');
  if(e.reason) bits.push('"'+esc(String(e.reason).slice(0,40))+'"');
  return bits.join(' • ');
}

function collectMessages(){
  const blocks = [];
  let charCount = 0; let farmerCount = 0;
  Object.keys(SUBS).forEach(fid => {
    const s = SUBS[fid];
    if(!s || !s.rawText || !String(s.rawText).trim()) return;
    const f = FARMERS.find(x=>x.id===fid) || {name:s.farmerName||"?"};
    const block = `=== FARMER: ${fid} | ${f.name||""} ===\n${s.rawText.trim()}\n`;
    blocks.push(block);
    charCount += block.length;
    farmerCount++;
  });
  const text = blocks.join('\n');
  // expose for copy buttons
  window._collectText = text;
  window._parserPrompt = PARSER_PROMPT;
  return {text, charCount, farmerCount};
}

window.copyText = (text, msg) => {
  navigator.clipboard.writeText(text).then(()=>toast(msg||"Copy થઈ","ok"), ()=>toast("Copy નિષ્ફળ","err"));
};

/* ════════ TAB 2b: REVIEW (NEW — approval gate) ════════ */
// V13: multi-select haat filters (Review + Farmers tabs) — independent per tab
let REVIEW_HAATS = new Set();
let FARMER_HAATS = new Set();
function fidHaatCodes(fid){
  const sub = SUBS[fid];
  if(sub && Array.isArray(sub.farmerHaatCodes) && sub.farmerHaatCodes.length) return sub.farmerHaatCodes;
  const f = FARMERS.find(x=>x.id===fid);
  return (f && Array.isArray(f.haatCodes)) ? f.haatCodes : [];
}
function filterIdsByHaats(ids, selSet){
  if(!selSet.size) return ids;
  return ids.filter(fid => fidHaatCodes(fid).some(c => selSet.has(c)));
}
function haatCountsFromIds(ids){
  const m={}; ids.forEach(fid => fidHaatCodes(fid).forEach(c => { m[c]=(m[c]||0)+1; })); return m;
}
function haatFilterRow(selSet, toggleFn, counts){
  const haats = Object.values(HAATS).filter(h=>h && h.active!==false).sort((a,b)=>(a.seqOrder||999)-(b.seqOrder||999));
  let chips = `<button class="btn-sm ${selSet.size===0?'primary':''}" onclick="${toggleFn}('__all__')">બધા હાટ</button>`;
  chips += haats.map(h=>`<button class="btn-sm ${selSet.has(h.code)?'primary':''}" onclick="${toggleFn}('${esc(h.code)}')">${esc(h.nameGu||h.name||h.code)} <span style="opacity:.55;font-size:11px">(${counts[h.code]||0})</span></button>`).join('');
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px;align-items:center"><span style="font-size:11px;color:var(--muted);margin-right:2px">હાટ ગાળો:</span>${chips}</div>`;
}
window.toggleReviewHaat = (code) => {
  if(code==='__all__') REVIEW_HAATS.clear();
  else { REVIEW_HAATS.has(code)?REVIEW_HAATS.delete(code):REVIEW_HAATS.add(code); }
  setTabBodyHtml(); twe();
};
window.toggleFarmerHaat = (code) => {
  if(code==='__all__') FARMER_HAATS.clear();
  else { FARMER_HAATS.has(code)?FARMER_HAATS.delete(code):FARMER_HAATS.add(code); }
  setTabBodyHtml();
};
let REVIEW_FILTER = 'pending';
function renderReview(){
  const subKeys = Object.keys(SUBS);
  const pendingIds  = subKeys.filter(fid => SUBS[fid]?.status === 'pending');
  const approvedIds = subKeys.filter(fid => SUBS[fid]?.status === 'approved' || (SUBS[fid]?.items?.length && !SUBS[fid]?.status));
  const rejectedIds = subKeys.filter(fid => SUBS[fid]?.status === 'rejected');
  const submittedSet = new Set(subKeys);
  const notYetIds = FARMERS.map(f=>f.id).filter(id => !submittedSet.has(id));

  const tile = (key, emoji, label, count, bg, border, valColor, sub) => `
    <div class="dash-card ${REVIEW_FILTER===key?'rv-active':''}" style="background:${bg};border-left:3px solid ${border};cursor:pointer;transition:transform .1s, box-shadow .15s;${REVIEW_FILTER===key?'box-shadow:0 0 0 2px '+border+';transform:translateY(-1px)':''}" onclick="setReviewFilter('${key}')">
      <div class="dash-card-label">${emoji} ${label}</div>
      <div class="dash-card-val" style="color:${valColor}">${count}</div>
      <div class="dash-card-sub">${sub}</div>
    </div>
  `;

  // V13: per-haat counts for the active status; tiles keep FULL counts, list is haat-filtered
  const activeFull = REVIEW_FILTER==='approved'?approvedIds:REVIEW_FILTER==='rejected'?rejectedIds:REVIEW_FILTER==='notyet'?notYetIds:pendingIds;
  const hCounts = haatCountsFromIds(activeFull);

  return `
    <div class="dash">
      ${tile('pending','⏳','Pending', pendingIds.length, 'var(--orange-pale)', 'var(--orange)', 'var(--orange)', 'સમીક્ષા બાકી')}
      ${tile('approved','✓','Approved', approvedIds.length, 'var(--green-pale)', 'var(--green2)', 'var(--green2)', 'લાઈવ catalog માં')}
      ${tile('rejected','✗','Rejected', rejectedIds.length, 'var(--red-pale)', 'var(--red)', 'var(--red)', 'નકારેલા')}
      ${tile('notyet','⊘','Not yet', notYetIds.length, '#fff', 'var(--border)', 'var(--text)', 'હજી મોકલી નથી')}
    </div>

    ${haatFilterRow(REVIEW_HAATS, 'toggleReviewHaat', hCounts)}

    ${renderReviewListByFilter({
      pendingIds: filterIdsByHaats(pendingIds, REVIEW_HAATS),
      approvedIds: filterIdsByHaats(approvedIds, REVIEW_HAATS),
      rejectedIds: filterIdsByHaats(rejectedIds, REVIEW_HAATS),
      notYetIds: filterIdsByHaats(notYetIds, REVIEW_HAATS)
    })}
  `;
}

function renderReviewListByFilter({pendingIds, approvedIds, rejectedIds, notYetIds}){
  if(REVIEW_FILTER === 'pending'){
    if(pendingIds.length === 0){
      return `<div class="card" style="text-align:center;padding:30px 20px">
        <div style="font-size:48px;margin-bottom:8px">🎉</div>
        <h3>બધી submissions approved!</h3>
        <div class="card-sub" style="margin:0">સમીક્ષા માટે કંઈ બાકી નથી.</div>
      </div>`;
    }
    return `
      <div class="card" style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;padding:13px 18px">
        <div style="font-size:15px;color:var(--text)"><b style="color:var(--orange)">${pendingIds.length}</b> submission${pendingIds.length>1?'s':''} review માટે બાકી</div>
        <button class="btn-sm primary" onclick="approveAllPending()">✓ બધી ${pendingIds.length} approve કરો</button>
      </div>
      ${pendingIds.map(fid => renderReviewCard(fid)).join('')}
    `;
  }
  if(REVIEW_FILTER === 'approved'){
    if(approvedIds.length === 0) return emptyReviewState('બધી submissions');
    return reviewCompactList(approvedIds, 'Approved', 'var(--green2)');
  }
  if(REVIEW_FILTER === 'rejected'){
    if(rejectedIds.length === 0) return emptyReviewState('Rejected');
    return reviewCompactList(rejectedIds, 'Rejected', 'var(--red)');
  }
  if(REVIEW_FILTER === 'notyet'){
    if(notYetIds.length === 0) return `<div class="card" style="text-align:center;padding:30px 20px"><div style="font-size:48px;margin-bottom:8px">🎉</div><h3>બધાં મોકલી દીધી!</h3></div>`;
    return reviewNotYetList(notYetIds);
  }
  return '';
}

function emptyReviewState(label){
  return `<div class="card" style="text-align:center;padding:30px 20px"><div style="font-size:42px;margin-bottom:8px">📭</div><h3>કોઈ ${label} submissions નથી</h3></div>`;

    const hasRem = items.some(it => it.qtyRemaining != null && it.qtyRemaining !== '');   // Part B (B6)
    const totalRem = items.reduce((n, it) => n + (it.qtyRemaining != null ? (+it.qtyRemaining||0) : 0), 0);

    return `

function renderReviewCard(fid){
  const sub = SUBS[fid];
  const f = FARMERS.find(x => x.id === fid) || {};
  const initial = (sub.farmerName || f.name || '?').trim().charAt(0);
  const ago = formatAgo(sub.updatedAt || sub.submittedAt);
  const items = sub.items || [];
  const reEdited = !!sub._reEdited;
  const prevItems = sub.previousItems || [];
  let changedCount = 0;
  if(reEdited && prevItems.length){
    const prevByName = new Map(prevItems.map(it => [it.name, it.price]));
    items.forEach(it => { if(prevByName.get(it.name) !== it.price) changedCount++; });
  }

  // Haat chips — prefer haatCodes (new), fall back to legacy haat text
  const haatCodes = Array.isArray(sub.farmerHaatCodes) && sub.farmerHaatCodes.length
    ? sub.farmerHaatCodes
    : (Array.isArray(f.haatCodes) ? f.haatCodes : []);
  const haatChips = (() => {
    if(haatCodes.length){
      return haatCodes.map(c => {
        const name = HAATS[c]?.nameGu || HAATS[c]?.name || c;
        return `<span style="background:var(--green-pale);color:var(--green);font-size:12px;font-weight:600;padding:4px 10px;border-radius:14px;display:inline-flex;align-items:center;gap:4px">📍 ${esc(name)}</span>`;
      }).join(' ');
    }
    const haatStr = sub.farmerHaat || f.haat || '';
    return haatStr.split(/[,;|\/]/).map(s=>s.trim()).filter(Boolean).map(name =>
      `<span style="background:var(--green-pale);color:var(--green);font-size:12px;font-weight:600;padding:4px 10px;border-radius:14px;display:inline-flex;align-items:center;gap:4px">📍 ${esc(name)}</span>`
    ).join(' ');
  })();

  // For "vs last week" comparison — same farmer's last submission, indexed by item name
  const lastWkSub = PREV_SUBS[fid] || {};
  const lastWkItems = (lastWkSub.status === 'approved' || lastWkSub.status === 'pending')
    ? (lastWkSub.items || [])
    : [];
  const lastWkByName = new Map(lastWkItems.map(it => [it.name, {price: +it.price||0, qty: +it.qty||0}]));

  // Per-item rows with per-haat qty breakdown + vs-last-week deltas
  const itemRows = items.map(it => {
    const prev = reEdited && prevItems.find(p => p.name === it.name);
    const priceChanged = prev && prev.price !== it.price;
    const lw = lastWkByName.get(it.name);
    // Price delta
    let priceDelta = '';
    if(lw && lw.price > 0 && +it.price > 0){
      const diff = +it.price - lw.price;
      const pct = Math.round((diff / lw.price) * 100);
      if(diff === 0) priceDelta = `<span style="color:var(--muted);font-size:10.5px">= ₹${lw.price}</span>`;
      else if(Math.abs(pct) >= 30) priceDelta = `<span style="color:var(--red);font-weight:600;font-size:10.5px">${diff>0?'↑':'↓'} ${Math.abs(pct)}% (was ₹${lw.price})</span>`;
      else priceDelta = `<span style="color:var(--green2);font-size:10.5px">${diff>0?'↑':'↓'} ${Math.abs(pct)}%</span>`;
    } else if(lw && lw.price > 0){
      priceDelta = `<span style="color:var(--muted);font-size:10.5px">was ₹${lw.price}</span>`;
    } else if(!lw){
      priceDelta = `<span style="color:var(--green2);font-size:10.5px;font-weight:600">NEW</span>`;
    }
    // Qty anomaly flag
    let qtyFlag = '';
    if(it.qty && lw && lw.qty > 0){
      const ratio = +it.qty / lw.qty;
      if(ratio >= 5 || ratio <= 0.2) qtyFlag = ` <span title="last week: ${lw.qty}" style="color:var(--red);font-weight:700">⚠️</span>`;
    }

    // Quantity display: per-haat split if available, else single qty
    let qtyHtml = '';
    if(it.qtyByHaat && Object.keys(it.qtyByHaat).length){
      const breakdown = Object.entries(it.qtyByHaat)
        .filter(([_,v]) => +v > 0)
        .map(([code, q]) => {
          const name = HAATS[code]?.nameGu || HAATS[code]?.name || code;
          return `<span style="background:#fff;border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:11.5px;font-weight:600">${esc(name)}: <span style="color:var(--green2)">${esc(q)} ${esc(it.unit)}</span></span>`;
        }).join(' ');
      const total = Object.values(it.qtyByHaat).reduce((s,v) => s + (+v||0), 0);
      qtyHtml = `<div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap;align-items:center">${breakdown}<span style="font-size:11.5px;color:var(--muted);margin-left:4px">કુલ <b style="color:var(--text)">${total} ${esc(it.unit)}</b></span></div>`;
    } else if(it.qty){
      qtyHtml = `<div style="font-size:12px;color:var(--green2);font-weight:600;margin-top:2px">${esc(it.qty)} ${esc(it.unit)}</div>`;
    } else {
      qtyHtml = `<div style="font-size:11px;color:var(--orange);font-style:italic;margin-top:2px">જથ્થો નથી ભર્યો</div>`;
    }

    return `
      <div style="display:flex;align-items:center;gap:11px;padding:9px 14px;border-bottom:1px solid var(--border)">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;line-height:1.3">${esc(it.emoji||'🌿')} ${esc(it.name)}${qtyFlag} <span style="color:var(--muted);font-size:11px;font-weight:400">${esc(it.cat||'')}</span></div>
          ${qtyHtml}
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${(() => {
            const pbh = it.priceByHaat;
            const distinct = pbh ? [...new Set(Object.values(pbh).map(x=>+x||0).filter(x=>x>0))] : [];
            if(pbh && distinct.length > 1){
              // Per-haat prices differ — show each so admin sees before approving.
              return `<div style="display:flex;flex-direction:column;gap:1px;align-items:flex-end">
                ${Object.entries(pbh).filter(([,v])=>+v>0).map(([code,v]) => {
                  const name = HAATS[code]?.nameGu || HAATS[code]?.name || code;
                  return `<div style="font-size:11.5px;white-space:nowrap"><span style="color:var(--muted)">${esc(name)}:</span> <b style="color:var(--orange)">₹${esc(v)}</b></div>`;
                }).join('')}
                <div style="font-size:10px;color:var(--muted)">/${esc(it.unit)}</div>
              </div>`;
            }
            return `<div style="font-size:15.5px;font-weight:800;color:var(--orange);line-height:1">₹${esc(it.price)}</div>
              <div style="font-size:10.5px;color:var(--muted);margin-top:2px">/${esc(it.unit)}</div>
              ${priceChanged?`<div style="font-size:10px;color:var(--muted);margin-top:2px"><s>₹${esc(prev.price)}</s></div>`:''}
              ${priceDelta?`<div style="margin-top:3px">${priceDelta}</div>`:''}`;
          })()}
        </div>
      </div>
    `;
  }).join('');

  // Per-haat totals (sum of qtyByHaat across items)
  const haatTotals = {};
  items.forEach(it => {
    if(it.qtyByHaat){
      Object.entries(it.qtyByHaat).forEach(([code, q]) => {
        if(+q > 0) haatTotals[code] = (haatTotals[code]||0) + (+q);
      });
    }
  });
  const haatTotalsHtml = Object.keys(haatTotals).length
    ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;padding-top:8px;border-top:1px solid var(--border)">
        ${Object.entries(haatTotals).map(([code, qty]) => {
          const name = HAATS[code]?.nameGu || HAATS[code]?.name || code;
          return `<span style="background:var(--green-pale);color:var(--green);font-size:12px;padding:4px 10px;border-radius:8px;font-weight:600">📍 ${esc(name)}: ${qty} kg</span>`;
        }).join('')}
      </div>` : '';

  return `
    <div class="card" style="margin-bottom:12px;padding:0;overflow:hidden" data-fid="${esc(fid)}">
      <div style="padding:14px 16px;background:linear-gradient(180deg,var(--orange-pale),#fff)">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="width:42px;height:42px;border-radius:50%;background:#fff;color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0;border:2px solid var(--orange-pale)">${esc(initial)}</div>
          <div style="min-width:0;flex:1">
            <div style="font-size:16px;font-weight:700;line-height:1.2">
              ${esc(sub.farmerName || f.name || fid)}
              ${reEdited ? '<span style="font-size:10px;color:var(--red);font-weight:600;background:#fff;border:1px solid var(--red);padding:2px 8px;border-radius:8px;margin-left:6px">⚠ Re-edited</span>' : ''}
            </div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">📞 ${esc(sub.farmerPhone||f.phone||'')} • ⏱ ${esc(ago)}${reEdited?' • પહેલા approved હતું':''}</div>
            <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px">${haatChips}</div>
          </div>
          <span style="background:var(--orange);color:#fff;font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:14px;flex-shrink:0;align-self:flex-start">⏳ PENDING</span>
        </div>
      </div>

      <div style="padding:0 16px">${itemRows}</div>

      <div style="padding:12px 16px;background:var(--bg);border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <div style="font-size:13px;color:var(--text)">
            <b>${items.length}</b> વસ્તુ${reEdited && changedCount?` <span style="color:var(--red);font-size:11.5px">(${changedCount} ભાવ બદલાયા)</span>`:''}
          </div>
          ${haatTotalsHtml}
        </div>
      </div>

      ${sub.noteToFarmer ? `
        <div style="background:#fff8d6;border-top:1px solid #f7c800;padding:10px 16px;font-size:12.5px;color:#5a4400;display:flex;align-items:center;gap:10px">
          <span style="font-size:16px">📝</span>
          <span style="flex:1"><b>Note to farmer:</b> ${esc(sub.noteToFarmer)}</span>
          <button onclick="clearNote('${esc(fid)}')" style="background:none;border:none;color:#7a3010;cursor:pointer;font-size:16px;padding:2px 7px;font-family:inherit" title="Remove">✕</button>
        </div>
      ` : ''}

      <div style="display:flex;gap:8px;padding:11px 16px;border-top:1px solid var(--border);flex-wrap:wrap;justify-content:flex-end">
        <button class="btn-sm" onclick="openNote('${esc(fid)}')">📝 ${sub.noteToFarmer?'Edit note':'Note'}</button>
        <button class="btn-sm" onclick="editSubmission('${esc(fid)}')">✏️ Edit</button>
        <button class="btn-sm" style="background:#fdeaea;color:#b91c1c;border-color:#f0b4b4" onclick="deleteSubmission('${esc(fid)}')" title="આ entry કાયમ delete કરો">🗑️ Delete</button>
        <button class="btn-sm" style="background:var(--red-pale);color:var(--red);border-color:#f5c4c4" onclick="rejectSubmission('${esc(fid)}')">✗ Reject</button>
        <button class="btn-sm primary" onclick="approveSubmission('${esc(fid)}')">✓ Approve</button>
      </div>
    </div>
  `;
}

function setTabBodyHtml(){ const el = document.getElementById('tabBody'); if(el) el.innerHTML = renderTab(); }
// V12: live Mon→Sun date range of the current week, formatted DD-MM-YYYY to DD-MM-YYYY
function weekRange(d){
  d = d || new Date();
  const day = (d.getDay()+6)%7;            // 0=Mon … 6=Sun
  const mon = new Date(d); mon.setDate(d.getDate()-day);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const f = x => String(x.getDate()).padStart(2,'0')+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+x.getFullYear();
  return f(mon)+' to '+f(sun);
}
function formatAgo(ts){
  if(!ts) return "";
  const m = Math.round((Date.now()-ts)/60000);
  if(m<1)  return "હમણાં જ";
  if(m<60) return m+" મિનિટ પહેલા";
  const h = Math.round(m/60);
  if(h<24) return h+" કલાક પહેલા";
  return Math.round(h/24)+" દિવસ પહેલા";
}

window.approveSubmission = async (fid) => {
  if(_busy) return; _busy = true;
  try{
    await fbRef('weekly/'+WK+'/submissions/'+fid).update({
      status: 'approved',
      approvedAt: firebase.database.ServerValue.TIMESTAMP,
      qtyUpdatedAt: null,   // Part B: reset qty-update marker on (re)approval
      _reEdited: null,
      previousItems: null,
      previousApprovedAt: null,
    });
    if(SUBS[fid]){
      SUBS[fid].status = 'approved';
      delete SUBS[fid]._reEdited;
      delete SUBS[fid].previousItems;
      delete SUBS[fid].qtyUpdatedAt;
    }
    logAudit('approve', 'submissions/'+fid, { farmer: (SUBS[fid]&&SUBS[fid].farmerName)||fid });
    toast("✓ Approved — catalog માં લાઈવ","ok");
    render();
  }catch(e){ console.error(e); toast("Approve નિષ્ફળ: "+(e.message||e),"err"); }
  finally{ _busy = false; }
};

window.approveAllPending = async () => {
  let pending = Object.keys(SUBS).filter(fid => SUBS[fid]?.status === 'pending');
  if(REVIEW_HAATS.size) pending = pending.filter(fid => fidHaatCodes(fid).some(c=>REVIEW_HAATS.has(c)));  // V13: respect active haat filter
  if(!pending.length) return toast("કંઈ pending નથી","err");

  if(_busy) return; _busy = true;
  const updates = {};
  pending.forEach(fid => {
    updates[`weekly/${WK}/submissions/${fid}/status`] = 'approved';
    updates[`weekly/${WK}/submissions/${fid}/approvedAt`] = firebase.database.ServerValue.TIMESTAMP;
    updates[`weekly/${WK}/submissions/${fid}/qtyUpdatedAt`] = null;   // Part B
    updates[`weekly/${WK}/submissions/${fid}/_reEdited`] = null;
    updates[`weekly/${WK}/submissions/${fid}/previousItems`] = null;
  });
  try{
    await fbRef('').update(updates);
    pending.forEach(fid => { SUBS[fid].status = 'approved'; });
    logAudit('approve-all', 'submissions', { count: pending.length });
    toast(`✓ ${pending.length} submissions approved`,"ok");
    render();
  }catch(e){ console.error(e); toast("Bulk approve નિષ્ફળ","err"); }
  finally{ _busy = false; }
};

      editedByAdmin: true,

const KG_UNITS = new Set(['kg','કિલો','કિ.ગ્રા.','કિગ્રા','કિ.ગ્રા']);

function aggregateByVenue(){
  // for each approved (or legacy) sub: build {venueName, code} pairs and apply qty (per-haat if available, else flat)
  const venueMap = {}; // venue name -> { farmers: Set, items: {...} }
  Object.keys(SUBS).forEach(fid => {
    const sub = SUBS[fid];
    if(sub.status === 'pending' || sub.status === 'rejected' || sub.status === 'sent_back') return;

    // Prefer new farmerHaatCodes (per-haat qty possible) — fall back to legacy farmerHaat string
    let venueList; // [{name, code|null}]
    if(Array.isArray(sub.farmerHaatCodes) && sub.farmerHaatCodes.length){
      venueList = sub.farmerHaatCodes.map(code => ({
        name: HAATS[code]?.nameGu || HAATS[code]?.name || code,
        code,
      }));
    } else {
      const haat = sub.farmerHaat || '';
      if(!haat) return;
      venueList = haat.split(/[,;|\/]/).map(s=>s.trim()).filter(Boolean).map(name => ({name, code:null}));
    }
    if(!venueList.length) return;

    (sub.items||[]).forEach(it => {
      if(!it || !it.name || it.available === false) return;
      // The farmer's TOTAL brought for this product (sum of per-haat qty, or the flat qty).
      // Used for grand totals so multi-haat quantities sum correctly (and flat qty counts once).
      const farmerTotal = it.qtyByHaat
        ? Object.values(it.qtyByHaat).reduce((s,v)=>s+(+v||0),0)
        : (+it.qty||0);
      venueList.forEach(({name:v, code}) => {
        if(!venueMap[v]) venueMap[v] = {farmers: new Set(), items: {}};
        venueMap[v].farmers.add(fid);
        const k = it.name+'|'+it.unit;
        if(!venueMap[v].items[k]) venueMap[v].items[k] = {name:it.name, unit:it.unit, cat:it.cat, totalQty:0, withQty:0, withoutQty:0, contributors:[]};
        const ent = venueMap[v].items[k];

        // Per-haat qty if farmer split it; else flat qty applies to every venue (legacy)
        let qty = 0;
        if(it.qtyByHaat && code && it.qtyByHaat[code] != null){
          qty = +it.qtyByHaat[code] || 0;
        } else if(it.qty != null){
          qty = +it.qty || 0;
        }
        if(qty > 0){ ent.totalQty += qty; ent.withQty++; }
        else { ent.withoutQty++; }
        // qtyRemaining is cumulative across the farmer's haats (one number) — carried on every
        // venue contributor; the pivot dedupes by farmer so it's counted once per product.
        ent.contributors.push({fid, name:sub.farmerName||fid, qty: qty || null, farmerTotal, price:it.price, remaining: (it.qtyRemaining != null ? +it.qtyRemaining : null)});
      });
    });
  });
  return venueMap;
}

function mergeAllVenues(venueMap){
  // produce a single synthetic venue with deduped farmers + items combined
  const out = {farmers: new Set(), items: {}};
  Object.values(venueMap).forEach(v => {
    v.farmers.forEach(f => out.farmers.add(f));
    Object.entries(v.items).forEach(([k, ent]) => {
      if(!out.items[k]) out.items[k] = {name:ent.name, unit:ent.unit, cat:ent.cat, totalQty:0, withQty:0, withoutQty:0, contributors:[], _seen:new Set()};
      const tgt = out.items[k];
      ent.contributors.forEach(c => {
        if(tgt._seen.has(c.fid)) return; // same farmer counted only once across venues
        tgt._seen.add(c.fid);
        const ft = c.farmerTotal != null ? +c.farmerTotal : (+c.qty||0);  // full per-farmer qty (sum of haats)
        if(ft > 0){ tgt.totalQty += ft; tgt.withQty++; }
        else { tgt.withoutQty++; }
        tgt.contributors.push(c);
      });
    });
  });
  Object.values(out.items).forEach(it => { delete it._seen; });
  return out;
}

function categoryKeyOf(it){
  const c = (it.cat||'').trim();
  for(const d of CATEGORY_DISPLAY){
    if(d.includes.includes(c)) return d.key;
  }
  return 'અન્ય';
}

function aggregateByCategory(venueData){
  const byCat = {};
  CATEGORY_DISPLAY.forEach(d => {
    byCat[d.key] = {key:d.key, label:d.label, emoji:d.emoji, products: new Map(), farmers: new Set(), kgTotal:0, otherUnits:{}};
  });
  Object.values(venueData.items).forEach(it => {
    const ck = categoryKeyOf(it);
    const slot = byCat[ck];
    if(!slot.products.has(it.name)){
      slot.products.set(it.name, {name:it.name, items:[], farmers: new Set(), kgTotal:0, otherUnits:{}});
    }
    const p = slot.products.get(it.name);
    p.items.push(it);
    it.contributors.forEach(c => { p.farmers.add(c.fid); slot.farmers.add(c.fid); });
    const u = (it.unit||'').trim();
    const isKg = KG_UNITS.has(u.toLowerCase()) || KG_UNITS.has(u);
    if(isKg){
      p.kgTotal += it.totalQty;
      slot.kgTotal += it.totalQty;
    } else if(it.totalQty > 0){
      p.otherUnits[u] = (p.otherUnits[u]||0) + it.totalQty;
      slot.otherUnits[u] = (slot.otherUnits[u]||0) + it.totalQty;
    }
  });
  return byCat;
}

function computeLogistics(venueData, byCat){
  const totalFarmers = venueData.farmers.size;
  const totalProducts = Object.values(byCat).reduce((n, c) => n + c.products.size, 0);
  const trackedCats = CATEGORY_DISPLAY.filter(d => d.key !== 'અન્ય');
  const presentCats = trackedCats.filter(d => byCat[d.key].products.size > 0).length;

  // staple gaps — staples not present in any product name
  const allNames = new Set();
  Object.values(byCat).forEach(c => c.products.forEach((_,n) => allNames.add(n)));
  const gaps = EXPECTED_STAPLES.filter(s => !allNames.has(s.name));

  // empty + low categories
  const emptyCategories = trackedCats.filter(d => byCat[d.key].products.size === 0);
  const lowCategories = trackedCats.filter(d => {
    const n = byCat[d.key].products.size;
    return n > 0 && n <= 2;
  });

  // concentration risk per category: top product has >= 50% of category's total farmer-instances
  const concentrationCats = [];
  Object.values(byCat).forEach(c => {
    if(c.products.size < 2 || c.key === 'અન્ય') return;
    const counts = [...c.products.values()].map(p => p.farmers.size);
    const total = counts.reduce((n,x)=>n+x,0);
    const top = Math.max(...counts);
    if(total > 0 && top / total >= 0.5){
      concentrationCats.push(c.key);
    }
  });
  let concentrationLevel = 'ઓછું', concentrationColor = 'var(--green2)';
  if(concentrationCats.length >= 3){ concentrationLevel = 'ઊંચું'; concentrationColor = 'var(--red)'; }
  else if(concentrationCats.length >= 1){ concentrationLevel = 'મધ્યમ'; concentrationColor = 'var(--orange)'; }

  return {
    totalFarmers, totalProducts,
    diversityPresent: presentCats, diversityTotal: trackedCats.length,
    gaps, emptyCategories, lowCategories,
    concentrationLevel, concentrationColor, concentrationCats,
  };
}

function fmtOtherUnits(o){
  const ents = Object.entries(o).filter(([_,v]) => v > 0);
  if(!ents.length) return '';
  return ents.map(([u,v]) => `${(+v.toFixed(2))} ${esc(u)}`).join(' · ');
}

  }
  if(SUMMARY_VENUE_FILTER !== 'all' && !venueMap[SUMMARY_VENUE_FILTER]) SUMMARY_VENUE_FILTER = 'all';
  const pivotCols = SUMMARY_VENUE_FILTER === 'all' ? venueKeys : [SUMMARY_VENUE_FILTER];
  const activeData = SUMMARY_VENUE_FILTER === 'all' ? mergeAllVenues(venueMap) : venueMap[SUMMARY_VENUE_FILTER];

function renderCategoryPivot(catKey, venueMap, cols){
  // collect product rows × col cells
  const products = new Map(); // name -> {byVenue:{v: {kg, otherUnits, farmers:Set}}, allFarmers:Set, mergedKg, mergedOther:{}}
  const ensureP = (name) => {
    if(!products.has(name)) products.set(name, {name, byVenue:{}, allFarmers:new Set(), _seenForGrand:new Set(), mergedKg:0, mergedOther:{}, mergedRemKg:0, mergedRemOther:{}, hasRem:false});
    return products.get(name);
  };
  // 1) per-venue cells from venueMap[v].items (these have totalQty pre-summed)
  cols.forEach(v => {
    const venue = venueMap[v]; if(!venue) return;
    Object.values(venue.items).forEach(it => {
      if(categoryKeyOf(it) !== catKey) return;
      const p = ensureP(it.name);
      const u = (it.unit||'').trim();
      const isKg = KG_UNITS.has(u.toLowerCase()) || KG_UNITS.has(u);
      if(!p.byVenue[v]) p.byVenue[v] = {kg:0, otherUnits:{}, farmers:new Set()};
      const cell = p.byVenue[v];
      it.contributors.forEach(c => { cell.farmers.add(c.fid); p.allFarmers.add(c.fid); });
      if(isKg) cell.kg += it.totalQty;
      else if(it.totalQty > 0) cell.otherUnits[u] = (cell.otherUnits[u]||0) + it.totalQty;
    });
  });
  // 2) grand total: dedupe contributors by fid across venues (a farmer at 3 haats brings same stock — count once)
  cols.forEach(v => {
    const venue = venueMap[v]; if(!venue) return;
    Object.values(venue.items).forEach(it => {
      if(categoryKeyOf(it) !== catKey) return;
      const p = products.get(it.name); if(!p) return;
      const u = (it.unit||'').trim();
      const isKg = KG_UNITS.has(u.toLowerCase()) || KG_UNITS.has(u);
      const key = it.name+'|'+u;
      it.contributors.forEach(c => {
        const sk = key+'|'+c.fid;
        if(p._seenForGrand.has(sk)) return;
        p._seenForGrand.add(sk);
        // grand total = the farmer's FULL item qty (sum across their haats), counted once.
        const ft = c.farmerTotal != null ? +c.farmerTotal : (+c.qty||0);
        if(ft > 0){
          if(isKg) p.mergedKg += ft;
          else p.mergedOther[u] = (p.mergedOther[u]||0) + ft;
        }
        // Remaining (બાકી જથ્થો) — cumulative per farmer-product, counted once via the dedup above.
        if(c.remaining != null){
          p.hasRem = true;
          const rem = +c.remaining || 0;
          if(rem > 0){ if(isKg) p.mergedRemKg += rem; else p.mergedRemOther[u] = (p.mergedRemOther[u]||0) + rem; }
        }
      });
    });
  });

  const prodList = [...products.values()].sort((a,b) => b.allFarmers.size - a.allFarmers.size || b.mergedKg - a.mergedKg);
  if(!prodList.length){
    return `<div style="padding:14px 16px;color:var(--muted);font-size:12px">આ કેટેગરી માં કોઈ પ્રોડક્ટ નથી</div>`;
  }
  // Format a {kg, otherUnits} quantity pair for the Total / Remaining / Sold columns.
  const fmtQtyPair = (kg, other) => {
    const parts = [];
    if(kg > 0) parts.push(`<b>${+kg.toFixed(0)}</b>`);
    const o = Object.entries(other||{}).filter(([,v]) => v>0);
    if(o.length) parts.push(`<span style="font-size:9.5px;color:var(--muted)">${o.map(([u,v])=>`${+v.toFixed(0)}${esc(u)}`).join(' ')}</span>`);
    return parts.length ? parts.join(' ') : '<span style="color:var(--muted)">—</span>';
  };

  const HAAT_SHORT = {
    'નવજીવન':'નવ', 'સોલા':'સોલા', 'વસ્ત્રાપુર':'વસ્ત્રા', 'છારોડી':'છા',
    'ગાંધીનગર':'ગાં', 'પલોડિયા':'પલ', 'સૃષ્ટિ':'સૃષ્ટિ',
    'Aaryans Corporate Park':'આર્યન્સ',
    'BAOU':'BAOU', 'છારોડી (BAOU)':'BAOU',
  };
  const shortName = v => HAAT_SHORT[v] || (v.length > 5 ? v.slice(0,4)+'…' : v);
  const fmtCell = (cell) => {
    if(!cell || (cell.farmers.size === 0 && cell.kg === 0 && !Object.keys(cell.otherUnits).length)){
      return '<span style="color:var(--red);font-size:10px;font-weight:600">નથી</span>';
    }
    if(cell.kg > 0){
      const o = Object.entries(cell.otherUnits).filter(([,v])=>v>0);
      const ou = o.length ? `<span style="font-size:9.5px;color:var(--muted)"> +${o.map(([u,v])=>`${+v.toFixed(0)}${esc(u)}`).join(',')}</span>` : '';
      return `<b>${+cell.kg.toFixed(0)}</b>${ou}`;
    }
    const o = Object.entries(cell.otherUnits).filter(([,v])=>v>0);
    if(o.length){
      return `<span style="font-size:10px">${o.map(([u,v])=>`${+v.toFixed(0)}${esc(u)}`).join(' ')}</span>`;
    }
    return `<span style="color:var(--muted);font-size:10px">${cell.farmers.size}</span>`;
  };

  return `
    <div style="padding:8px 10px 12px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table style="width:100%;font-size:12px;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden">
        <thead>
          <tr style="background:#fff;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)">
            <th style="text-align:left;padding:7px 12px;font-weight:600;min-width:160px">પ્રોડક્ટ</th>
            ${cols.map(v => `<th style="text-align:right;padding:7px 8px;font-weight:600;white-space:nowrap;min-width:64px" title="${esc(v)}">${esc(shortName(v))}</th>`).join('')}
            <th style="text-align:right;padding:7px 12px;font-weight:600;background:var(--green-pale);color:var(--green2);white-space:nowrap;min-width:64px" title="કુલ લાવેલ જથ્થો (બધા હાટ)">કુલ આવ્યું</th>
            <th style="text-align:right;padding:7px 10px;font-weight:600;background:#fff3e0;color:#92400e;white-space:nowrap;min-width:56px" title="બાકી / વેચાયા વગર (બધા હાટ ભેગા)">બાકી</th>
            <th style="text-align:right;padding:7px 12px;font-weight:600;background:#e6f4ea;color:var(--green2);white-space:nowrap;min-width:60px" title="વેચાયું = કુલ આવ્યું − બાકી">વેચાયું</th>
          </tr>
        </thead>
        <tbody>
          ${prodList.map(p => {
            const broughtCell = fmtQtyPair(p.mergedKg, p.mergedOther);
            let remCell, soldCell;
            if(!p.hasRem){
              // No farmer has entered remaining yet → unknown, don't imply "all sold".
              remCell = '<span style="color:var(--muted)">—</span>';
              soldCell = '<span style="color:var(--muted)">—</span>';
            } else {
              remCell = fmtQtyPair(p.mergedRemKg, p.mergedRemOther);
              const soldKg = Math.max(0, p.mergedKg - p.mergedRemKg);
              const soldOther = {};
              Object.keys(p.mergedOther).forEach(u => { soldOther[u] = Math.max(0, (p.mergedOther[u]||0) - (p.mergedRemOther[u]||0)); });
              soldCell = fmtQtyPair(soldKg, soldOther);
            }
            return `
              <tr style="border-top:1px solid var(--border)">
                <td style="padding:7px 12px;font-weight:600;white-space:nowrap">${esc(p.name)} <span style="color:var(--muted);font-size:10.5px;font-weight:400">(${p.allFarmers.size})</span></td>
                ${cols.map(v => `<td style="padding:7px 8px;text-align:right;white-space:nowrap">${fmtCell(p.byVenue[v])}</td>`).join('')}
                <td style="padding:7px 12px;text-align:right;background:var(--green-pale);white-space:nowrap">${broughtCell}</td>
                <td style="padding:7px 10px;text-align:right;background:#fff8ef;white-space:nowrap">${remCell}</td>
                <td style="padding:7px 12px;text-align:right;background:#f1f9f3;white-space:nowrap;font-weight:600">${soldCell}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
      <div style="font-size:10px;color:var(--muted);margin-top:6px;line-height:1.5">
        💡 <b>(N)</b> = ખેડૂત. <b>નંબર</b> = kg. <b style="color:var(--muted)">મ્યુટ નંબર</b> = qty વગર ખેડૂત. <span style="color:var(--red)">નથી</span> = તે હાટ માં નથી. <b>કુલ આવ્યું</b> = બધા હાટ ભેગા (ખેડૂત દીઠ એક વાર). <b style="color:#92400e">બાકી</b> = વેચાયા વગર. <b style="color:var(--green2)">વેચાયું</b> = કુલ આવ્યું − બાકી. (બાકી ન ભર્યું હોય તો <b>—</b>.)
      </div>
    </div>
  `;
}

function uniqueItemNames(){
  const m = new Map(); // name -> {emoji, cat, count, photo, isMaster, masterId}
  // Source: every product ever submitted across all weeks
  ALL_PRODUCTS_MAP.forEach((v, name) => {
    m.set(name, {emoji:v.emoji, cat:v.cat, count:v.count});
  });
  // Add master products
  Object.values(MASTER_PRODUCTS).forEach(mp => {
    if(!mp || !mp.name || mp.active === false) return;
    const existing = m.get(mp.name);
    const photo = mp.photo || (existing && existing.photo) || PRODUCT_PHOTOS[photoKey(mp.name)] || '';
    m.set(mp.name, {
      emoji: mp.emoji || (existing?existing.emoji:CAT_EMOJI_MAP[mp.cat]) || '🌿',
      cat: mp.cat || (existing?existing.cat:''),
      count: existing?existing.count:0,
      photo,
      isMaster: true,
      masterId: mp.id,
      masterPrice: mp.price,
      masterUnit: mp.unit,
    });
  });
  return [...m.entries()].map(([name,v])=>({
    name,
    emoji: v.emoji,
    cat: v.cat,
    count: v.count,
    photo: v.photo || photoForNameUrlOnly(name) || '',
    isMaster: !!v.isMaster,
    masterId: v.masterId,
    masterPrice: v.masterPrice,
    masterUnit: v.masterUnit,
  }));
}

let CAT_EMOJI_MAP = {"શાકભાજી":"🥬","ભાજી":"🌿","ફળ":"🥭","ડેરી":"🥛","દાળ/કઠોળ":"🫘","અનાજ/લોટ":"🌾","મસાલા":"🌶️","તેલ":"🛢️","ગોળ/ખાંડ/મધ":"🍯","ફરસાણ":"🍪","પ્રવાહી":"🥤","તૈયાર ભોજન":"🍽️","અન્ય":"🌿"};
let CUSTOM_CATS = {};   // name -> emoji, loaded from settings/categories (admin-added)
// Merge admin-added categories into the built-in lists so all existing code picks them up.
function mergeCustomCats(custom){
  Object.entries(custom||{}).forEach(([name, emoji]) => {
    name = (name||'').trim(); if(!name) return;
    if(!(name in CAT_EMOJI_MAP)) CAT_EMOJI_MAP[name] = emoji || '🌿';
    if(!CATEGORY_DISPLAY.some(d => d.key === name)){
      const entry = {key:name, label:name, emoji:emoji||'🌿', includes:[name]};
      const idx = CATEGORY_DISPLAY.findIndex(d => d.key === 'અન્ય');   // keep 'અન્ય' last
      if(idx >= 0) CATEGORY_DISPLAY.splice(idx, 0, entry); else CATEGORY_DISPLAY.push(entry);
    }
  });
}
let CAT_LABELS = {};   // categoryKey -> custom display label (settings/categoryLabels). Display-only rename.
function catLabel(name){ return (CAT_LABELS && CAT_LABELS[name]) || name; }
// Apply custom display labels to CATEGORY_DISPLAY (keeps each entry's key/grouping; only label changes).
function applyCategoryLabels(){
  CATEGORY_DISPLAY.forEach(d => {
    if(d._origLabel == null) d._origLabel = d.label;
    d.label = (CAT_LABELS && CAT_LABELS[d.key]) || d._origLabel;
  });
}
// Reorder CATEGORY_DISPLAY by a saved order of category keys (settings/categoryOrder).
// Categories not in the saved order keep their current relative position, at the end.
function applyCategoryOrder(order){
  if(!Array.isArray(order) || !order.length) return;
  const rank = {}; order.forEach((n,i) => { rank[n] = i; });
  const tagged = CATEGORY_DISPLAY.map((d,i) => ({d, ord: (rank[d.key] != null ? rank[d.key] : 1000 + i)}));
  tagged.sort((a,b) => a.ord - b.ord);
  CATEGORY_DISPLAY.length = 0;
  tagged.forEach(t => CATEGORY_DISPLAY.push(t.d));
}

function resizePhoto(file, maxDim, q){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const c = document.createElement('canvas');
        c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg', q));
      };
      img.onerror = rej;
      img.src = r.result;
    };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Cached module handle so the import only happens once per session
let _bgRemoveLib = null;

// Remove background from a File, data URI or https URL, composite on white, auto-trim + centre
// on a 512×512 square. Returns a Blob (WebP).
async function bgRemoveAndProcess(source) {
  if (!_bgRemoveLib) {
    // jsDelivr's "+esm" bundle: rewrites the lib's bare `import('onnxruntime-web')` to a
    // real CDN URL so it resolves in a plain browser (no bundler/import-map needed).
    // ONNX model + wasm files are fetched from the lib's own host (staticimgly.com, CORS-ok).
    _bgRemoveLib = await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/+esm');
  }
  const { removeBackground } = _bgRemoveLib;

  let inputBlob;
  if (source instanceof File || source instanceof Blob) {
    inputBlob = source;
  } else {
    const r = await fetch(source); inputBlob = await r.blob();
  }

  // BG removal → PNG with transparency
  const noBgBlob = await removeBackground(inputBlob);

  // Composite on white + auto-trim + pad + square 512×512
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const tmp = document.createElement('canvas');
      tmp.width = img.width; tmp.height = img.height;
      const tCtx = tmp.getContext('2d');
      tCtx.drawImage(img, 0, 0);
      const px = tCtx.getImageData(0, 0, img.width, img.height).data;
      let x0 = img.width, y0 = img.height, x1 = 0, y1 = 0;
      for (let y = 0; y < img.height; y++) {
        for (let x = 0; x < img.width; x++) {
          if (px[(y * img.width + x) * 4 + 3] > 10) {
            if (x < x0) x0 = x; if (x > x1) x1 = x;
            if (y < y0) y0 = y; if (y > y1) y1 = y;
          }
        }
      }
      if (x0 > x1 || y0 > y1) { x0 = 0; y0 = 0; x1 = img.width - 1; y1 = img.height - 1; }
      const sw = x1 - x0 + 1, sh = y1 - y0 + 1;
      const pad = Math.round(Math.max(sw, sh) * 0.10);
      const side = Math.max(sw, sh) + pad * 2;
      const SIZE = 512;
      const out = document.createElement('canvas');
      out.width = SIZE; out.height = SIZE;
      const ctx = out.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, SIZE, SIZE);
      const sc = SIZE / side;
      ctx.drawImage(tmp, (SIZE - sw * sc) / 2 - (x0 - pad) * sc, (SIZE - sh * sc) / 2 - (y0 - pad) * sc, img.width * sc, img.height * sc);
      out.toBlob(blob => resolve(blob), 'image/webp', 0.88);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(noBgBlob);
  });
}

/* ════════ TAB 2e: ORDER (NEW — drag-drop product ordering per category) ════════ */
let ORDER_OPEN = new Set();  // category keys with section expanded
let _orderSortableInstances = [];

function uniqueProductsByCategory(){
  // Group all unique product names (across all weeks + master) by display category
  const groups = {};
  CATEGORY_DISPLAY.forEach(d => { groups[d.key] = {def:d, names:new Set()}; });
  ALL_PRODUCTS_MAP.forEach((v, name) => {
    const ck = categoryKeyOf({cat:v.cat});
    groups[ck].names.add(name);
  });
  Object.values(MASTER_PRODUCTS).forEach(mp => {
    if(!mp || !mp.name || mp.active === false) return;
    const ck = categoryKeyOf({cat:mp.cat});
    groups[ck].names.add(mp.name);
  });
  return groups;
}

function orderedProductsForCategory(catKey, currentNames){
  const saved = Array.isArray(PRODUCT_ORDER[catKey]) ? PRODUCT_ORDER[catKey].slice() : [];
  const present = new Set(currentNames);
  const seen = new Set();
  const ordered = [];
  // 1) saved order, keeping only ones still present
  saved.forEach(n => { if(present.has(n) && !seen.has(n)){ ordered.push({name:n, isNew:false}); seen.add(n); } });
  // 2) new products at end, sorted alphabetically for stability
  const newOnes = [...currentNames].filter(n => !seen.has(n)).sort((a,b) => a.localeCompare(b,'gu'));
  newOnes.forEach(n => ordered.push({name:n, isNew:true}));
  return ordered;
}

function renderOrder(){
  const groups = uniqueProductsByCategory();
  const totalProducts = Object.values(groups).reduce((n, g) => n + g.names.size, 0);
  let totalNew = 0;
  Object.entries(groups).forEach(([k, g]) => {
    const o = orderedProductsForCategory(k, [...g.names]);
    totalNew += o.filter(x => x.isNew).length;
  });

  setTimeout(initOrderSortables, 30);

  return `
    <div class="card" style="margin-bottom:14px;padding:11px 16px">
      <div style="font-size:13px;color:var(--text)">
        <b>${totalProducts}</b> પ્રોડક્ટ • <b style="color:var(--orange)">${totalNew}</b> નવા (હજી ક્રમ નક્કી નથી)
      </div>

window.toggleOrderCategory = key => {
  if(ORDER_OPEN.has(key)) ORDER_OPEN.delete(key);
  else ORDER_OPEN.add(key);
  setTabBodyHtml();
  twe();
};

function destroyOrderSortables(){
  _orderSortableInstances.forEach(s => { try{ s.destroy(); }catch(e){} });
  _orderSortableInstances = [];
}

function initOrderSortables(){
  destroyOrderSortables();
  if(typeof Sortable === 'undefined') return;
  document.querySelectorAll('.order-list').forEach(list => {
    const inst = Sortable.create(list, {
      animation: 150,
      ghostClass: 'order-ghost',
      onEnd: async (evt) => {
        const cat = list.getAttribute('data-cat');
        const names = Array.from(list.querySelectorAll('.order-item')).map(el => el.getAttribute('data-name'));
        PRODUCT_ORDER[cat] = names;
        try{
          await fbRef('productOrder/'+cat).set(names);
          // refresh numeric labels in place to avoid full re-render
          Array.from(list.querySelectorAll('.order-item')).forEach((el, i) => {
            const num = el.querySelector('span:nth-child(2)');
            if(num) num.textContent = (i+1)+'.';
          });
          toast("✓ ક્રમ સાચવાયો","ok");
        }catch(e){
          console.error(e);
          toast("Save નિષ્ફળ — refresh કરી ફરી પ્રયત્ન","err");
        }
      }
    });
    _orderSortableInstances.push(inst);
  });
}

function productsByCategory(){
  const groups = {};
  CATEGORY_DISPLAY.forEach(d => { groups[d.key] = {def:d, items:[]}; });
  Object.values(PRODUCTS_DB).forEach(p => {
    if(!p || p.active === false) return;
    const ck = categoryKeyOf({cat:p.cat});
    groups[ck].items.push(p);
  });
  Object.values(groups).forEach(g => g.items.sort((a,b) => (+a.order||0) - (+b.order||0)));
  return groups;
}

window.uploadProductPhoto = async () => {
  if(!CLOUDINARY_CFG || !CLOUDINARY_CFG.cloudName) return toast("Cloudinary સેટ નથી","err");

    const f = inp.files[0]; if(!f) return;
    toast("✨ BG remove + process… (પ્રથમ વખત ~30s model download)","ok");
    let uploadBlob;
    try {
      uploadBlob = await bgRemoveAndProcess(f);
    } catch(e) {
      console.warn('BG removal failed, falling back to resize:', e);
      toast("⚠️ BG remove ન થઈ — original upload…","ok");
      const dataUrl = await resizePhoto(f, 800, 0.85);
      uploadBlob = await (await fetch(dataUrl)).blob();
    }
    try{
      toast("☁️ Cloudinary upload…","ok");
      const fd = new FormData();
      fd.append('file', uploadBlob, 'product.webp');
      fd.append('upload_preset', CLOUDINARY_CFG.uploadPreset);
      fd.append('folder', 'sristi/products');
      const r = await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CFG.cloudName+'/image/upload', {method:'POST', body:fd});
      const j = await r.json();
      if(j.secure_url){
        const inp2 = document.getElementById('pdPh');

        const prev = document.getElementById('pdPreview');

      } else { toast("Upload નિષ્ફળ: "+(j.error?.message||'unknown'),"err"); }
    }catch(e){ console.error(e); toast("Upload error","err"); }
  };
  inp.click();
};

window.standardiseAllPhotos = async () => {
  if(!CLOUDINARY_CFG?.cloudName) return toast("Cloudinary સેટ નથી","err");
  // Include products with photo in product record OR in productPhotos (slicer uploads)
  const withPhotos = Object.values(PRODUCTS_DB).filter(p => {
    const url = p.photo || photoForName(p.name);
    return !!(url && (url.startsWith('https://') || url.startsWith('data:')));
  });
  if(!withPhotos.length) return toast("Photos ન મળ્યા","err");
  const ok = await asyncConfirm(
    `${withPhotos.length} products ના photos standardise કરવા છે?\n\nBG remove + white background + 512×512 square.\n\nPrthom vaar ~30s model download thay. Pachhi fast.\n\nOriginal Cloudinary URLs replace thashe.`,
    'હા, standardise કરો', 'રદ'
  );
  if(!ok) return;
  // Backup all current photo URLs to a LOCAL JSON file before touching anything.
  // (RTDB backups/ path is blocked by security rules, so we download instead — free, bulletproof.)
  const backupKey = 'backup_' + Date.now();
  const backup = {};
  withPhotos.forEach(p => { backup[p.id] = { name: p.name, photo: p.photo || photoForNameUrlOnly(p.name) || '(slicer-datauri)' }; });
  try {
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'khedut-haat-photoUrls-' + backupKey + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
    toast("✅ Backup downloaded — " + a.download, "ok");
    await new Promise(r => setTimeout(r, 1500));
  } catch(e) {
    console.warn('Backup failed', e);
    toast("⚠️ Backup download ન થઈ", "err");
    await new Promise(r => setTimeout(r, 2000));
  }
  let done=0, failed=0;
  for(const p of withPhotos){
    toast(`${done+failed+1}/${withPhotos.length} — ${p.name}…`,"ok");
    try{
      const srcUrl = p.photo || photoForName(p.name);
      const processed = await bgRemoveAndProcess(srcUrl);
      const fd = new FormData();
      fd.append('file', processed, 'product.webp');
      fd.append('upload_preset', CLOUDINARY_CFG.uploadPreset);
      fd.append('folder', 'sristi/products');
      const r = await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CFG.cloudName+'/image/upload',{method:'POST',body:fd});
      const j = await r.json();
      if(j.secure_url){
        await fbRef('products/'+p.id).update({photo:j.secure_url});
        PRODUCTS_DB[p.id].photo = j.secure_url;
        done++;
      } else { console.warn(p.name, j); failed++; }
    }catch(e){ console.warn(p.name, e); failed++; }
  }
  toast(`✓ ${done} standardised${failed?' • '+failed+' failed':''}`, done?'ok':'err');
  setTabBodyHtml();
};

window.saveProduct = async (existingId) => {
  const nm = ($('#pdNm')?.value||'').trim();
  const cat = ($('#pdCat')?.value||'').trim();
  const un = ($('#pdUn')?.value||'kg').trim();
  const em = ($('#pdEm')?.value||'🌿').trim();
  const ph = ($('#pdPh')?.value||'').trim();
  if(!nm) return toast("નામ ભરો","err");
  if(!cat) return toast("કેટેગરી પસંદ કરો","err");
  const id = existingId || makeProductId(nm);
  // For new products: append to end of category (max existing order + 1)
  let order = (existingId && PRODUCTS_DB[id]?.order != null) ? PRODUCTS_DB[id].order : -1;
  if(order < 0){
    const sameCat = Object.values(PRODUCTS_DB).filter(p => p.cat === cat && p.id !== id);
    order = sameCat.length === 0 ? 0 : Math.max(...sameCat.map(p => +p.order || 0)) + 1;
  }
  const data = {id, name:nm, cat, unit:un, emoji:em, photo:ph, order, active:true, manual:true, addedAt: PRODUCTS_DB[id]?.addedAt || Date.now()};
  const _prevName = (existingId && PRODUCTS_DB[id]) ? PRODUCTS_DB[id].name : null;   // Part C: capture for rename delta
  try{
    const updates = {};
    updates['products/'+id] = data;
    if(DELETED_PRODUCT_IDS.has(id)) updates['productsDeleted/'+id] = null;
    await fbRef('').update(updates);
    PRODUCTS_DB[id] = data;
    DELETED_PRODUCT_IDS.delete(id);
    logAudit('product-save', 'products/'+id, Object.assign({ product: nm, isNew: !existingId }, (_prevName && _prevName!==nm)?{renamedFrom:_prevName}:{}));
    toast(`✓ "${nm}" save થયું`,"ok");
    closeModal();
    PRODUCTS_OPEN_CATS.add(categoryKeyOf({cat})); // open the category so user sees it
    setTabBodyHtml();
  }catch(e){ console.error(e); toast("Save નિષ્ફળ","err"); }
};

/* ════════ PRODUCT IMPORT — 📥 Excel (.xlsx) → products ════════ */
// Reads a .xlsx/.csv with columns: A=Category, B=Product, C=Unit(optional, default kg).
// Categories must match CAT_EMOJI_MAP. Emoji defaults from the category. Shows a preview
// (new / already-exist / problem) before any write. Dedupe is by makeProductId(name).
let PRODUCT_IMPORT = null;   // {toCreate:[{id,name,cat,unit}], dupes:[], invalid:[{row,reason}]}
let _xlsxLib = null;

window.importProductsExcel = async () => {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.xlsx,.xls,.csv';
  inp.onchange = async () => {
    const f = inp.files[0]; if(!f) return;
    toast("📥 Excel વાંચાય છે…","ok");
    try{
      if(!_xlsxLib) _xlsxLib = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
      const XLSX = _xlsxLib;
      const buf = await f.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      // Prefer the "New products" sheet; else the first sheet.
      const sheetName = wb.SheetNames.find(n => /new\s*product/i.test(n)) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, blankrows:false, defval:''});
      const validCats = new Set(Object.keys(CAT_EMOJI_MAP));
      const toCreate = [], dupes = [], invalid = [], seenInFile = new Set();
      rows.forEach((r, i) => {
        const cat  = String(r[0]==null?'':r[0]).trim();
        const name = String(r[1]==null?'':r[1]).trim();
        const unit = String(r[2]==null?'':r[2]).trim() || 'kg';
        // skip header row and fully blank rows
        if(!cat && !name) return;
        if(/^category$/i.test(cat) && /^product$/i.test(name)) return;
        if(!name){ invalid.push({rowNo:i+1, cat, name, reason:'નામ ખાલી'}); return; }
        if(!cat){ invalid.push({rowNo:i+1, cat, name, reason:'કેટેગરી ખાલી'}); return; }
        if(!validCats.has(cat)){ invalid.push({rowNo:i+1, cat, name, reason:'અમાન્ય કેટેગરી'}); return; }
        const id = makeProductId(name);
        if(seenInFile.has(id)){ return; }   // duplicate within the file itself — keep first
        seenInFile.add(id);
        if(PRODUCTS_DB[id]){ dupes.push({id, name, cat}); return; }
        toCreate.push({id, name, cat, unit});
      });
      PRODUCT_IMPORT = {toCreate, dupes, invalid, sheetName};
      showImportPreview();
    }catch(e){ console.error(e); toast("Excel વાંચવામાં ભૂલ: "+(e.message||e),"err"); }
  };
  inp.click();
};
